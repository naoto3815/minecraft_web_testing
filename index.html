<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マインクラフト風プロトタイプ</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; background: #87CEEB; }
    canvas { display: block; }
    #info, #blockinfo {
      position: absolute;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      pointer-events: none;
      line-height: 1.6;
    }
    #info { top: 12px; left: 12px; }
    #blockinfo { bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 16px; }
    #crosshair {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: white; font-size: 22px; pointer-events: none; text-shadow: 0 0 3px black;
    }
    #startmsg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85); color: white; padding: 28px 36px;
      border-radius: 10px; text-align: center; cursor: pointer; font-size: 18px;
    }
    #startmsg small { opacity: 0.7; font-size: 13px; display: block; margin-top: 8px; }

    #hpbar {
      position: absolute; top: 12px; right: 12px;
      width: 200px; height: 24px;
      background: rgba(0,0,0,0.5); border-radius: 12px;
      overflow: hidden; pointer-events: none;
    }
    #hpfill {
      position: absolute; inset: 0;
      background: linear-gradient(to right, #e63946, #ff8a8a);
      width: 100%; transition: width 0.25s;
    }
    #hptext {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 13px; font-weight: bold;
      text-shadow: 0 0 3px black;
    }
    #breakbar {
      position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
      width: 180px; height: 6px;
      background: rgba(0,0,0,0.5); border-radius: 3px;
      overflow: hidden; display: none; pointer-events: none;
    }
    #breakfill { height: 100%; background: white; width: 0%; }
    #damage-flash {
      position: absolute; inset: 0;
      background: rgba(255, 0, 0, 0);
      pointer-events: none;
      transition: background 0.3s;
    }
    #damage-flash.flash {
      background: rgba(255, 0, 0, 0.35);
      transition: background 0.05s;
    }
    #gameover {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.82); color: white;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 36px; font-weight: bold; gap: 22px; z-index: 100;
    }
    #gameover.show { display: flex; }
    #gameover button {
      font-size: 16px; padding: 10px 28px; cursor: pointer;
      background: #444; color: white;
      border: 1px solid #888; border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="info">
    <strong>操作</strong><br>
    WASD: 移動  /  Space: ジャンプ<br>
    マウス: 視点  /  左クリック: 破壊  /  右クリック: 設置<br>
    1〜4: ブロック種類切替  /  M: BGMミュート  /  Esc: 一時停止
  </div>
  <div id="blockinfo">選択中: 草</div>
  <div id="crosshair">+</div>
  <div id="startmsg">クリックして開始<small>Escで一時停止</small></div>

  <div id="hpbar"><div id="hpfill"></div><span id="hptext">HP 20 / 20</span></div>
  <div id="breakbar"><div id="breakfill"></div></div>
  <div id="damage-flash"></div>
  <div id="gameover">
    <div>GAME OVER</div>
    <button onclick="location.reload()">リトライ</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // ===== ブロック種類 =====
    // tex を指定すると textures/ から画像をロード。なければ color のみ表示。
    const blockTypes = [
      { name: '草', color: 0x4CAF50, tex: 'textures/grass.png',  hardness: 0.4 },
      { name: '土', color: 0x8B5A2B, tex: 'textures/dirt.png',   hardness: 0.5 },
      { name: '石', color: 0x9E9E9E, tex: 'textures/stone.png',  hardness: 1.5 },
      { name: '砂', color: 0xF5DEB3, tex: 'textures/sand.png',   hardness: 0.3 },
    ];
    let selectedBlock = 0;

    // 各種類用のマテリアル: 最初は色のみ。テクスチャが読めたら後から map を適用。
    const textureLoader = new THREE.TextureLoader();
    blockTypes.forEach((bt) => {
      bt.material = new THREE.MeshLambertMaterial({ color: bt.color });
      if (!bt.tex) return;
      textureLoader.load(
        bt.tex,
        (tex) => {
          tex.magFilter = THREE.NearestFilter;  // マイクラっぽいドット感
          tex.minFilter = THREE.NearestFilter;
          bt.material.map = tex;
          bt.material.color.set(0xffffff);  // map を通すため色は白に
          bt.material.needsUpdate = true;
        },
        undefined,
        () => {/* ファイルが無い・読めない時は色のままで放置 */}
      );
    });

    // ===== シーン・カメラ・レンダラ =====
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(12, 15, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // ===== プレイヤーの手 (一人称ビュー) =====
    scene.add(camera);  // カメラを scene に入れ、その子(手)を描画させる
    const handGeo = new THREE.BoxGeometry(0.18, 0.45, 0.18);
    const handMat = new THREE.MeshLambertMaterial({ color: 0xF5C99B });  // 肌色
    handMat.depthTest = false;  // 壁にめり込まないよう深度判定を切る
    const hand = new THREE.Mesh(handGeo, handMat);
    hand.position.set(0.42, -0.4, -0.6);  // 視界の右下
    hand.rotation.x = -0.2;
    hand.rotation.z = 0.12;
    hand.renderOrder = 10;  // 一番最後に描画 → 常に前面
    camera.add(hand);
    let handSwingT = 0;
    function startHandSwing() { handSwingT = 1; }

    // ===== ライト =====
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(10, 20, 7);
    scene.add(sun);

    // ===== ブロック管理 =====
    const blocks = new Map();  // "x,y,z" → Mesh
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const edgeGeo = new THREE.EdgesGeometry(boxGeo);

    const key = (x, y, z) => `${x},${y},${z}`;

    function addBlock(x, y, z, typeIndex) {
      if (blocks.has(key(x, y, z))) return;
      const mesh = new THREE.Mesh(boxGeo, blockTypes[typeIndex].material);
      mesh.position.set(x, y, z);
      mesh.userData.typeIndex = typeIndex;  // 破壊時に硬さを参照するため
      // 黒い輪郭線を描いてマイクラっぽさを出す
      const edges = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.15 }));
      mesh.add(edges);
      scene.add(mesh);
      blocks.set(key(x, y, z), mesh);
    }

    function removeBlock(x, y, z) {
      const mesh = blocks.get(key(x, y, z));
      if (!mesh) return;
      scene.remove(mesh);
      // material は blockTypes 間で共有しているので dispose しない
      blocks.delete(key(x, y, z));
    }

    // ===== 地形生成 (24×24, 高低差あり) =====
    const GROUND = 24;

    // 複数の正弦波を重ねて自然な起伏を作る (パーリンノイズ風)
    function terrainHeight(x, z) {
      return Math.floor(
        Math.sin(x * 0.25) * 1.5 +
        Math.cos(z * 0.25) * 1.5 +
        Math.sin((x + z) * 0.15) * 2 +
        2  // ベース高さ
      );
    }

    for (let z = 0; z < GROUND; z++) {
      for (let x = 0; x < GROUND; x++) {
        const h = terrainHeight(x, z);
        addBlock(x, h, z, 0);          // 一番上は草
        addBlock(x, h - 1, z, 1);      // その下は土
        addBlock(x, h - 2, z, 1);
        addBlock(x, h - 3, z, 2);      // さらに下は石
      }
    }

    // ===== 一人称コントロール =====
    const controls = new PointerLockControls(camera, document.body);
    const startMsg = document.getElementById('startmsg');
    startMsg.addEventListener('click', () => controls.lock());
    controls.addEventListener('lock', () => startMsg.style.display = 'none');
    controls.addEventListener('unlock', () => startMsg.style.display = 'block');

    // ===== BGM =====
    // BGM/ フォルダ内のファイルを指定。複数あれば起動時にランダム選択。
    const BGM_FILES = [
      'BGM/After_the_Rain_Stopped.mp3',
      // 追加するときはここに 'BGM/xxx.mp3' を足すだけ
    ];
    const bgm = new Audio(BGM_FILES[Math.floor(Math.random() * BGM_FILES.length)]);
    bgm.loop = true;
    bgm.volume = 0.3;
    let bgmMuted = false;

    // クリック開始で再生、Esc解除で一時停止
    controls.addEventListener('lock', () => {
      if (!bgmMuted) bgm.play().catch(() => {});
    });
    controls.addEventListener('unlock', () => bgm.pause());

    // Mキーでミュート切替
    addEventListener('keydown', (e) => {
      if (e.code !== 'KeyM') return;
      bgmMuted = !bgmMuted;
      if (bgmMuted) bgm.pause();
      else if (controls.isLocked) bgm.play().catch(() => {});
    });

    // ===== 移動入力 =====
    const move = { f: false, b: false, l: false, r: false };
    let velocityY = 0;
    let onGround = false;
    const SPEED = 5;
    const GRAVITY = -22;
    const JUMP = 8.5;
    const STEP_HEIGHT = 1.1;   // この高さまでは自動で歩いて越える
    const CLIMB_SPEED = 14;    // 段差を登る速さ (units/sec)

    // (x,z) の地面の高さ = 真下にある一番上のブロック上面 + 身長
    function getFloorY(x, z) {
      const px = Math.round(x);
      const pz = Math.round(z);
      for (let y = 20; y >= -10; y--) {
        if (blocks.has(key(px, y, pz))) return y + 2;
      }
      return -Infinity;
    }

    const PLAYER_RADIUS = 0.3;  // 当たり判定の半径 (大きいほど早く止まる)

    // プレイヤーの体 (四隅) のどれかが壁に重なるかを判定
    function isBlockedAt(x, z, y) {
      for (const dx of [-PLAYER_RADIUS, PLAYER_RADIUS]) {
        for (const dz of [-PLAYER_RADIUS, PLAYER_RADIUS]) {
          if (getFloorY(x + dx, z + dz) - y > STEP_HEIGHT) return true;
        }
      }
      return false;
    }

    addEventListener('keydown', (e) => {
      if (e.code === 'KeyW') move.f = true;
      if (e.code === 'KeyS') move.b = true;
      if (e.code === 'KeyA') move.l = true;
      if (e.code === 'KeyD') move.r = true;
      if (e.code === 'Space' && onGround) velocityY = JUMP;
      if (e.code.startsWith('Digit')) {
        const idx = parseInt(e.code.slice(5)) - 1;
        if (idx >= 0 && idx < blockTypes.length) {
          selectedBlock = idx;
          updateBlockInfo();
        }
      }
    });
    addEventListener('keyup', (e) => {
      if (e.code === 'KeyW') move.f = false;
      if (e.code === 'KeyS') move.b = false;
      if (e.code === 'KeyA') move.l = false;
      if (e.code === 'KeyD') move.r = false;
    });

    function updateBlockInfo() {
      document.getElementById('blockinfo').textContent =
        `選択中: ${blockTypes[selectedBlock].name}  (1〜4 で切替)`;
    }

    // ===== クリック処理 =====
    const raycaster = new THREE.Raycaster();
    const centerScreen = new THREE.Vector2(0, 0);  // 画面中央

    // 破壊長押し用の状態
    let mouseDown = false;
    let breakTarget = null;
    let breakProgress = 0;
    const breakBarEl = document.getElementById('breakbar');
    const breakFillEl = document.getElementById('breakfill');

    addEventListener('mousedown', (e) => {
      if (!controls.isLocked) return;
      raycaster.setFromCamera(centerScreen, camera);
      const targets = [...blocks.values(), ...creepers.flatMap(g => g.children)];
      const hits = raycaster.intersectObjects(targets, false);
      if (hits.length === 0) return;
      const hit = hits[0];
      if (hit.distance > 8) return;
      // クリーパーに当たった場合
      if (hit.object.userData.creeperGroup) {
        if (e.button === 0) {
          killCreeper(hit.object.userData.creeperGroup);
          startHandSwing();
        }
        return;
      }
      // ブロック処理
      if (e.button === 0) {
        // 左クリックは押し始めだけフラグ化 → animate で進行
        mouseDown = true;
        startHandSwing();
      } else if (e.button === 2) {
        // 右クリックは即設置
        const p = hit.object.position;
        const n = hit.face.normal;
        addBlock(
          Math.round(p.x + n.x),
          Math.round(p.y + n.y),
          Math.round(p.z + n.z),
          selectedBlock
        );
        startHandSwing();
      }
    });

    addEventListener('mouseup', (e) => {
      if (e.button !== 0) return;
      mouseDown = false;
      breakTarget = null;
      breakProgress = 0;
      breakBarEl.style.display = 'none';
    });

    addEventListener('contextmenu', (e) => e.preventDefault());

    // ===== クリーパー (敵Mob) =====
    const creepers = [];
    const creeperBodyGeo = new THREE.BoxGeometry(0.8, 1.0, 0.8);
    const creeperHeadGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const creeperFaceMat = new THREE.MeshLambertMaterial({ color: 0x4DA64D });
    const creeperBodyMat = new THREE.MeshLambertMaterial({ color: 0x4DA64D });
    [
      ['textures/creeper_face.png', creeperFaceMat],
      ['textures/creeper_body.png', creeperBodyMat],
    ].forEach(([url, mat]) => {
      textureLoader.load(url, (tex) => {
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        mat.map = tex;
        mat.color.set(0xffffff);
        mat.needsUpdate = true;
      }, undefined, () => {});
    });

    function creeperGroundY(x, z) {
      const px = Math.round(x);
      const pz = Math.round(z);
      for (let y = 20; y >= -10; y--) {
        if (blocks.has(key(px, y, pz))) return y + 0.5;
      }
      return null;
    }

    const CREEPER_RADIUS = 0.4;  // クリーパーの当たり判定半径

    // プレイヤー位置がいずれかのクリーパーと重なるか? (AABB簡易判定)
    function isOverlappingCreeper(x, z, y) {
      const combined = PLAYER_RADIUS + CREEPER_RADIUS;
      for (const c of creepers) {
        const dy = y - c.position.y;
        if (dy < -0.2 || dy > 3.3) continue;  // 上下に離れている
        if (Math.abs(x - c.position.x) < combined &&
            Math.abs(z - c.position.z) < combined) {
          return true;
        }
      }
      return false;
    }

    function spawnCreeper(x, z) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(creeperBodyGeo, creeperBodyMat);
      body.position.y = 0.5;
      body.userData.creeperGroup = group;  // クリック判定で個体を特定するため
      group.add(body);
      const head = new THREE.Mesh(creeperHeadGeo, creeperFaceMat);
      head.position.y = 1.4;
      head.userData.creeperGroup = group;
      group.add(head);
      const y = creeperGroundY(x, z);
      group.position.set(x, y !== null ? y : 5, z);
      scene.add(group);
      creepers.push(group);
    }

    function killCreeper(group) {
      scene.remove(group);
      const idx = creepers.indexOf(group);
      if (idx !== -1) creepers.splice(idx, 1);
    }

    // 初期スポーン (プレイヤーから少し離れた位置)
    spawnCreeper(4, 18);

    const CREEPER_SPEED = 1.5;
    const CREEPER_SIGHT = 25;         // この距離以内なら追ってくる
    const CREEPER_STOP_DIST = 1.0;    // この距離以内になったら止まる
    const CREEPER_STEP_HEIGHT = 1.1;  // この高さまで登れる、超えると壁扱い (2段以上は不可)
    const CREEPER_ATTACK_RANGE = 1.6;
    const CREEPER_ATTACK_DAMAGE = 4;
    const CREEPER_ATTACK_INTERVAL = 1.5;  // 秒

    function updateCreepers(dt) {
      for (const c of creepers) {
        const dx = camera.position.x - c.position.x;
        const dz = camera.position.z - c.position.z;
        const dy = camera.position.y - c.position.y;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > CREEPER_SIGHT) continue;
        // プレイヤーの方を向く
        c.rotation.y = Math.atan2(dx, dz);

        // 攻撃: 近距離で同じくらいの高さなら定期的にダメージ
        if (dist < CREEPER_ATTACK_RANGE && Math.abs(dy) < 2.5) {
          const now = clock.getElapsedTime();
          if (c.userData.lastAttack === undefined) c.userData.lastAttack = -CREEPER_ATTACK_INTERVAL;
          if (now - c.userData.lastAttack >= CREEPER_ATTACK_INTERVAL) {
            damagePlayer(CREEPER_ATTACK_DAMAGE);
            c.userData.lastAttack = now;
          }
        }

        if (dist < CREEPER_STOP_DIST) continue;
        // 移動先を試算
        const nx = dx / dist;
        const nz = dz / dist;
        const newX = c.position.x + nx * CREEPER_SPEED * dt;
        const newZ = c.position.z + nz * CREEPER_SPEED * dt;
        const newY = creeperGroundY(newX, newZ);
        if (newY === null) continue;  // 地面なし → 進めない
        // 段差が高すぎたら壁扱いで進めない
        if (newY - c.position.y > CREEPER_STEP_HEIGHT) continue;
        c.position.x = newX;
        c.position.z = newZ;
        c.position.y = newY;
      }
    }

    // ===== プレイヤー HP =====
    const PLAYER_MAX_HP = 20;
    let playerHP = PLAYER_MAX_HP;
    let lastDamageTime = -Infinity;
    const INVULN_DURATION = 0.5;  // 連続ダメージ防止
    const hpFillEl = document.getElementById('hpfill');
    const hpTextEl = document.getElementById('hptext');
    const damageFlashEl = document.getElementById('damage-flash');
    const gameoverEl = document.getElementById('gameover');

    function updateHPDisplay() {
      hpFillEl.style.width = `${(playerHP / PLAYER_MAX_HP) * 100}%`;
      hpTextEl.textContent = `HP ${playerHP} / ${PLAYER_MAX_HP}`;
    }
    updateHPDisplay();

    function damagePlayer(amount) {
      if (playerHP <= 0) return;
      const now = clock.getElapsedTime();
      if (now - lastDamageTime < INVULN_DURATION) return;
      playerHP = Math.max(0, playerHP - amount);
      lastDamageTime = now;
      updateHPDisplay();
      damageFlashEl.classList.add('flash');
      setTimeout(() => damageFlashEl.classList.remove('flash'), 80);
      if (playerHP <= 0) {
        controls.unlock();
        gameoverEl.classList.add('show');
        bgm.pause();
      }
    }

    // ===== ゲームループ =====
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.1);  // フレーム飛び対策

      if (controls.isLocked) {
        const fwd = (move.f ? 1 : 0) - (move.b ? 1 : 0);
        const side = (move.r ? 1 : 0) - (move.l ? 1 : 0);

        // 高い壁にぶつかったら戻すため、移動前のXZを保存
        const prevX = camera.position.x;
        const prevZ = camera.position.z;

        controls.moveForward(fwd * SPEED * dt);
        controls.moveRight(side * SPEED * dt);

        // 壁 & クリーパー判定 (めり込む前に止める)
        const isBlocked = (x, z) =>
          isBlockedAt(x, z, camera.position.y) ||
          isOverlappingCreeper(x, z, camera.position.y);
        if (isBlocked(camera.position.x, camera.position.z)) {
          // 壁ずり: X だけ・Z だけで通れるなら片方は進ませる
          if (!isBlocked(prevX, camera.position.z)) {
            camera.position.x = prevX;
          } else if (!isBlocked(camera.position.x, prevZ)) {
            camera.position.z = prevZ;
          } else {
            camera.position.x = prevX;
            camera.position.z = prevZ;
          }
        }

        // 重力
        velocityY += GRAVITY * dt;
        camera.position.y += velocityY * dt;

        // 段差を「登る」or「着地」
        const floorY = getFloorY(camera.position.x, camera.position.z);
        if (camera.position.y < floorY) {
          // snap ではなく lerp で上がる → 段差を歩いて越える感
          camera.position.y = Math.min(floorY, camera.position.y + CLIMB_SPEED * dt);
          if (velocityY < 0) velocityY = 0;
          onGround = (camera.position.y >= floorY - 0.02);
        } else {
          onGround = false;
        }

        // 敵Mob (クリーパー) の更新
        updateCreepers(dt);

        // ブロック破壊の進行 (左クリック長押し)
        if (mouseDown) {
          raycaster.setFromCamera(centerScreen, camera);
          const hits = raycaster.intersectObjects([...blocks.values()], false);
          const aimed = (hits.length > 0 && hits[0].distance <= 8) ? hits[0].object : null;
          if (aimed) {
            if (aimed !== breakTarget) {
              breakTarget = aimed;
              breakProgress = 0;
            }
            const ti = aimed.userData.typeIndex ?? 0;
            const hardness = blockTypes[ti].hardness;
            breakProgress += dt;
            breakBarEl.style.display = 'block';
            breakFillEl.style.width = `${Math.min(100, (breakProgress / hardness) * 100)}%`;
            if (breakProgress >= hardness) {
              const p = aimed.position;
              removeBlock(p.x, p.y, p.z);
              breakTarget = null;
              breakProgress = 0;
              breakBarEl.style.display = 'none';
            }
          } else {
            breakTarget = null;
            breakProgress = 0;
            breakBarEl.style.display = 'none';
          }
        }

        // 手の振り下ろしアニメーション
        if (handSwingT > 0) {
          hand.rotation.x = -0.2 - Math.sin((1 - handSwingT) * Math.PI) * 0.9;
          handSwingT -= dt * 5;
          if (handSwingT <= 0) {
            handSwingT = 0;
            hand.rotation.x = -0.2;
          }
        }
      }

      renderer.render(scene, camera);
    }
    animate();

    // ===== リサイズ対応 =====
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    updateBlockInfo();
  </script>
</body>
</html>
