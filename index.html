        o.frequency.exponentialRampToValueAtTime(110, now + 0.4);
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(0.45 * att, now + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        o.connect(g).connect(ctx.destination);
        o.start(now); o.stop(now + 0.52);
        const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.4), ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource(); src.buffer = buf;
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0.3 * att, now);
        ng.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
        src.connect(ng).connect(ctx.destination);
        src.start(now); src.stop(now + 0.4);
        return;
      }
    }

    // Warden GLB を非同期ロード → 完了後にプレイヤー周囲へ初期スポーン
    gltfLoader.load(
      '3D/Warden.glb',
      (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        if (size.y > 0) model.scale.setScalar(WARDEN_HEIGHT / size.y);  // 高さ2.9マスに正規化
        model.updateMatrixWorld();
        const box2 = new THREE.Box3().setFromObject(model);
        model.position.y -= box2.min.y;  // 足元 = y=0
        model.rotation.y = WARDEN_FACING_OFFSET;
        const wrapper = new THREE.Group();
        wrapper.add(model);
        wardenModelTemplate = wrapper;
        spawnInitialWardens();
      },
      undefined,
      (err) => { console.warn('Warden.glb ロード失敗:', err); }
    );

    // ===== Mob 共通: GLBロード/インスタンス生成のヘルパ (新規Mobで再利用) =====
    // GLBを高さ height マスに正規化し、足元 y=0 に揃えてラッパーGroupに包む。
    function loadMobGLB(file, height, facingOffset, onReady) {
      gltfLoader.load(
        file,
        (gltf) => {
          const model = gltf.scene;
          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          if (size.y > 0) model.scale.setScalar(height / size.y);
          model.updateMatrixWorld();
          const box2 = new THREE.Box3().setFromObject(model);
          model.position.y -= box2.min.y;  // 足元 = y=0
          model.rotation.y = facingOffset || 0;
          const wrapper = new THREE.Group();
          wrapper.add(model);
          onReady(wrapper);
        },
        undefined,
        (err) => { console.warn(file + ' ロード失敗:', err); }
      );
    }
    // テンプレートを複製し、個別フラッシュ用に各メッシュのマテリアルを専用クローンに差し替える。
    function cloneMobInstance(template, groupTag) {
      const group = template.clone(true);
      group.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.userData[groupTag] = group;
        if (Array.isArray(obj.material)) {
          obj.material = obj.material.map(m => m.clone());
          obj.userData.origColors = obj.material.map(m => m.color.clone());
        } else if (obj.material) {
          obj.material = obj.material.clone();
          obj.userData.origColors = [obj.material.color.clone()];
        }
      });
      return group;
    }

    // ===== 魚 (水棲Mob) - 本家準拠: 水中だけを泳ぎ、陸に出るとピチピチ跳ねて窒息死する =====
    const fishes = [];
    const fishColliders = [];   // 不可視ボックス (クリック判定の単一ソース)
    const _fishColliderMat = new THREE.MeshBasicMaterial({ visible: false });
    let fishModelTemplate = null;
    let fishesReady = false;

    const FISH_HEIGHT = 0.5;
    const FISH_FACING_OFFSET = 0;
    const FISH_HP = 3;
    const FISH_SPEED = 1.6;
    const FISH_TARGET = 6;
    const FISH_SPAWN_MIN = 14;
    const FISH_SPAWN_MAX = 46;
    const FISH_DESPAWN_DIST = 70;
    const FISH_SPAWN_INTERVAL = 5;
    const FISH_SUFFOCATE_INTERVAL = 0.6;  // 陸での窒息ダメージ間隔(秒)
    const FISH_SUFFOCATE_DAMAGE = 1;
    const FISH_GRAVITY = 12;
    let fishSpawnTimer = 0;

    // (x,z) の水柱 { bed:固体上面, surface:水面 }。深さ2未満(泳げない)なら null
    function fishWaterColumn(x, z) {
      const bed = creeperGroundY(x, z);
      if (bed === null) return null;
      const depth = waterDepthAt(x, z);
      if (depth < 2) return null;
      return { bed, surface: bed + depth };
    }

    function spawnFish(x, z) {
      if (!fishModelTemplate) return;
      const col = fishWaterColumn(x, z);
      if (!col) return;
      const group = cloneMobInstance(fishModelTemplate, 'fishGroup');
      const collider = new THREE.Mesh(new THREE.BoxGeometry(0.5, FISH_HEIGHT, 0.5), _fishColliderMat);
      collider.position.y = FISH_HEIGHT / 2;
      collider.visible = false;
      collider.userData.fishGroup = group;
      group.add(collider);
      group.userData.collider = collider;
      fishColliders.push(collider);
      const swimY = col.bed + 0.3 + Math.random() * Math.max(0.1, (col.surface - col.bed) - 0.6);
      group.position.set(x, swimY, z);
      group.userData.hp = FISH_HP;
      group.userData.hitFlash = 0;
      group.userData.heading = Math.random() * Math.PI * 2;
      group.userData.turnTimer = 1 + Math.random() * 2;
      group.userData.bobPhase = Math.random() * Math.PI * 2;
      group.userData.vy = 0;              // 陸での落下速度
      group.userData.suffocateTimer = 0;
      group.userData.flopTimer = 0;
      group.rotation.y = group.userData.heading + FISH_FACING_OFFSET;
      scene.add(group);
      fishes.push(group);
    }

    function killFish(group, drop) {
      if (drop) {
        dropMobLoot('fish', group.position.x, group.position.y, group.position.z);
        spawnXPOrbs(group.position.x, group.position.y + 0.3, group.position.z, 1);
      }
      scene.remove(group);
      const idx = fishes.indexOf(group);
      if (idx !== -1) fishes.splice(idx, 1);
      const ci = fishColliders.indexOf(group.userData.collider);
      if (ci !== -1) fishColliders.splice(ci, 1);
    }

    function hitFish(group, damage) {
      group.userData.hp -= (damage || PMOB_ATTACK_DAMAGE);
      group.userData.hitFlash = 0.6;
      if (group.userData.hp <= 0) killFish(group, true);
    }

    function trySpawnFishNearPlayer() {
      for (let attempt = 0; attempt < 10; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = FISH_SPAWN_MIN + Math.random() * (FISH_SPAWN_MAX - FISH_SPAWN_MIN);
        const x = Math.round(camera.position.x + Math.cos(ang) * dist);
        const z = Math.round(camera.position.z + Math.sin(ang) * dist);
        if (fishWaterColumn(x, z)) { spawnFish(x, z); return true; }
      }
      return false;
    }

    function manageFish(dt) {
      if (!fishesReady) return;
      const D2 = FISH_DESPAWN_DIST * FISH_DESPAWN_DIST;
      for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        const dx = camera.position.x - f.position.x;
        const dz = camera.position.z - f.position.z;
        if (dx * dx + dz * dz > D2) killFish(f);
      }
      fishSpawnTimer += dt;
      if (fishSpawnTimer >= FISH_SPAWN_INTERVAL) {
        fishSpawnTimer = 0;
        if (fishes.length < FISH_TARGET) trySpawnFishNearPlayer();
      }
    }

    function updateFish(dt) {
      for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        const ud = f.userData;
        if (ud.hitFlash > 0) { ud.hitFlash = Math.max(0, ud.hitFlash - dt * 2); setCreeperFlash(f, ud.hitFlash); }

        const inWater = isWaterAt(f.position.x, f.position.y, f.position.z);
        if (!inWater) {
          // --- 陸 (水なし): 落下 → ピチピチ跳ねながら窒息していく ---
          ud.vy -= FISH_GRAVITY * dt;
          let ny = f.position.y + ud.vy * dt;
          const gy = creeperGroundY(f.position.x, f.position.z);
          const restY = (gy !== null ? gy : BEDROCK_Y);
          if (ny <= restY) { ny = restY; ud.vy = 0; }
          ud.flopTimer -= dt;
          if (ud.vy === 0 && ud.flopTimer <= 0) {
            ud.vy = 2.2 + Math.random() * 1.5;            // ピチッと跳ねる
            ud.flopTimer = 0.4 + Math.random() * 0.5;
            ud.heading = Math.random() * Math.PI * 2;
          }
          f.position.y = ny;
          f.rotation.y = ud.heading + FISH_FACING_OFFSET;
          f.rotation.z = Math.sin(performance.now() * 0.02) * 0.6;  // のたうつ見た目
          ud.suffocateTimer += dt;
          if (ud.suffocateTimer >= FISH_SUFFOCATE_INTERVAL) {
            ud.suffocateTimer = 0;
            ud.hp -= FISH_SUFFOCATE_DAMAGE;
            ud.hitFlash = 0.6;
            if (ud.hp <= 0) { killFish(f, true); continue; }
          }
          continue;
        }

        // --- 水中: ゆったり泳ぎ回る ---
        f.rotation.z *= (1 - Math.min(1, dt * 6));  // 体の傾きを水平へ戻す
        ud.suffocateTimer = 0;
        ud.turnTimer -= dt;
        if (ud.turnTimer <= 0) {
          ud.turnTimer = 1 + Math.random() * 2.5;
          ud.heading += (Math.random() - 0.5) * Math.PI;
        }
        const dirX = Math.sin(ud.heading), dirZ = Math.cos(ud.heading);
        const newX = f.position.x + dirX * FISH_SPEED * dt;
        const newZ = f.position.z + dirZ * FISH_SPEED * dt;
        if (!isWaterAt(newX, f.position.y, newZ)) {
          ud.heading += Math.PI * (0.5 + Math.random() * 0.5);  // 水の縁: 向きを変える
        } else {
          f.position.x = newX;
          f.position.z = newZ;
        }
        // 縦: ゆるやかに上下しつつ水柱の範囲に収める
        ud.bobPhase += dt * 1.5;
        let ny = f.position.y + Math.sin(ud.bobPhase) * 0.4 * dt;
        const col = fishWaterColumn(f.position.x, f.position.z);
        if (col) {
          const lo = col.bed + 0.3, hi = col.surface - 0.3;
          if (ny < lo) ny = lo; else if (ny > hi) ny = hi;
        }
        f.position.y = ny;
        f.rotation.y = ud.heading + FISH_FACING_OFFSET;
      }
    }

    // ===== ゾンビ (敵Mob) - 本家準拠: 夜に湧き、プレイヤーを追って殴る。日光で燃えて消える =====
    const zombies = [];
    const zombieColliders = [];
    const _zombieColliderMat = new THREE.MeshBasicMaterial({ visible: false });
    let zombieModelTemplate = null;
    let zombiesReady = false;

    const ZOMBIE_WIDTH = 0.6;
    const ZOMBIE_HEIGHT = 1.95;
    const ZOMBIE_FACING_OFFSET = 0;
    const ZOMBIE_HP = 20;
    const ZOMBIE_SPEED = 1.4;
    const ZOMBIE_STEP_HEIGHT = 1.1;
    const ZOMBIE_SIGHT = 28;
    const ZOMBIE_MELEE_RANGE = 1.6;
    const ZOMBIE_MELEE_DAMAGE = 3;
    const ZOMBIE_MELEE_COOLDOWN = 1.0;
    const ZOMBIE_TARGET = 7;            // 夜に周囲へ保つ個体数
    const ZOMBIE_SPAWN_MIN = 24;
    const ZOMBIE_SPAWN_MAX = 50;
    const ZOMBIE_DESPAWN_DIST = 72;
    const ZOMBIE_SPAWN_INTERVAL = 3;
    const ZOMBIE_BURN_INTERVAL = 0.5;   // 日光で焼けるダメージ間隔(秒)
    const ZOMBIE_BURN_DAMAGE = 2;
    let zombieSpawnTimer = 0;

    function spawnZombie(x, z) {
      if (!zombieModelTemplate) return;
      const group = cloneMobInstance(zombieModelTemplate, 'zombieGroup');
      const collider = new THREE.Mesh(new THREE.BoxGeometry(ZOMBIE_WIDTH, ZOMBIE_HEIGHT, ZOMBIE_WIDTH), _zombieColliderMat);
      collider.position.y = ZOMBIE_HEIGHT / 2;
      collider.visible = false;
      collider.userData.zombieGroup = group;
      group.add(collider);
      group.userData.collider = collider;
      zombieColliders.push(collider);
      const y = creeperGroundY(x, z);
      group.position.set(x, y !== null ? y : 5, z);
      group.userData.hp = ZOMBIE_HP;
      group.userData.maxHp = ZOMBIE_HP;
      group.userData.hitFlash = 0;
      group.userData.meleeCd = 0;
      group.userData.lavaTimer = LAVA_DAMAGE_INTERVAL;
      group.userData.burnTimer = 0;
      group.userData.groundY = (y !== null ? y : 5);
      group.userData.footY = group.position.y;
      group.userData.stepHopT = 0;
      scene.add(group);
      zombies.push(group);
    }

    function killZombie(group, drop) {
      if (drop) {
        dropMobLoot('zombie', group.position.x, group.position.y, group.position.z);
        spawnXPOrbs(group.position.x, group.position.y + 0.5, group.position.z, 5);
      }
      scene.remove(group);
      const idx = zombies.indexOf(group);
      if (idx !== -1) zombies.splice(idx, 1);
      const ci = zombieColliders.indexOf(group.userData.collider);
      if (ci !== -1) zombieColliders.splice(ci, 1);
    }

    function hitZombie(group, damage) {
      group.userData.hp -= (damage || PMOB_ATTACK_DAMAGE);
      group.userData.hitFlash = 0.5;
      if (group.userData.hp <= 0) killZombie(group, true);
    }

    function trySpawnZombieNearPlayer() {
      for (let attempt = 0; attempt < 8; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = ZOMBIE_SPAWN_MIN + Math.random() * (ZOMBIE_SPAWN_MAX - ZOMBIE_SPAWN_MIN);
        const x = Math.round(camera.position.x + Math.cos(ang) * dist);
        const z = Math.round(camera.position.z + Math.sin(ang) * dist);
        if (creeperGroundY(x, z) !== null && waterDepthAt(x, z) < MOB_DEEP_WATER && !isLitByTorch(x, z)) { spawnZombie(x, z); return true; }
      }
      return false;
    }

    function manageZombies(dt) {
      if (!zombiesReady) return;
      const D2 = ZOMBIE_DESPAWN_DIST * ZOMBIE_DESPAWN_DIST;
      for (let i = zombies.length - 1; i >= 0; i--) {
        const zm = zombies[i];
        const dx = camera.position.x - zm.position.x;
        const dz = camera.position.z - zm.position.z;
        if (dx * dx + dz * dz > D2) killZombie(zm);
      }
      // 夜だけ湧かせる (本家準拠: 昼は新規に湧かず、既存個体は日光で焼けて減る)
      zombieSpawnTimer += dt;
      if (zombieSpawnTimer >= ZOMBIE_SPAWN_INTERVAL) {
        zombieSpawnTimer = 0;
        if (isNightTime() && zombies.length < ZOMBIE_TARGET) trySpawnZombieNearPlayer();
      }
    }

    function updateZombies(dt) {
      const daytime = daylightStrength() > 0.25;
      for (let i = zombies.length - 1; i >= 0; i--) {
        const zm = zombies[i];
        const ud = zm.userData;
        // 溶岩ダメージ
        if (posTouchingLava(zm.position.x, zm.position.y, zm.position.z, ZOMBIE_HEIGHT)) {
          ud.lavaTimer += dt;
          if (ud.lavaTimer >= LAVA_DAMAGE_INTERVAL) {
            ud.lavaTimer = 0; ud.hp -= LAVA_DAMAGE; ud.hitFlash = 0.6;
            if (ud.hp <= 0) { killZombie(zm); continue; }
          }
        } else { ud.lavaTimer = LAVA_DAMAGE_INTERVAL; }

        // 日光で焼ける (昼 + 頭上が空に開けている)
        if (daytime && isSkyExposed(zm.position.x, zm.position.y + ZOMBIE_HEIGHT, zm.position.z)) {
          ud.burnTimer += dt;
          ud.hitFlash = Math.max(ud.hitFlash, 0.3 + Math.abs(Math.sin(performance.now() * 0.02)) * 0.3);  // チラチラ燃える
          if (ud.burnTimer >= ZOMBIE_BURN_INTERVAL) {
            ud.burnTimer = 0; ud.hp -= ZOMBIE_BURN_DAMAGE;
            if (ud.hp <= 0) { killZombie(zm); continue; }
          }
        } else { ud.burnTimer = 0; }
        if (ud.hitFlash > 0) { ud.hitFlash = Math.max(0, ud.hitFlash - dt * 2); setCreeperFlash(zm, ud.hitFlash); }

        stepMobGroupY(zm, dt, MOB_STEP_HOP);  // 段差なめらか + 小ジャンプ
        ud.meleeCd = Math.max(0, ud.meleeCd - dt);

        const dx = camera.position.x - zm.position.x;
        const dz = camera.position.z - zm.position.z;
        const dy = camera.position.y - zm.position.y;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > ZOMBIE_SIGHT) continue;
        zm.rotation.y = Math.atan2(dx, dz) + ZOMBIE_FACING_OFFSET;

        // 近接攻撃 (張り付いて殴る)
        if (dist < ZOMBIE_MELEE_RANGE && Math.abs(dy) < 2.5) {
          if (ud.meleeCd <= 0) {
            damagePlayer(ZOMBIE_MELEE_DAMAGE);
            ud.meleeCd = ZOMBIE_MELEE_COOLDOWN;
            zm.scale.setScalar(1.08);
            setTimeout(() => { if (zm.parent) zm.scale.setScalar(1); }, 100);
          }
          continue;
        }

        // 通常移動 (プレイヤーを追う)
        const nx = dx / (dist || 1), nz = dz / (dist || 1);
        const newX = zm.position.x + nx * ZOMBIE_SPEED * dt;
        const newZ = zm.position.z + nz * ZOMBIE_SPEED * dt;
        const newY = creeperGroundY(newX, newZ);
        if (newY === null) continue;
        if (newY - ud.groundY > ZOMBIE_STEP_HEIGHT) continue;
        if (waterDepthAt(newX, newZ) >= MOB_DEEP_WATER) continue;
        zm.position.x = newX; zm.position.z = newZ;
        setMobGroundTarget(ud, newY, MOB_STEP_HOP_DUR);
      }
    }

    // ===== スライムナイト (敵Mob・ドラクエ風) =====
    // スライムに乗った騎士。スライムと同じくぴょんぴょん跳ねて移動し、追いついたら剣で斬る。
    // HPが減るとホイミ(自己回復)で緑に光って回復する。アンデッドではないので日光で燃えず昼夜徘徊する。
    const slimeKnights = [];
    const slimeKnightColliders = [];
    const _slimeKnightColliderMat = new THREE.MeshBasicMaterial({ visible: false });
    let slimeKnightModelTemplate = null;
    let slimeKnightsReady = false;

    const SK_WIDTH = 0.7;
    const SK_HEIGHT = 1.7;
    const SK_FACING_OFFSET = 0;
    const SK_HP = 30;                  // 騎士なのでタフ (DQスライムナイト相当・スライム8/ゾンビ20より上)
    const SK_SPEED = 1.7;
    const SK_STEP_HEIGHT = 1.1;
    const SK_SIGHT = 26;
    const SK_MELEE_RANGE = 1.9;
    const SK_MELEE_DAMAGE = 5;          // 剣の一撃 (ゾンビ3より重い)
    const SK_MELEE_COOLDOWN = 1.1;
    const SK_HOP_SPEED = 6;             // 跳ねる周期 (スライムと同じ)
    const SK_HOP_HEIGHT = 0.34;
    const SK_HEAL_AMOUNT = 8;           // ホイミの回復量
    const SK_HEAL_COOLDOWN = 9;         // 自己回復の間隔(秒)
    const SK_HEAL_THRESHOLD = 0.6;      // HPがこの割合を下回ると回復を試みる
    const SK_TARGET = 3;               // 周囲に保つ個体数
    const SK_SPAWN_MIN = 22;
    const SK_SPAWN_MAX = 46;
    const SK_DESPAWN_DIST = 72;
    const SK_SPAWN_INTERVAL = 6;
    let slimeKnightSpawnTimer = 0;

    // 回復演出: origColors を緑へ寄せる (setCreeperFlash の緑版)
    function setMobGreenFlash(group, intensity) {
      group.traverse((obj) => {
        if (!obj.isMesh || !obj.userData.origColors) return;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        const origs = obj.userData.origColors;
        for (let i = 0; i < mats.length; i++) {
          const o = origs[i];
          mats[i].color.setRGB(o.r * (1 - intensity), o.g + (1 - o.g) * intensity, o.b * (1 - intensity));
        }
      });
    }

    function spawnSlimeKnight(x, z) {
      if (!slimeKnightModelTemplate) return;
      const group = cloneMobInstance(slimeKnightModelTemplate, 'slimeKnightGroup');
      const collider = new THREE.Mesh(new THREE.BoxGeometry(SK_WIDTH, SK_HEIGHT, SK_WIDTH), _slimeKnightColliderMat);
      collider.position.y = SK_HEIGHT / 2;
      collider.visible = false;
      collider.userData.slimeKnightGroup = group;
      group.add(collider);
      group.userData.collider = collider;
      slimeKnightColliders.push(collider);
      const y = creeperGroundY(x, z);
      group.position.set(x, y !== null ? y : 5, z);
      group.userData.hp = SK_HP;
      group.userData.maxHp = SK_HP;
      group.userData.hitFlash = 0;
      group.userData.healFlash = 0;
      group.userData.needRestore = false;
      group.userData.meleeCd = 0;
      group.userData.healCd = SK_HEAL_COOLDOWN;
      group.userData.lavaTimer = LAVA_DAMAGE_INTERVAL;
      group.userData.groundY = (y !== null ? y : 5);
      group.userData.footY = group.position.y;
      group.userData.stepHopT = 0;
      group.userData.hopPhase = Math.random() * Math.PI * 2;
      group.userData.visual = group.children[0];   // GLB本体 (連続ホップで上下させる)
      group.userData.visualBaseY = group.children[0] ? group.children[0].position.y : 0;
      scene.add(group);
      slimeKnights.push(group);
    }

    function killSlimeKnight(group, drop) {
      if (drop) {
        dropMobLoot('slimeknight', group.position.x, group.position.y, group.position.z);
        spawnXPOrbs(group.position.x, group.position.y + 0.5, group.position.z, 8);
      }
      scene.remove(group);
      const idx = slimeKnights.indexOf(group);
      if (idx !== -1) slimeKnights.splice(idx, 1);
      const ci = slimeKnightColliders.indexOf(group.userData.collider);
      if (ci !== -1) slimeKnightColliders.splice(ci, 1);
    }

    function hitSlimeKnight(group, damage) {
      group.userData.hp -= (damage || PMOB_ATTACK_DAMAGE);
      group.userData.hitFlash = 0.5;
      if (group.userData.hp <= 0) killSlimeKnight(group, true);
    }

    function trySpawnSlimeKnightNearPlayer() {
      for (let attempt = 0; attempt < 8; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = SK_SPAWN_MIN + Math.random() * (SK_SPAWN_MAX - SK_SPAWN_MIN);
        const x = Math.round(camera.position.x + Math.cos(ang) * dist);
        const z = Math.round(camera.position.z + Math.sin(ang) * dist);
        if (creeperGroundY(x, z) !== null && waterDepthAt(x, z) < MOB_DEEP_WATER && !isLitByTorch(x, z)) { spawnSlimeKnight(x, z); return true; }
      }
      return false;
    }

    function manageSlimeKnights(dt) {
      if (!slimeKnightsReady) return;
      const D2 = SK_DESPAWN_DIST * SK_DESPAWN_DIST;
      for (let i = slimeKnights.length - 1; i >= 0; i--) {
        const sk = slimeKnights[i];
        const dx = camera.position.x - sk.position.x;
        const dz = camera.position.z - sk.position.z;
        if (dx * dx + dz * dz > D2) killSlimeKnight(sk);
      }
      // 昼夜問わず徘徊する敵 (DQモンスター。松明の灯りでは湧き潰せる)
      slimeKnightSpawnTimer += dt;
      if (slimeKnightSpawnTimer >= SK_SPAWN_INTERVAL) {
        slimeKnightSpawnTimer = 0;
        if (slimeKnights.length < SK_TARGET) trySpawnSlimeKnightNearPlayer();
      }
    }

    function updateSlimeKnights(dt) {
      for (let i = slimeKnights.length - 1; i >= 0; i--) {
        const sk = slimeKnights[i];
        const ud = sk.userData;
        // 溶岩ダメージ
        if (posTouchingLava(sk.position.x, sk.position.y, sk.position.z, SK_HEIGHT)) {
          ud.lavaTimer += dt;
          if (ud.lavaTimer >= LAVA_DAMAGE_INTERVAL) {
            ud.lavaTimer = 0; ud.hp -= LAVA_DAMAGE; ud.hitFlash = 0.6;
            if (ud.hp <= 0) { killSlimeKnight(sk); continue; }
          }
        } else { ud.lavaTimer = LAVA_DAMAGE_INTERVAL; }

        // ホイミ (自己回復): HPが規定割合を下回ったら一定間隔で回復し、緑に光る
        ud.healCd = Math.max(0, ud.healCd - dt);
        if (ud.healCd <= 0 && ud.hp > 0 && ud.hp < ud.maxHp * SK_HEAL_THRESHOLD) {
          ud.hp = Math.min(ud.maxHp, ud.hp + SK_HEAL_AMOUNT);
          ud.healCd = SK_HEAL_COOLDOWN;
          ud.healFlash = 0.8;
        }
        // フラッシュ更新: 回復(緑)を優先、なければ被弾(白)。どちらも切れたら元の色へ戻す
        if (ud.hitFlash > 0) ud.hitFlash = Math.max(0, ud.hitFlash - dt * 2);
        if (ud.healFlash > 0) ud.healFlash = Math.max(0, ud.healFlash - dt * 1.5);
        if (ud.healFlash > 0) { setMobGreenFlash(sk, ud.healFlash); ud.needRestore = true; }
        else if (ud.hitFlash > 0) { setCreeperFlash(sk, ud.hitFlash); ud.needRestore = true; }
        else if (ud.needRestore) { setCreeperFlash(sk, 0); ud.needRestore = false; }

        // スライム式の連続ホップ (見た目だけを上下。接地は groundY 追従で滑らかに)
        stepMobGroupY(sk, dt, 0);
        ud.hopPhase += dt * SK_HOP_SPEED;
        if (ud.visual) ud.visual.position.y = ud.visualBaseY + Math.max(0, Math.sin(ud.hopPhase)) * SK_HOP_HEIGHT;

        ud.meleeCd = Math.max(0, ud.meleeCd - dt);
        const dx = camera.position.x - sk.position.x;
        const dz = camera.position.z - sk.position.z;
        const dy = camera.position.y - sk.position.y;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > SK_SIGHT) continue;
        sk.rotation.y = Math.atan2(dx, dz) + SK_FACING_OFFSET;

        // 近接攻撃 (剣で斬る)
        if (dist < SK_MELEE_RANGE && Math.abs(dy) < 2.5) {
          if (ud.meleeCd <= 0) {
            damagePlayer(SK_MELEE_DAMAGE);
            ud.meleeCd = SK_MELEE_COOLDOWN;
            ud.hopPhase = Math.PI / 2;   // 斬りかかる瞬間にぴょんと跳ねる
          }
          continue;
        }

        // 追跡 (プレイヤーへ跳ねながら寄る)
        const nx = dx / (dist || 1), nz = dz / (dist || 1);
        const newX = sk.position.x + nx * SK_SPEED * dt;
        const newZ = sk.position.z + nz * SK_SPEED * dt;
        const newY = creeperGroundY(newX, newZ);
        if (newY === null) continue;
        if (newY - ud.groundY > SK_STEP_HEIGHT) continue;
        if (waterDepthAt(newX, newZ) >= MOB_DEEP_WATER) continue;
        sk.position.x = newX; sk.position.z = newZ;
        setMobGroundTarget(ud, newY, MOB_STEP_HOP_DUR);
      }
    }

    // ===== 矢 (プロジェクタイル) — プレイヤーの弓 & スケルトンが共用 =====
    const arrows = [];
    const ARROW_SPEED = 24;
    const ARROW_GRAVITY = 12;
    const ARROW_LIFETIME = 4;          // 秒で自然消滅
    const ARROW_PLAYER_DAMAGE = 6;     // プレイヤーの弓
    const SKELETON_ARROW_DAMAGE = 3;   // スケルトンの矢 (本家ノーマル相当)
    const _arrowGeo = new THREE.BoxGeometry(0.06, 0.06, 0.55);
    const _arrowMat = new THREE.MeshLambertMaterial({ color: 0xC9B896 });

    function shootArrow(from, dir, fromPlayer, damage) {
      const m = new THREE.Mesh(_arrowGeo, _arrowMat);
      m.position.copy(from);
      m.userData = { vx: dir.x * ARROW_SPEED, vy: dir.y * ARROW_SPEED, vz: dir.z * ARROW_SPEED, fromPlayer, damage, age: 0 };
      scene.add(m);
      arrows.push(m);
    }

    // 矢がMob (足元originのGroup + 高さh + 半径r) に当たっているか
    function arrowInMob(ax, ay, az, g, h, r) {
      const dx = ax - g.position.x, dz = az - g.position.z;
      if (dx * dx + dz * dz > (r + 0.25) * (r + 0.25)) return false;
      return ay >= g.position.y - 0.1 && ay <= g.position.y + h + 0.25;
    }

    function updateArrows(dt) {
      for (let i = arrows.length - 1; i >= 0; i--) {
        const a = arrows[i], ud = a.userData;
        ud.age += dt;
        if (ud.age > ARROW_LIFETIME) { scene.remove(a); arrows.splice(i, 1); continue; }
        ud.vy -= ARROW_GRAVITY * dt;
        const nx = a.position.x + ud.vx * dt;
        const ny = a.position.y + ud.vy * dt;
        const nz = a.position.z + ud.vz * dt;
        a.position.set(nx, ny, nz);
        a.lookAt(nx + ud.vx * 0.1, ny + ud.vy * 0.1, nz + ud.vz * 0.1);
        // ブロックに当たったら消える
        if (isSolidAt(Math.round(nx), Math.round(ny), Math.round(nz))) {
          scene.remove(a); arrows.splice(i, 1); continue;
        }
        let consumed = false;
        if (!ud.fromPlayer) {
          // スケルトンの矢 → プレイヤーに当たる (体の中心あたりで判定)
          const pdx = camera.position.x - nx, pdy = (camera.position.y - 0.7) - ny, pdz = camera.position.z - nz;
          if (pdx * pdx + pdy * pdy + pdz * pdz < 0.85 * 0.85) {
            damagePlayer(ud.damage);
            consumed = true;
          }
        } else {
          // プレイヤーの矢 → 敵/中立/受動Mobに当たる
          for (const zm of zombies) {
            if (arrowInMob(nx, ny, nz, zm, ZOMBIE_HEIGHT, 0.45)) { hitZombie(zm, ud.damage); consumed = true; break; }
          }
          if (!consumed) for (const sk of skeletons) {
            if (arrowInMob(nx, ny, nz, sk, SKELETON_HEIGHT, 0.45)) { hitSkeleton(sk, ud.damage); consumed = true; break; }
          }
          if (!consumed) for (const skk of slimeKnights) {
            if (arrowInMob(nx, ny, nz, skk, SK_HEIGHT, 0.45)) { hitSlimeKnight(skk, ud.damage); consumed = true; break; }
          }
          if (!consumed) for (const c of creepers) {
            if (arrowInMob(nx, ny, nz, c, 1.8, 0.55)) {
              c.userData.hp = (c.userData.hp ?? 1) - ud.damage;
              c.userData.hitFlash = 0.6;
              if (c.userData.hp <= 0) killCreeper(c, true);
              consumed = true; break;
            }
          }
          if (!consumed) for (const w of wardens) {
            if (arrowInMob(nx, ny, nz, w, 2.9, 0.8)) { hitWarden(w, ud.damage); consumed = true; break; }
          }
          if (!consumed) for (const g of golems) {
            if (arrowInMob(nx, ny, nz, g, GOLEM_HEIGHT, 0.8)) { hitGolem(g, ud.damage); consumed = true; break; }
          }
          if (!consumed) for (const p of passiveMobs) {
            if (arrowInMob(nx, ny, nz, p, p.userData.def.height, p.userData.radius || 0.35)) {
              hitPassiveMob(p, ud.damage); consumed = true; break;
            }
          }
        }
        if (consumed) { scene.remove(a); arrows.splice(i, 1); }
      }
    }

    // ===== スケルトン (敵Mob) - 本家準拠: 夜に湧き、距離を保って矢を射る。日光で燃える =====
    // モデルは白いボックスを組んだ手作りのブロック風 (GLB不要)
    const skeletons = [];
    const skeletonColliders = [];
    const _skeletonColliderMat = new THREE.MeshBasicMaterial({ visible: false });

    const SKELETON_WIDTH = 0.6;
    const SKELETON_HEIGHT = 1.95;
    const SKELETON_HP = 20;
    const SKELETON_SPEED = 1.3;
    const SKELETON_SIGHT = 24;          // 索敵距離
    const SKELETON_SHOOT_RANGE = 14;    // この距離以内なら撃つ
    const SKELETON_KEEP_DIST = 7;       // これより近いと後退する (本家準拠の間合い)
    const SKELETON_SHOOT_COOLDOWN = 2.0;
    const SKELETON_TARGET = 4;
    const SKELETON_SPAWN_MIN = 24;
    const SKELETON_SPAWN_MAX = 50;
    const SKELETON_DESPAWN_DIST = 72;
    const SKELETON_SPAWN_INTERVAL = 4;
    let skeletonSpawnTimer = 0;

    function buildSkeletonModel() {
      const g = new THREE.Group();
      const boneMat = new THREE.MeshLambertMaterial({ color: 0xE8E8E0 });
      const darkMat = new THREE.MeshLambertMaterial({ color: 0x3A3A38 });
      const mk = (w, h, d, x, y, z, mat) => {
        const ms = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), (mat || boneMat).clone());
        ms.position.set(x, y, z);
        g.add(ms);
        return ms;
      };
      mk(0.5, 0.5, 0.5, 0, 1.7, 0);             // 頭
      mk(0.09, 0.09, 0.1, -0.13, 1.78, 0.21, darkMat);  // 左目
      mk(0.09, 0.09, 0.1,  0.13, 1.78, 0.21, darkMat);  // 右目
      mk(0.34, 0.72, 0.18, 0, 1.08, 0);          // 胴 (あばら風に薄い)
      mk(0.4, 0.06, 0.2, 0, 1.25, 0);            // あばら線
      mk(0.4, 0.06, 0.2, 0, 1.1, 0);
      mk(0.4, 0.06, 0.2, 0, 0.95, 0);
      mk(0.11, 0.72, 0.11, -0.27, 1.08, 0);      // 左腕
      mk(0.11, 0.72, 0.11,  0.27, 1.08, 0);      // 右腕
      mk(0.13, 0.72, 0.13, -0.1, 0.36, 0);       // 左脚
      mk(0.13, 0.72, 0.13,  0.1, 0.36, 0);       // 右脚
      return g;
    }

    function spawnSkeleton(x, z) {
      const group = new THREE.Group();
      const visual = buildSkeletonModel();
      visual.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.userData.skeletonGroup = group;
        obj.userData.origColors = [obj.material.color.clone()];
      });
      group.add(visual);
      const collider = new THREE.Mesh(new THREE.BoxGeometry(SKELETON_WIDTH, SKELETON_HEIGHT, SKELETON_WIDTH), _skeletonColliderMat);
      collider.position.y = SKELETON_HEIGHT / 2;
      collider.visible = false;
      collider.userData.skeletonGroup = group;
      group.add(collider);
      group.userData.collider = collider;
      skeletonColliders.push(collider);
      const y = creeperGroundY(x, z);
      group.position.set(x, y !== null ? y : 5, z);
      group.userData.hp = SKELETON_HP;
      group.userData.hitFlash = 0;
      group.userData.shootCd = 1 + Math.random();
      group.userData.lavaTimer = LAVA_DAMAGE_INTERVAL;
      group.userData.burnTimer = 0;
      group.userData.groundY = (y !== null ? y : 5);
      group.userData.footY = group.position.y;
      group.userData.stepHopT = 0;
      scene.add(group);
      skeletons.push(group);
    }

    function killSkeleton(group, drop) {
      if (drop) {
        dropMobLoot('skeleton', group.position.x, group.position.y, group.position.z);
        spawnXPOrbs(group.position.x, group.position.y + 0.5, group.position.z, 5);
      }
      scene.remove(group);
      const idx = skeletons.indexOf(group);
      if (idx !== -1) skeletons.splice(idx, 1);
      const ci = skeletonColliders.indexOf(group.userData.collider);
      if (ci !== -1) skeletonColliders.splice(ci, 1);
    }

    function hitSkeleton(group, damage) {
      group.userData.hp -= (damage || PMOB_ATTACK_DAMAGE);
      group.userData.hitFlash = 0.5;
      if (group.userData.hp <= 0) killSkeleton(group, true);
    }

    function trySpawnSkeletonNearPlayer() {
      for (let attempt = 0; attempt < 8; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = SKELETON_SPAWN_MIN + Math.random() * (SKELETON_SPAWN_MAX - SKELETON_SPAWN_MIN);
        const x = Math.round(camera.position.x + Math.cos(ang) * dist);
        const z = Math.round(camera.position.z + Math.sin(ang) * dist);
        if (creeperGroundY(x, z) !== null && waterDepthAt(x, z) < MOB_DEEP_WATER && !isLitByTorch(x, z)) { spawnSkeleton(x, z); return true; }
      }
      return false;
    }

    function manageSkeletons(dt) {
      const D2 = SKELETON_DESPAWN_DIST * SKELETON_DESPAWN_DIST;
      for (let i = skeletons.length - 1; i >= 0; i--) {
        const sk = skeletons[i];
        const dx = camera.position.x - sk.position.x;
        const dz = camera.position.z - sk.position.z;
        if (dx * dx + dz * dz > D2) killSkeleton(sk);
      }
      skeletonSpawnTimer += dt;
      if (skeletonSpawnTimer >= SKELETON_SPAWN_INTERVAL) {
        skeletonSpawnTimer = 0;
        if (isNightTime() && skeletons.length < SKELETON_TARGET) trySpawnSkeletonNearPlayer();
      }
    }

    function updateSkeletons(dt) {
      const daytime = daylightStrength() > 0.25;
      for (let i = skeletons.length - 1; i >= 0; i--) {
        const sk = skeletons[i];
        const ud = sk.userData;
        // 溶岩ダメージ
        if (posTouchingLava(sk.position.x, sk.position.y, sk.position.z, SKELETON_HEIGHT)) {
          ud.lavaTimer += dt;
          if (ud.lavaTimer >= LAVA_DAMAGE_INTERVAL) {
            ud.lavaTimer = 0; ud.hp -= LAVA_DAMAGE; ud.hitFlash = 0.6;
            if (ud.hp <= 0) { killSkeleton(sk); continue; }
          }
        } else { ud.lavaTimer = LAVA_DAMAGE_INTERVAL; }

        // 日光で焼ける (本家準拠)
        if (daytime && isSkyExposed(sk.position.x, sk.position.y + SKELETON_HEIGHT, sk.position.z)) {
          ud.burnTimer += dt;
          ud.hitFlash = Math.max(ud.hitFlash, 0.3 + Math.abs(Math.sin(performance.now() * 0.02)) * 0.3);
          if (ud.burnTimer >= ZOMBIE_BURN_INTERVAL) {
            ud.burnTimer = 0; ud.hp -= ZOMBIE_BURN_DAMAGE;
            if (ud.hp <= 0) { killSkeleton(sk); continue; }
          }
        } else { ud.burnTimer = 0; }
        if (ud.hitFlash > 0) { ud.hitFlash = Math.max(0, ud.hitFlash - dt * 2); setCreeperFlash(sk, ud.hitFlash); }

        stepMobGroupY(sk, dt, MOB_STEP_HOP);
        ud.shootCd = Math.max(0, ud.shootCd - dt);

        const dx = camera.position.x - sk.position.x;
        const dz = camera.position.z - sk.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > SKELETON_SIGHT) continue;
        sk.rotation.y = Math.atan2(dx, dz);

        // 射程内: 立ち止まって (近すぎたら後退しつつ) 矢を放つ
        if (dist <= SKELETON_SHOOT_RANGE) {
          if (ud.shootCd <= 0) {
            ud.shootCd = SKELETON_SHOOT_COOLDOWN;
            const from = sk.position.clone();
            from.y += SKELETON_HEIGHT * 0.75;
            const target = camera.position.clone();
            target.y -= 0.4;
            const dir = target.sub(from).normalize();
            shootArrow(from, dir, false, SKELETON_ARROW_DAMAGE);
          }
          if (dist >= SKELETON_KEEP_DIST) continue;   // 良い間合い: その場で撃ち続ける
        }

        // 移動: 遠ければ近づき、近すぎれば離れる (本家の間合い取り)
        const dirSign = (dist < SKELETON_KEEP_DIST) ? -1 : 1;
        const nx = (dx / (dist || 1)) * dirSign, nz = (dz / (dist || 1)) * dirSign;
        const newX = sk.position.x + nx * SKELETON_SPEED * dt;
        const newZ = sk.position.z + nz * SKELETON_SPEED * dt;
        const newY = creeperGroundY(newX, newZ);
        if (newY === null) continue;
        if (newY - ud.groundY > ZOMBIE_STEP_HEIGHT) continue;
        if (waterDepthAt(newX, newZ) >= MOB_DEEP_WATER) continue;
        sk.position.x = newX; sk.position.z = newZ;
        setMobGroundTarget(ud, newY, MOB_STEP_HOP_DUR);
      }
    }

    // ===== アイアンゴーレム (中立Mob) - 本家準拠: プレイヤーを襲わず、敵Mobを殴り倒す番人 =====
    const golems = [];
    const golemColliders = [];
    const _golemColliderMat = new THREE.MeshBasicMaterial({ visible: false });
    let golemModelTemplate = null;
    let golemsReady = false;

    const GOLEM_WIDTH = 1.4;
    const GOLEM_HEIGHT = 2.7;
    const GOLEM_FACING_OFFSET = 0;
    const GOLEM_HP = 100;
    const GOLEM_SPEED = 1.3;
    const GOLEM_CHASE_SPEED = 2.0;
    const GOLEM_STEP_HEIGHT = 1.2;
    const GOLEM_SIGHT = 22;             // この距離以内の敵Mobを狩りに行く
    const GOLEM_MELEE_RANGE = 2.4;
    const GOLEM_MELEE_DAMAGE = 21;      // 一撃が重い (敵Mobをほぼ即死させる)
    const GOLEM_MELEE_COOLDOWN = 1.0;
    const GOLEM_TARGET = 1;
    const GOLEM_SPAWN_MIN = 20;
    const GOLEM_SPAWN_MAX = 44;
    const GOLEM_DESPAWN_DIST = 74;
    const GOLEM_SPAWN_INTERVAL = 10;
    let golemSpawnTimer = 0;

    function spawnGolem(x, z) {
      if (!golemModelTemplate) return;
      const group = cloneMobInstance(golemModelTemplate, 'golemGroup');
      const collider = new THREE.Mesh(new THREE.BoxGeometry(GOLEM_WIDTH, GOLEM_HEIGHT, GOLEM_WIDTH), _golemColliderMat);
      collider.position.y = GOLEM_HEIGHT / 2;
      collider.visible = false;
      collider.userData.golemGroup = group;
      group.add(collider);
      group.userData.collider = collider;
      golemColliders.push(collider);
      const y = creeperGroundY(x, z);
      group.position.set(x, y !== null ? y : 5, z);
      group.userData.hp = GOLEM_HP;
      group.userData.maxHp = GOLEM_HP;
      group.userData.hitFlash = 0;
      group.userData.meleeCd = 0;
      group.userData.lavaTimer = LAVA_DAMAGE_INTERVAL;
      group.userData.state = 'pause';
      group.userData.stateTimer = 1 + Math.random() * 2;
      group.userData.heading = Math.random() * Math.PI * 2;
      group.userData.groundY = (y !== null ? y : 5);
      group.userData.footY = group.position.y;
      group.userData.stepHopT = 0;
      scene.add(group);
      golems.push(group);
    }

    function killGolem(group, drop) {
      if (drop) dropMobLoot('golem', group.position.x, group.position.y, group.position.z);
      scene.remove(group);
      const idx = golems.indexOf(group);
      if (idx !== -1) golems.splice(idx, 1);
      const ci = golemColliders.indexOf(group.userData.collider);
      if (ci !== -1) golemColliders.splice(ci, 1);
    }

    function hitGolem(group, damage) {
      group.userData.hp -= (damage || PMOB_ATTACK_DAMAGE);
      group.userData.hitFlash = 0.5;
      if (group.userData.hp <= 0) killGolem(group, true);
    }

    // 範囲内で最も近い敵Mob (ゾンビ/スケルトン/スライムナイト/クリーパー)。居なければ null
    function nearestHostileTo(g, range) {
      let best = null, bestD2 = range * range;
      for (const arr of [zombies, skeletons, slimeKnights, creepers]) {
        for (const e of arr) {
          const dx = e.position.x - g.position.x;
          const dz = e.position.z - g.position.z;
          const d2 = dx * dx + dz * dz;
          if (d2 < bestD2) { bestD2 = d2; best = e; }
        }
      }
      return best;
    }

    // 敵Mob (ゾンビ/スケルトン/スライムナイト/クリーパー) に大ダメージ。倒したらドロップなしで除去
    function golemDamageHostile(e) {
      if (zombies.includes(e)) { hitZombie(e, GOLEM_MELEE_DAMAGE); return; }
      if (skeletons.includes(e)) { hitSkeleton(e, GOLEM_MELEE_DAMAGE); return; }
      if (slimeKnights.includes(e)) { hitSlimeKnight(e, GOLEM_MELEE_DAMAGE); return; }
      if (creepers.includes(e)) {
        e.userData.hp -= GOLEM_MELEE_DAMAGE; e.userData.hitFlash = 0.6;
        if (e.userData.hp <= 0) killCreeper(e, false);
      }
    }

    function trySpawnGolemNearPlayer() {
      for (let attempt = 0; attempt < 8; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = GOLEM_SPAWN_MIN + Math.random() * (GOLEM_SPAWN_MAX - GOLEM_SPAWN_MIN);
        const x = Math.round(camera.position.x + Math.cos(ang) * dist);
        const z = Math.round(camera.position.z + Math.sin(ang) * dist);
        if (creeperGroundY(x, z) !== null && waterDepthAt(x, z) < MOB_DEEP_WATER) { spawnGolem(x, z); return true; }
      }
      return false;
    }

    function spawnInitialGolems() {
      golemsReady = true;
      let guard = 0;
      while (golems.length < GOLEM_TARGET && guard++ < 30) { if (!trySpawnGolemNearPlayer()) break; }
    }

    function manageGolems(dt) {
      if (!golemsReady) return;
      const D2 = GOLEM_DESPAWN_DIST * GOLEM_DESPAWN_DIST;
      for (let i = golems.length - 1; i >= 0; i--) {
        const g = golems[i];
        const dx = camera.position.x - g.position.x;
        const dz = camera.position.z - g.position.z;
        if (dx * dx + dz * dz > D2) killGolem(g);
      }
      golemSpawnTimer += dt;
      if (golemSpawnTimer >= GOLEM_SPAWN_INTERVAL) {
        golemSpawnTimer = 0;
        if (golems.length < GOLEM_TARGET) trySpawnGolemNearPlayer();
      }
    }

    function updateGolems(dt) {
      for (let i = golems.length - 1; i >= 0; i--) {
        const g = golems[i];
        const ud = g.userData;
        // 溶岩ダメージ
        if (posTouchingLava(g.position.x, g.position.y, g.position.z, GOLEM_HEIGHT)) {
          ud.lavaTimer += dt;
          if (ud.lavaTimer >= LAVA_DAMAGE_INTERVAL) {
            ud.lavaTimer = 0; ud.hp -= LAVA_DAMAGE; ud.hitFlash = 0.6;
            if (ud.hp <= 0) { killGolem(g); continue; }
          }
        } else { ud.lavaTimer = LAVA_DAMAGE_INTERVAL; }
        if (ud.hitFlash > 0) { ud.hitFlash = Math.max(0, ud.hitFlash - dt * 2); setCreeperFlash(g, ud.hitFlash); }

        stepMobGroupY(g, dt, 0);  // 巨体: 跳ねず滑らかに昇降のみ
        ud.meleeCd = Math.max(0, ud.meleeCd - dt);

        // --- 敵Mob狩り: 近くの敵を見つけたら倒しに行く ---
        const foe = nearestHostileTo(g, GOLEM_SIGHT);
        if (foe) {
          const fdx = foe.position.x - g.position.x;
          const fdz = foe.position.z - g.position.z;
          const fdist = Math.sqrt(fdx * fdx + fdz * fdz) || 0.0001;
          g.rotation.y = Math.atan2(fdx, fdz) + GOLEM_FACING_OFFSET;
          if (fdist < GOLEM_MELEE_RANGE) {
            if (ud.meleeCd <= 0) {
              ud.meleeCd = GOLEM_MELEE_COOLDOWN;
              golemDamageHostile(foe);
              g.scale.setScalar(1.08);
              setTimeout(() => { if (g.parent) g.scale.setScalar(1); }, 120);
            }
          } else {
            const nx = fdx / fdist, nz = fdz / fdist;
            const newX = g.position.x + nx * GOLEM_CHASE_SPEED * dt;
            const newZ = g.position.z + nz * GOLEM_CHASE_SPEED * dt;
            const newY = creeperGroundY(newX, newZ);
            if (newY !== null && newY - ud.groundY <= GOLEM_STEP_HEIGHT && waterDepthAt(newX, newZ) < MOB_DEEP_WATER) {
              g.position.x = newX; g.position.z = newZ; setMobGroundTarget(ud, newY, MOB_STEP_HOP_DUR);
            }
          }
          continue;
        }

        // --- 敵が居ない: のんびり徘徊 (村人風) ---
        ud.stateTimer -= dt;
        if (ud.state === 'pause') {
          if (ud.stateTimer <= 0) { ud.state = 'walk'; ud.heading = Math.random() * Math.PI * 2; ud.stateTimer = 3 + Math.random() * 4; }
          continue;
        }
        if (ud.state === 'walk' && ud.stateTimer <= 0) { ud.state = 'pause'; ud.stateTimer = 2 + Math.random() * 3; continue; }
        const dirX = Math.sin(ud.heading), dirZ = Math.cos(ud.heading);
        const newX = g.position.x + dirX * GOLEM_SPEED * dt;
        const newZ = g.position.z + dirZ * GOLEM_SPEED * dt;
        const newY = creeperGroundY(newX, newZ);
        if (newY === null || newY - ud.groundY > GOLEM_STEP_HEIGHT || waterDepthAt(newX, newZ) >= MOB_DEEP_WATER) {
          ud.heading += Math.PI * (0.5 + Math.random() * 0.5);
          continue;
        }
        g.position.x = newX; g.position.z = newZ;
        setMobGroundTarget(ud, newY, MOB_STEP_HOP_DUR);
        g.rotation.y = Math.atan2(dirX, dirZ) + GOLEM_FACING_OFFSET;
      }
    }
