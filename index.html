      if (addBlock(cx, h - 2, cz, surface)) keys.push(key(cx, h - 2, cz));
      if (addBlock(cx, h - 3, cz, 2))       keys.push(key(cx, h - 3, cz)); // 深層 (石)
      if (addBlock(cx, h - 4, cz, 2))       keys.push(key(cx, h - 4, cz));
      // 流体: 低地(谷)を WATER_LEVEL まで満たす。粗グリッド単位で溶岩湖/水を決める
      if (h < WATER_LEVEL) {
        const cellX = Math.floor(cx / LAVA_CELL), cellZ = Math.floor(cz / LAVA_CELL);
        const nearSpawn = Math.abs(cx - SPAWN_CX) < 8 && Math.abs(cz - SPAWN_CZ) < 8;
        const fluid = (!nearSpawn && hashRand(cellX, cellZ, LAVA_SALT) < LAVA_CHANCE)
          ? LAVA_INDEX : WATER_INDEX;
        for (let y = h + 1; y <= WATER_LEVEL; y++) {
          if (addBlock(cx, y, cz, fluid)) keys.push(key(cx, y, cz));
        }
      }
      // 木 (土の上のみ・水没地と スポーン付近は避ける・決定論的に判定)
      if (surface === 1 && h >= WATER_LEVEL &&
          !(Math.abs(cx - SPAWN_CX) < 4 && Math.abs(cz - SPAWN_CZ) < 4) &&
          hashRand(cx, cz, 0) < TREE_CHANCE) {
        plantTree(cx, h, cz, keys);
      }
      // プレイヤーの改変を反映 (掘った穴・置いたブロックを再現)
      const e = edits.get(ck);
      if (e) {
        for (const [bk, val] of e) {
          const [bx, by, bz] = bk.split(',').map(Number);
          removeBlock(bx, by, bz);
          if (val >= 0 && addBlock(bx, by, bz, val)) keys.push(bk);
        }
      }
      loadedColumns.set(ck, keys);
    }

    // 1列を破棄 (その列が生成したブロックをすべて消す)
    function unloadColumn(ck) {
      const keys = loadedColumns.get(ck);
      if (!keys) return;
      for (const k of keys) {
        const [bx, by, bz] = k.split(',').map(Number);
        removeBlock(bx, by, bz);
      }
      loadedColumns.delete(ck);
      unloadDeepColumn(ck);  // 地表を捨てるときは地中も一緒に
    }

    // 指定座標にプレイヤーの改変があるか? (地中生成が改変を上書きしないよう確認)
    function hasEdit(cx, cz, x, y, z) {
      const e = edits.get(colKey(cx, cz));
      return e ? e.has(key(x, y, z)) : false;
    }

    // (x,y,z) がいまプレイヤーの体に重なる位置か? (立っている床は除外)
    // 非同期生成中に足元へ固体ブロックを置いて埋めてしまうのを防ぐ
    function isPlayerVoxel(x, y, z) {
      // プレイヤーの体(半径0.3+余白)が触れ得る列・高さは地形生成しない(地下での埋まり=地上へ吹っ飛び防止)。
      // 中心の列だけでなく境界付近の隣接列も保護し、体の高さも余白込みで覆う。
      if (Math.abs(camera.position.x - x) > 0.6 || Math.abs(camera.position.z - z) > 0.6) return false;
      const feetY = camera.position.y - PLAYER_EYE;
      return (y - 0.5) < camera.position.y + 0.3 && (y + 0.5) > feetY - 0.3;
    }

    // (x,y,z) に生成する鉱石 (なければ null)。座標決定論的 = 再生成しても同じ場所に出る。
    // 本家準拠の深度分布: 石炭は全域、鉄は浅め、金は深め、ダイヤは最深部 (溶岩域の近く)。
    function oreTypeAt(x, y, z) {
      const r = hashRand(x, z, Math.imul(y, 7919) + 13);
      if (y <= -11 && r < 0.008) return DIAMOND_ORE_INDEX;
      if (y <= -6  && r >= 0.010 && r < 0.025) return GOLD_ORE_INDEX;
      if (y <= 0   && r >= 0.030 && r < 0.062) return IRON_ORE_INDEX;
      if (r >= 0.070 && r < 0.115) return COAL_ORE_INDEX;
      return null;
    }

    // 1列の地中(石・洞窟・溶岩・岩盤)を生成。地表 generateColumn が h-3,h-4 まで石を
    // 置いているので、その下 (h-5) から最下層 BEDROCK_Y まで掘り下げる。
    // 改変済み(掘った/置いた)座標は地表 generateColumn が処理済みなので触らない。
    function generateDeepColumn(cx, cz) {
      const ck = colKey(cx, cz);
      if (deepLoaded.has(ck)) return;
      if (!loadedColumns.has(ck)) generateColumn(cx, cz);  // 地表が未生成なら先に
      const h = terrainHeight(cx, cz);
      const keys = [];
      for (let y = h - 5; y >= BEDROCK_Y; y--) {
        if (hasEdit(cx, cz, cx, y, cz)) continue;  // 改変済みは地表側が管理
        if (isPlayerVoxel(cx, y, cz)) continue;    // プレイヤーが今いる位置は空けておく (嵌り防止)
        if (y === BEDROCK_Y) {                     // 最下層は黒曜石で封をする
          if (addBlock(cx, y, cz, OBSIDIAN_INDEX)) keys.push(key(cx, y, cz));
          continue;
        }
        if (isCave(cx, y, cz)) {
          // 洞窟(空洞)。深いところは溶岩で満たす → 下へ行くと溶岩がある
          if (y <= DEEP_LAVA_Y) {
            if (addBlock(cx, y, cz, LAVA_INDEX)) keys.push(key(cx, y, cz));
          }
          // それ以外の洞窟は空気のまま (何も置かない)
        } else {
          // 石、まれに鉱石 (深いほど貴重な鉱石が出る)
          const bt = oreTypeAt(cx, y, cz) ?? STONE_INDEX;
          if (addBlock(cx, y, cz, bt)) keys.push(key(cx, y, cz));
        }
      }
      deepLoaded.set(ck, keys);
    }

    // 1列の地中ブロックだけを破棄 (地表ブロックは残す)
    function unloadDeepColumn(ck) {
      const keys = deepLoaded.get(ck);
      if (!keys) return;
      for (const k of keys) {
        const [bx, by, bz] = k.split(',').map(Number);
        removeBlock(bx, by, bz);
      }
      deepLoaded.delete(ck);
    }

    // プレイヤーの改変(設置/破壊)を記録 — 再生成しても保たれる (val: typeIndex か -1=破壊)
    function recordEdit(x, y, z, val) {
      const ck = colKey(x, z);
      let e = edits.get(ck);
      if (!e) { e = new Map(); edits.set(ck, e); }
      e.set(key(x, y, z), val);
      // ロード中の列に置いたブロックは、破棄時に一緒に消えるようキー一覧へ登録
      if (val >= 0 && loadedColumns.has(ck)) loadedColumns.get(ck).push(key(x, y, z));
      scheduleSave();  // localStorage への保存を予約
    }

    // ===== セーブ/ロード (改変分だけ localStorage に保存) =====
    const SAVE_KEY = 'mc_world_edits_v1';
    let saveTimer = null;
    function scheduleSave() {
      // 連続採掘中に毎回書き込まないよう 1 秒デバウンス
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(saveEdits, 1000);
    }
    function saveEdits() {
      saveTimer = null;
      try {
        const obj = {};
        for (const [, e] of edits) for (const [bk, val] of e) obj[bk] = val;
        localStorage.setItem(SAVE_KEY, JSON.stringify(obj));
      } catch (err) { /* 容量超過などは無視 */ }
    }
    function loadEdits() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const obj = JSON.parse(raw);
        for (const bk in obj) {
          const c = bk.split(',');
          const ck = colKey(+c[0], +c[2]);
          let e = edits.get(ck);
          if (!e) { e = new Map(); edits.set(ck, e); }
          e.set(bk, obj[bk]);
        }
      } catch (err) { /* 壊れたデータは無視 */ }
    }

    // ストリーミング更新: 周囲を生成・遠方を破棄 (1フレームの予算ぶんずつ)
    let lastStreamCol = null;
    function updateStreaming() {
      const pcx = Math.round(camera.position.x);
      const pcz = Math.round(camera.position.z);
      // プレイヤーが別の列に移ったら、生成/破棄キューを組み直す
      if (lastStreamCol === null || pcx !== lastStreamCol.x || pcz !== lastStreamCol.z) {
        lastStreamCol = { x: pcx, z: pcz };
        loadQueue.length = 0;
        unloadQueue.length = 0;  // 古い破棄予定を捨てて現在位置から組み直す
        const R = LOAD_RADIUS, R2 = R * R;
        for (let dz = -R; dz <= R; dz++) {
          for (let dx = -R; dx <= R; dx++) {
            const d2 = dx * dx + dz * dz;
            if (d2 > R2) continue;
            const cx = pcx + dx, cz = pcz + dz;
            if (loadedColumns.has(colKey(cx, cz))) continue;  // 生成済みは飛ばす
            loadQueue.push({ cx, cz, d2 });
          }
        }
        loadQueue.sort((a, b) => a.d2 - b.d2);  // 近い列から
        const U2 = UNLOAD_RADIUS * UNLOAD_RADIUS;
        for (const ck of loadedColumns.keys()) {
          const ci = ck.indexOf(',');
          const cx = +ck.slice(0, ci), cz = +ck.slice(ci + 1);
          const ddx = cx - pcx, ddz = cz - pcz;
          if (ddx * ddx + ddz * ddz > U2) unloadQueue.push(ck);
        }
        // 地中: 近場だけ縦に掘り下げ、離れたら破棄 (ヒステリシス)
        deepLoadQueue.length = 0;
        deepUnloadQueue.length = 0;
        const DR = DEEP_RADIUS, DR2 = DR * DR;
        for (let dz = -DR; dz <= DR; dz++) {
          for (let dx = -DR; dx <= DR; dx++) {
            const d2 = dx * dx + dz * dz;
            if (d2 > DR2) continue;
            const cx = pcx + dx, cz = pcz + dz;
            if (deepLoaded.has(colKey(cx, cz))) continue;
            deepLoadQueue.push({ cx, cz, d2 });
          }
        }
        deepLoadQueue.sort((a, b) => a.d2 - b.d2);
        const DD2 = DEEP_DEMOTE_RADIUS * DEEP_DEMOTE_RADIUS;
        for (const ck of deepLoaded.keys()) {
          const ci = ck.indexOf(',');
          const cx = +ck.slice(0, ci), cz = +ck.slice(ci + 1);
          const ddx = cx - pcx, ddz = cz - pcz;
          if (ddx * ddx + ddz * ddz > DD2) deepUnloadQueue.push(ck);
        }
      }
      // 予算ぶんだけ生成
      let n = COLUMNS_PER_FRAME;
      while (n-- > 0 && loadQueue.length) {
        const c = loadQueue.shift();
        generateColumn(c.cx, c.cz);
      }
      // 予算ぶんだけ破棄
      let m = UNLOADS_PER_FRAME;
      while (m-- > 0 && unloadQueue.length) {
        unloadColumn(unloadQueue.shift());
      }
      // 地中: 予算ぶんだけ生成 / 破棄
      let dn = DEEP_LOADS_PER_FRAME;
      while (dn-- > 0 && deepLoadQueue.length) {
        const c = deepLoadQueue.shift();
        generateDeepColumn(c.cx, c.cz);
      }
      let dm = DEEP_UNLOADS_PER_FRAME;
      while (dm-- > 0 && deepUnloadQueue.length) {
        unloadDeepColumn(deepUnloadQueue.shift());
      }
    }

    // 保存済みの改変を復元 (initialLoad より前に呼ぶ → スポーン周辺に即反映)
    loadEdits();

    // 村のブループリントを構築 (initialLoad より前。generateColumn が参照する)
    buildVillageBlueprint();

    // 起動時: スポーン周囲をまとめて生成 (以降は移動に応じてストリーミング)
    (function initialLoad() {
      const R = LOAD_RADIUS, R2 = R * R;
      const list = [];
      for (let dz = -R; dz <= R; dz++) {
        for (let dx = -R; dx <= R; dx++) {
          const d2 = dx * dx + dz * dz;
          if (d2 <= R2) list.push({ cx: SPAWN_CX + dx, cz: SPAWN_CZ + dz, d2 });
        }
      }
      list.sort((a, b) => a.d2 - b.d2);
      for (const c of list) generateColumn(c.cx, c.cz);
    })();

    // 初期スポーン位置を実際の地面に合わせる (初期落下を防ぐ)
    camera.position.y = terrainHeight(SPAWN_CX, SPAWN_CZ) + 2;
    camera.position.x = SPAWN_CX;
    camera.position.z = SPAWN_CZ;

    // ===== 一人称コントロール =====
    const controls = new PointerLockControls(camera, document.body);
    const startMsg = document.getElementById('startmsg');

    // Pointer Lock が取得できない環境(埋め込み/一部ブラウザ/タッチ等)向けの
    // フォールバック。controls.isLocked=true にすると PointerLockControls の
    // onMouseMove はマウス移動でカメラを回すので、実ロック無しでも操作できる。
    let usingFallback = false;

    // 実ロック・フォールバック共通の「プレイ開始」処理
    function beginPlay() {
      startMsg.style.display = 'none';
      controls.isLocked = true;
      document.body.style.cursor = 'none';
      if (typeof bgmMuted !== 'undefined' && !bgmMuted) bgm.play().catch(() => {});
      if (typeof getAudioCtx === 'function') getAudioCtx();  // 効果音の準備
    }

    function startFallback() {
      if (controls.isLocked) return;  // 既にロック済みなら何もしない
      usingFallback = true;
      beginPlay();
    }

    startMsg.addEventListener('click', () => {
      if (isTouch) {
        // タッチではPointerLockが使えないので手動でアクティブ化
        startFallback();
      } else {
        controls.lock();
        // Pointer Lock が失敗した場合(埋め込み環境など)のセーフティネット。
        // 'lock' が発火していなければフォールバックでプレイ可能にする。
        setTimeout(() => { if (!controls.isLocked) startFallback(); }, 400);
      }
    });
    // Pointer Lock の要求が即エラーになるケースにも対応
    document.addEventListener('pointerlockerror', startFallback);

    controls.addEventListener('lock', () => {
      startMsg.style.display = 'none';
      document.body.style.cursor = 'none';
    });
    controls.addEventListener('unlock', () => {
      document.body.style.cursor = '';
      // クラフト/かまどメニューで意図的にロック解除した場合は開始画面を出さない
      if (!usingFallback && !anyUIOpen()) startMsg.style.display = 'block';
    });

    // ===== BGM =====
    // BGM/ フォルダ内のファイルを指定。複数あれば起動時にランダム選択。
    const BGM_FILES = [
      'BGM/After_the_Rain_Stopped.mp3',
      // 追加するときはここに 'BGM/xxx.mp3' を足すだけ
    ];
    const bgm = new Audio(BGM_FILES[Math.floor(Math.random() * BGM_FILES.length)]);
    bgm.loop = true;
    bgm.volume = 0.3;
    let bgmMuted = false;

    // ゲームオーバー用BGM (ループしない一発もの)
    const gameOverBGM = new Audio('BGM/game_over.mp3');
    gameOverBGM.loop = false;
    gameOverBGM.volume = 0.6;

    // クリック開始で再生、Esc解除で一時停止
    controls.addEventListener('lock', () => {
      if (!bgmMuted) bgm.play().catch(() => {});
    });
    controls.addEventListener('unlock', () => bgm.pause());

    // Mキーでミュート切替
    addEventListener('keydown', (e) => {
      if (e.code !== 'KeyM') return;
      bgmMuted = !bgmMuted;
      if (bgmMuted) bgm.pause();
      else if (controls.isLocked) bgm.play().catch(() => {});
    });

    // ===== マイニング効果音 (Web Audio API で合成) =====
    let _audioCtx = null;
    function getAudioCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return _audioCtx;
    }
    function playMineSound(typeIndex) {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      // 草/土/石/砂/木材/葉/雪/レンガ/黒曜石 で音高を変える
      const freqs = [240, 180, 120, 280, 160, 320, 360, 140, 90];
      const base = freqs[typeIndex] ?? 180;
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(base, now);
      osc.frequency.exponentialRampToValueAtTime(base * 0.5, now + 0.1);
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.13);
    }
    let mineStrikeCount = 0;  // 振り下ろし回数 (peak ごとに +1)

    // ゲームオーバー BGM (メタルギア風: マイナーキー進行 + 低音ドローン + ローパス)
    function playGameOverMusic() {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;

      // マスター: フェードイン
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0, now);
      master.gain.linearRampToValueAtTime(0.35, now + 0.6);
      master.connect(ctx.destination);

      // ローパスで弦楽器っぽくマイルドに
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1500;
      filter.Q.value = 0.7;
      filter.connect(master);

      // 暗いマイナー進行: Em → Dm → Am → Em
      const seq = [
        { notes: [82.41, 98.00, 123.47],   t: 0.0, d: 1.8 },  // Em
        { notes: [73.42, 87.31, 110.00],   t: 1.8, d: 1.8 },  // Dm
        { notes: [110.00, 130.81, 164.81], t: 3.6, d: 1.8 },  // Am
        { notes: [82.41, 98.00, 123.47],   t: 5.4, d: 3.5 },  // Em (長め)
      ];
      for (const c of seq) {
        for (const freq of c.notes) {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, now + c.t);
          g.gain.setValueAtTime(0, now + c.t);
          g.gain.linearRampToValueAtTime(0.08, now + c.t + 0.4);
          g.gain.setValueAtTime(0.08, now + c.t + c.d - 0.4);
          g.gain.linearRampToValueAtTime(0, now + c.t + c.d);
          osc.connect(g).connect(filter);
          osc.start(now + c.t);
          osc.stop(now + c.t + c.d + 0.05);
        }
      }

      // 低音ドローン (E1) で重厚な「絶望感」を演出
      const bass = ctx.createOscillator();
      const bassG = ctx.createGain();
      bass.type = 'sine';
      bass.frequency.setValueAtTime(41.20, now);
      bassG.gain.setValueAtTime(0, now);
      bassG.gain.linearRampToValueAtTime(0.18, now + 1.0);
      bassG.gain.setValueAtTime(0.18, now + 7.0);
      bassG.gain.linearRampToValueAtTime(0, now + 9.0);
      bass.connect(bassG).connect(filter);
      bass.start(now);
      bass.stop(now + 9.1);
    }

    // ===== 移動入力 =====
    const move = { f: false, b: false, l: false, r: false, up: false, down: false };
    let velocityY = 0;
    let flying = false;                 // 飛行モード (Spaceダブルタップで切替)
    let lastSpaceTapTime = -Infinity;   // Space連打判定用
    const FLY_VSPEED = 8;               // 飛行中の上昇/下降速度
    const FLY_HSPEED = 9;               // 飛行中の水平移動速度 (歩行より速い)
    let onGround = false;
    let fallStartY = null;       // 落下中のピークY (着地時にダメージ計算)
    const FALL_SAFE_HEIGHT = 4;  // この高さ以上落ちるとダメージ
    const VOID_Y = BEDROCK_Y - 5;  // 岩盤より下に落ちたら即死 (奈落)
    const SPEED = 5;
    const DASH_MULTIPLIER = 2.0;        // ダッシュ時の速度倍率
    const DOUBLE_TAP_WINDOW = 0.3;      // W連打受付の時間 (秒)
    let isDashing = false;              // 現在ダッシュ中か
    let lastWTapTime = -Infinity;       // 最後にWを押したクロック時刻
    const GRAVITY = -22;
    const JUMP = 8.5;
    const STEP_HEIGHT = 1.1;   // この高さまでは自動で歩いて越える
    const STEP_SMOOTH = 11;    // 段差の上り下りのイージング係数 (大きいほど速い/小さいほどふわっと)
    const STEP_DOWN_MAX = 1.3; // この高さまでの段差下りは自由落下せずふわっと降りる

    // (x,z) で「現在の足元から STEP_HEIGHT 以内で届く最も高いブロック上面 + 目線高さ (PLAYER_EYE)」
    // refY を渡すとそのカメラ高さを基準にする (省略時は現在のカメラ位置)
    // 頭より上のブロック (天井) は床扱いしないので、トンネルも通れる
    // そのマスに当たり判定のあるブロックがあるか? (水は本家同様すり抜けるので床/壁にしない)
    function isSolidAt(px, py, pz) {
      const e = blocks.get(key(px, py, pz));
      return e !== undefined && e.typeIndex !== WATER_INDEX;
    }

    function getFloorY(x, z, refY) {
      if (refY === undefined) refY = camera.position.y;
      const px = Math.round(x);
      const pz = Math.round(z);
      const maxReach = refY - PLAYER_EYE + STEP_HEIGHT + 0.05;  // 足元 + ステップ高
      for (let y = 20; y >= BEDROCK_Y; y--) {
        if (isSolidAt(px, y, pz)) {
          const blockTop = y + 0.5;
          if (blockTop <= maxReach) return blockTop + PLAYER_EYE;
        }
      }
      return -Infinity;
    }

    // プレイヤーの体 (足元のすぐ下〜頭) が溶岩ブロックに触れているか?
    function isTouchingLava() {
      const px = Math.round(camera.position.x);
      const pz = Math.round(camera.position.z);
      const lo = Math.floor(camera.position.y - PLAYER_EYE - 0.5);  // 足元の下のブロック
      const hi = Math.ceil(camera.position.y);               // 頭まで
      for (let y = lo; y <= hi; y++) {
        const e = blocks.get(key(px, y, pz));
        if (e && e.typeIndex === LAVA_INDEX) return true;
      }
      return false;
    }

    // 頭(視点)が水中にあるか? → 呼吸できない判定に使う
    function isHeadInWater() {
      const e = blocks.get(key(Math.round(camera.position.x), Math.round(camera.position.y), Math.round(camera.position.z)));
      return e !== undefined && e.typeIndex === WATER_INDEX;
    }

    // 体(足元〜頭)のどこかが水に浸かっているか? → 落下ダメージ無効化に使う
    function isBodyInWater() {
      const px = Math.round(camera.position.x);
      const pz = Math.round(camera.position.z);
      const lo = Math.floor(camera.position.y - PLAYER_EYE + 0.1);
      const hi = Math.round(camera.position.y);
      for (let y = lo; y <= hi; y++) {
        const e = blocks.get(key(px, y, pz));
        if (e && e.typeIndex === WATER_INDEX) return true;
      }
      return false;
    }

    // (x,z) で camera Y に立った時、体 (足元〜頭) がブロックに干渉するか?
    function hasCeiling(x, z, cameraY) {
      const px = Math.round(x);
      const pz = Math.round(z);
      const feetY = cameraY - PLAYER_EYE;
      for (let y = Math.floor(feetY); y <= Math.ceil(cameraY); y++) {
        if (!isSolidAt(px, y, pz)) continue;
        const bb = y - 0.5;
        const bt = y + 0.5;
        // ブロック [bb, bt] と体 [feetY+0.05, cameraY-0.05] が重なる?
        if (bb < cameraY - 0.05 && bt > feetY + 0.05) return true;
      }
      return false;
    }

    const PLAYER_RADIUS = 0.3;  // 当たり判定の半径 (大きいほど早く止まる)

    // プレイヤーの体 (四隅) が壁/天井にめり込むかを判定
    function isBlockedAt(x, z, y) {
      for (const dx of [-PLAYER_RADIUS, PLAYER_RADIUS]) {
        for (const dz of [-PLAYER_RADIUS, PLAYER_RADIUS]) {
          const xc = x + dx;
          const zc = z + dz;
          const floorYAt = getFloorY(xc, zc, y);
          // 床が高すぎる (登れない)
          if (floorYAt - y > STEP_HEIGHT) return true;
          // 登った先で体 (足元〜頭) が天井/ブロックに干渉
          const targetY = Math.max(y, floorYAt);
          if (hasCeiling(xc, zc, targetY)) return true;
        }
      }
      return false;
    }

    // 飛行中の上下移動 (1フレーム分)。Space上昇/Shift下降。上下に体が当たるブロックがあれば止まる
    function flightVerticalStep(dt) {
      const bodyBlockedAtY = (ny) => {
        for (const dx of [-PLAYER_RADIUS, PLAYER_RADIUS])
          for (const dz of [-PLAYER_RADIUS, PLAYER_RADIUS])
            if (hasCeiling(camera.position.x + dx, camera.position.z + dz, ny)) return true;
        return false;
      };
      let dy = 0;
      if (move.up) dy += FLY_VSPEED * dt;
      if (move.down) dy -= FLY_VSPEED * dt;
      if (dy !== 0) {
        const ny = camera.position.y + dy;
        if (!bodyBlockedAtY(ny)) camera.position.y = ny;
      }
      velocityY = 0;
      onGround = false;
      fallStartY = null;  // 飛行中は落下ダメージなし
    }

    // 体が固体ブロックに埋まったら(窒息・嵌り)、すぐ上の空きへ少しだけ持ち上げて救出する安全網。
    const UNSTICK_RESCUE_MAX = 3;   // この高さまでの空きにしか救出しない (地表まで打ち上げない)
    function unstickPlayer() {
      // 体が今いる列のブロックと重なっていなければ何もしない
      if (!hasCeiling(camera.position.x, camera.position.z, camera.position.y)) return;
      // 通常の段差登り中は、体が一瞬ステップブロックへ重なる。これは段差イージングが
      // 滑らかに持ち上げて解決する正常な状態。ここで +1 スナップ救出すると目標の床を
      // 行き過ぎてしまい、一段ごとに上へピョコンと跳ねて揺れて見える。
      // 登れる床へ向けて上昇中 (視点が床より下) なら救出せず、イージングに任せる。
      // 地表まで一気に打ち上げない (地下で掘っている最中に勝手に地上へ飛ばされる不具合を防ぐ)。
      // すぐ上(最大 RESCUE_MAX)に抜けられる空きがある時だけそこへ移す。深く埋まった異常時は据え置く。
      const floorY = getFloorY(camera.position.x, camera.position.z);
      if (floorY > -Infinity && camera.position.y < floorY) return;
      let target = -1;
      for (let d = 1; d <= UNSTICK_RESCUE_MAX; d++) {
        if (!hasCeiling(camera.position.x, camera.position.z, camera.position.y + d)) { target = camera.position.y + d; break; }
      }
      if (target < 0) return;  // 近くに空きなし(深く埋まった異常時) → 地表へ飛ばさず据え置き(掘って脱出)
      camera.position.y = target;
      velocityY = 0;
      fallStartY = null;  // 救出による落下ダメージは無効化
    }

    addEventListener('keydown', (e) => {
      // E キーでクラフトメニュー開閉。開いている間は移動入力を無視
      if (furnaceOpen) { if (e.code === 'Escape') closeFurnace(false); else if (e.code === 'KeyE') closeFurnace(true); return; }
      if (chestOpen) { if (e.code === 'Escape') closeChest(false); else if (e.code === 'KeyE') closeChest(true); return; }
      if (tradeOpen) { if (e.code === 'Escape') closeTrade(false); else if (e.code === 'KeyE') closeTrade(true); return; }
      if (e.code === 'KeyE') { craftingOpen ? closeCrafting(true) : openCrafting(); return; }
      if (craftingOpen) { if (e.code === 'Escape') closeCrafting(false); return; }
      if (e.code === 'KeyW') {
        if (!move.f) {  // 初回押し (キーリピートは無視)
          const now = clock.getElapsedTime();
          if (now - lastWTapTime < DOUBLE_TAP_WINDOW) isDashing = true;
          lastWTapTime = now;
        }
        move.f = true;
      }
      if (e.code === 'KeyS') move.b = true;
      if (e.code === 'KeyA') move.l = true;
      if (e.code === 'KeyD') move.r = true;
      if (e.code === 'Space') {
        move.up = true;
        if (!e.repeat) {  // Spaceダブルタップで飛行ON/OFF (キーリピートは無視)
          const now = clock.getElapsedTime();
          if (now - lastSpaceTapTime < DOUBLE_TAP_WINDOW) {
            flying = !flying; velocityY = 0;
            if (typeof showToast === 'function') showToast(flying ? '飛行モード ON  (Space:上昇 / Shift:下降 / Spaceダブルタップで解除)' : '飛行モード OFF');
          }
          lastSpaceTapTime = now;
        }
        if (!flying && onGround) { velocityY = JUMP; addExhaustion(EXHAUST_JUMP); }  // 通常ジャンプ
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') move.down = true;
      if (e.code.startsWith('Digit')) {
        const idx = parseInt(e.code.slice(5)) - 1;
        if (idx >= 0 && idx < hotbarItems.length) {
          selectedSlot = idx;
          updateBlockInfo();
          refreshHotbarCounts();
        }
      }
    });
    addEventListener('keyup', (e) => {
      if (e.code === 'KeyW') {
        move.f = false;
        isDashing = false;  // W を離したらダッシュ終了
      }
      if (e.code === 'KeyS') move.b = false;
      if (e.code === 'KeyA') move.l = false;
      if (e.code === 'KeyD') move.r = false;
      if (e.code === 'Space') move.up = false;
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') move.down = false;
    });
    // マウスホイールでホットバー(所持品)を巡回
    addEventListener('wheel', (e) => {
      if (!controls.isLocked || anyUIOpen() || hotbarItems.length === 0) return;
      const dir = e.deltaY > 0 ? 1 : -1;
      selectedSlot = (selectedSlot + dir + hotbarItems.length) % hotbarItems.length;
      updateBlockInfo();
      refreshHotbarCounts();
    }, { passive: true });

    function updateBlockInfo() {
      const it = selectedItem();
      const name = !it ? 'なし'
        : it.kind === 'block' ? blockTypes[it.i].name
        : it.kind === 'tnt' ? 'TNT'
        : it.kind === 'material' ? materialById[it.id].name
        : toolById[it.id].name;
      document.getElementById('blockinfo').textContent = `選択中: ${name}`;
    }

    // ===== クリック処理 =====
    const raycaster = new THREE.Raycaster();
    const centerScreen = new THREE.Vector2(0, 0);  // 画面中央

    // 破壊長押し用の状態
    let mouseDown = false;
    let breakTargetKey = null;   // 対象ブロックの位置キー "x,y,z"
    let breakTargetType = null;  // 対象ブロックの種別
    let breakProgress = 0;
    const breakBarEl = document.getElementById('breakbar');
    const breakFillEl = document.getElementById('breakfill');

    addEventListener('mousedown', (e) => {
      if (!controls.isLocked || anyUIOpen()) return;
      // 右クリック: 食料を選択中なら食べて HP 回復 (照準先に関係なく)
      if (e.button === 2 && tryEatSelected()) return;
      // 弓を装備中の右クリック: 矢を放つ (照準先に関係なく飛ぶ)
      if (e.button === 2) {
        const bowT = heldTool();
        if (bowT && bowT.type === 'bow') {
          if (materials.arrow > 0) {
            materials.arrow--;
            updateHotbar();
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const from = camera.position.clone().add(dir.clone().multiplyScalar(0.7));
            from.y -= 0.15;
            shootArrow(from, dir, true, ARROW_PLAYER_DAMAGE);
            startHandSwing();
          } else {
            showToast('矢がない！（クラフト: 石1+木材1+羽根1 → 矢4）');
          }
          return;
        }
      }
      raycaster.setFromCamera(centerScreen, camera);
      // Block (InstancedMesh) / Creeper / 受動Mob を別レイキャストし最近接を採用
      const blockHits = raycaster.intersectObjects(instancedMeshes, false);
      const creeperHits = raycaster.intersectObjects(creepers, true);
      // 受動Mob・ウォーデン等は不可視ボックスコライダのみを対象に (細かいメッシュより当たり判定が正確)
      const passiveHits = raycaster.intersectObjects(passiveColliders, false);
      const wardenHits = raycaster.intersectObjects(wardenColliders, false);
      const fishHits = raycaster.intersectObjects(fishColliders, false);
      const zombieHits = raycaster.intersectObjects(zombieColliders, false);
      const golemHits = raycaster.intersectObjects(golemColliders, false);
      const torchHits = raycaster.intersectObjects(torchClickTargets, true);
      const cropHits = raycaster.intersectObjects(cropClickTargets, true);
      const skeletonHits = raycaster.intersectObjects(skeletonColliders, false);
      const slimeKnightHits = raycaster.intersectObjects(slimeKnightColliders, false);
      const saplingHits = raycaster.intersectObjects(saplingClickTargets, true);
      const bh = blockHits[0];
      const ch = creeperHits[0];
      const ph = passiveHits[0];
      const wh = wardenHits[0];
      const fh = fishHits[0];
      const zh = zombieHits[0];
      const gh = golemHits[0];
      const th = torchHits[0];
      const crh = cropHits[0];
      const skh = skeletonHits[0];
      const skkh = slimeKnightHits[0];
      const sph = saplingHits[0];
      let hit = bh, hitType = bh ? 'block' : null;
      if (ch && (!hit || ch.distance < hit.distance)) { hit = ch; hitType = 'creeper'; }
      if (wh && (!hit || wh.distance < hit.distance)) { hit = wh; hitType = 'warden'; }
      if (zh && (!hit || zh.distance < hit.distance)) { hit = zh; hitType = 'zombie'; }
      if (skh && (!hit || skh.distance < hit.distance)) { hit = skh; hitType = 'skeleton'; }
      if (skkh && (!hit || skkh.distance < hit.distance)) { hit = skkh; hitType = 'slimeknight'; }
      if (gh && (!hit || gh.distance < hit.distance)) { hit = gh; hitType = 'golem'; }
      if (fh && (!hit || fh.distance < hit.distance)) { hit = fh; hitType = 'fish'; }
      if (ph && (!hit || ph.distance < hit.distance)) { hit = ph; hitType = 'passive'; }
      if (th && (!hit || th.distance < hit.distance)) { hit = th; hitType = 'torch'; }
      if (crh && (!hit || crh.distance < hit.distance)) { hit = crh; hitType = 'crop'; }
      if (sph && (!hit || sph.distance < hit.distance)) { hit = sph; hitType = 'sapling'; }
      if (!hit || hit.distance > 8) return;
      if (e.button === 0 && hitType !== 'block' && hitType !== 'torch' && hitType !== 'crop' && hitType !== 'sapling') addExhaustion(EXHAUST_ATTACK);  // 攻撃で満腹度を消耗 (本家準拠)

      // 松明: 左クリックで即撤去 (本家同様アイテムとして戻る)
      if (hitType === 'torch') {
        if (e.button === 0) { removeTorchByObject(hit.object); startHandSwing(); }
        return;
      }

      // 作物: 左クリックで収穫 (成熟なら小麦+種、未成熟なら種だけ)。骨粉で右クリック → 成長促進
      if (hitType === 'crop') {
        let g = hit.object;
        while (g && !g.userData.cropKey) g = g.parent;
        if (g) {
          if (e.button === 0) { removeCrop(g, true); startHandSwing(); }
          else if (e.button === 2) {
            const bm = selectedItem();
            if (bm && bm.kind === 'material' && bm.id === 'bonemeal' && materials.bonemeal > 0 && g.userData.stage < 3) {
              materials.bonemeal--;
              g.userData.t = (g.userData.stage + 1) * CROP_STAGE_TIME;   // 1段階すすめる
              updateCrops(0);
              updateHotbar();
              startHandSwing();
            }
          }
        }
        return;
      }

      // 苗木: 左クリックで回収、骨粉で右クリック → 即座に木へ成長
      if (hitType === 'sapling') {
        let g = hit.object;
        while (g && !g.userData.saplingKey) g = g.parent;
        if (g) {
          if (e.button === 0) { removeSapling(g, true); startHandSwing(); }
          else if (e.button === 2) {
            const bm = selectedItem();
            if (bm && bm.kind === 'material' && bm.id === 'bonemeal' && materials.bonemeal > 0) {
              materials.bonemeal--;
              growTreeFromSapling(g);
              updateHotbar();
              startHandSwing();
            }
          }
        }
        return;
      }

      // ウォーデン: 左クリックで攻撃 (HP制。大量に殴る必要あり)
      if (hitType === 'warden') {
        if (e.button === 0) {
          let g = hit.object;
          while (g && !wardens.includes(g)) g = g.parent;
          if (g) { hitWarden(g, attackDamage()); startHandSwing(); }
        }
        return;
      }

      // ゾンビ: 左クリックで攻撃 (HP制)
      if (hitType === 'zombie') {
        if (e.button === 0) {
          let g = hit.object;
          while (g && !zombies.includes(g)) g = g.parent;
          if (g) { hitZombie(g, attackDamage()); startHandSwing(); }
        }
        return;
      }

      // スケルトン: 左クリックで攻撃 (HP制)
      if (hitType === 'skeleton') {
        if (e.button === 0) {
          let g = hit.object;
          while (g && !skeletons.includes(g)) g = g.parent;
          if (g) { hitSkeleton(g, attackDamage()); startHandSwing(); }
        }
        return;
      }

      // スライムナイト: 左クリックで攻撃 (HP制・タフ)
      if (hitType === 'slimeknight') {
        if (e.button === 0) {
          let g = hit.object;
          while (g && !slimeKnights.includes(g)) g = g.parent;
          if (g) { hitSlimeKnight(g, attackDamage()); startHandSwing(); }
        }
        return;
      }

      // アイアンゴーレム: 左クリックで攻撃 (HP制。中立なので殴っても反撃はしない)
      if (hitType === 'golem') {
        if (e.button === 0) {
          let g = hit.object;
          while (g && !golems.includes(g)) g = g.parent;
          if (g) { hitGolem(g, attackDamage()); startHandSwing(); }
        }
        return;
      }

      // 魚: 左クリックで攻撃 (HP制)
      if (hitType === 'fish') {
        if (e.button === 0) {
          let g = hit.object;
          while (g && !fishes.includes(g)) g = g.parent;
          if (g) { hitFish(g, attackDamage()); startHandSwing(); }
        }
        return;
      }

      // クリーパー
      if (hitType === 'creeper') {
        if (e.button === 0) {
          let g = hit.object;
          while (g && !creepers.includes(g)) g = g.parent;
          if (g) {
            killCreeper(g, true);  // プレイヤー撃破: 火薬をドロップ
            startHandSwing();
          }
        }
        return;
      }

      // 受動Mob (ブタ・村人): 左クリックで攻撃、右クリックで餌やり (繁殖)
      if (hitType === 'passive') {
        let g = hit.object;
        while (g && !passiveMobs.includes(g)) g = g.parent;
        if (g) {
          if (e.button === 0) {
            hitPassiveMob(g, attackDamage());
            startHandSwing();
          } else if (e.button === 2) {
            if (g.userData.def.key === 'villager') openTrade();   // 村人 → 取引メニュー
            else feedPassiveMob(g);   // 動物に小麦/種 → ラブモード (繁殖)
          }
        }
        return;
      }

      // ブロック (InstancedMesh から位置情報を取り出す)
      const info = blockFromHit(hit);
      if (!info) return;

      if (e.button === 0) {
        mouseDown = true;
        mineStrikeCount = 0;
        startHandSwing();
      } else if (e.button === 2) {
        // かまどを右クリック → 精錬メニューを開く (本家準拠の対話)
        if (info.typeIndex === FURNACE_INDEX) { openFurnace(); return; }
        // ベッドを右クリック → 就寝 (夜スキップ + リスポーン設定)
        if (info.typeIndex === BED_INDEX) { trySleepInBed(info); return; }
        // チェストを右クリック → 保管メニュー
        if (info.typeIndex === CHEST_INDEX) { openChest(info); return; }
        // クワで草/土を右クリック → 耕地にする (本家準拠)
        const heldT = heldTool();
        if (heldT && heldT.type === 'hoe' && (info.typeIndex === GRASS_INDEX || info.typeIndex === DIRT_INDEX)) {
          removeBlock(info.x, info.y, info.z);
          addBlock(info.x, info.y, info.z, FARMLAND_INDEX);
          recordEdit(info.x, info.y, info.z, FARMLAND_INDEX);
          startHandSwing();
          return;
        }
        // 耕地に種をまく → 作物が育つ
        const selM = selectedItem();
        if (selM && selM.kind === 'material' && selM.id === 'seeds' && info.typeIndex === FARMLAND_INDEX) {
          if (materials.seeds > 0 && plantCrop(info.x, info.y + 1, info.z)) {
            materials.seeds--;
            updateHotbar();
            startHandSwing();
          }
          return;
        }
        // 草/土に苗木を植える → 時間経過で木に育つ
        if (selM && selM.kind === 'material' && selM.id === 'sapling' &&
            (info.typeIndex === GRASS_INDEX || info.typeIndex === DIRT_INDEX)) {
          if (materials.sapling > 0 && plantSapling(info.x, info.y + 1, info.z)) {
            materials.sapling--;
            updateHotbar();
            startHandSwing();
          }
          return;
        }
        // 設置: ブロック or TNT
        const it = selectedItem();
        if (!it) return;
        const n = hit.face.normal;
        const px = Math.round(info.x + n.x);
        const py = Math.round(info.y + n.y);
        const pz = Math.round(info.z + n.z);
        if (it.kind === 'tnt') {
          if (tntCount <= 0) return;
          placePrimedTNT(px, py, pz);  // 設置 → 導火線開始 (本家同様)
          tntCount--;
          updateHotbar();
          startHandSwing();
        } else if (it.kind === 'material' && it.id === 'torch') {
          // 松明の設置 (壁クリック時は壁掛け風)
          if (materials.torch <= 0) return;
          if (placeTorch(px, py, pz, n)) {
            materials.torch--;
            updateHotbar();
            startHandSwing();
          }
        } else if (it.kind === 'block') {
          if (inventory[it.i] <= 0 || torches.has(key(px, py, pz)) || crops.has(key(px, py, pz)) || saplings.has(key(px, py, pz))) return;
          const bi = it.i;
          if (addBlock(px, py, pz, bi)) {
            recordEdit(px, py, pz, bi);  // 改変として記録 (戻っても残る)
            inventory[bi]--;
            updateHotbar();
            startHandSwing();
            if (bi === WATER_INDEX || bi === LAVA_INDEX) flowFrom([key(px, py, pz)]);  // 設置した流体が流れ出す
          }
        }
      }
    });

    addEventListener('mouseup', (e) => {
      if (e.button !== 0) return;
      mouseDown = false;
      breakTargetKey = null;
      breakTargetType = null;
      breakProgress = 0;
      breakBarEl.style.display = 'none';
    });

    addEventListener('contextmenu', (e) => e.preventDefault());

    // ===== 松明 — 灯りの演出 + 周囲の敵Mob湧き潰し (本家準拠) =====
    // 設置するとその場が照らされ、半径 TORCH_SPAWN_RADIUS 以内には敵Mobが湧かない。
    const torches = new Map();          // "x,y,z" → 松明Group
    const torchClickTargets = [];       // レイキャスト対象 (撤去用)
    const TORCH_SPAWN_RADIUS = 8;       // この半径内は敵Mobが湧かない
    const TORCH_SAVE_KEY = 'mc_torches_v1';
    const torchStickGeo = new THREE.BoxGeometry(0.13, 0.55, 0.13);
    const torchStickMat = new THREE.MeshLambertMaterial({ color: 0x6B4A2B });
    const torchTipGeo = new THREE.BoxGeometry(0.17, 0.17, 0.17);
    const torchTipMat = new THREE.MeshLambertMaterial({ color: 0xFFAE3D, emissive: 0xFF9A1C, emissiveIntensity: 1.0 });

    // 近くの松明だけ本物の光源を割り当てる (PointLight を大量に作るとGPU負荷が高いためプール制)
    const TORCH_LIGHT_POOL = 6;
    const torchLights = [];
    for (let i = 0; i < TORCH_LIGHT_POOL; i++) {
      const li = new THREE.PointLight(0xFFB050, 0, 9, 1.6);
      scene.add(li);
      torchLights.push(li);
    }
    let torchLightTimer = 0.5;
    function updateTorchLights(dt) {
      torchLightTimer += dt;
      if (torchLightTimer < 0.5) return;
      torchLightTimer = 0;
      const near = [];
      for (const g of torches.values()) {
        const dx = g.position.x - camera.position.x, dz = g.position.z - camera.position.z;
        near.push({ g, d2: dx * dx + dz * dz });
      }
      near.sort((a, b) => a.d2 - b.d2);
      torchLights.forEach((li, i) => {
        const t = near[i];
        if (t && t.d2 < 40 * 40) { li.position.copy(t.g.position); li.position.y += 0.25; li.intensity = 1.4; }
        else li.intensity = 0;
      });
    }

    // (x,z) が松明に照らされているか? — 敵Mobのスポーン判定に使う
    function isLitByTorch(x, z) {
      const r2 = TORCH_SPAWN_RADIUS * TORCH_SPAWN_RADIUS;
      for (const g of torches.values()) {
        const dx = g.position.x - x, dz = g.position.z - z;
        if (dx * dx + dz * dz <= r2) return true;
      }
      return false;
    }

    // 松明を設置。wallN は壁クリック時の面法線 (壁掛け風に傾ける)。成功で true。
    function placeTorch(x, y, z, wallN, skipSave) {
      const k = key(x, y, z);
      if (blocks.has(k) || torches.has(k)) return false;
      const g = new THREE.Group();
      const stick = new THREE.Mesh(torchStickGeo, torchStickMat);
      stick.position.y = -0.225;     // 棒の下端がマス底 (床) に接地
      const tip = new THREE.Mesh(torchTipGeo, torchTipMat);
      tip.position.y = 0.09;
      g.add(stick); g.add(tip);
      g.position.set(x, y, z);
      if (wallN && wallN.y === 0 && (wallN.x !== 0 || wallN.z !== 0)) {
        // 壁掛け: 壁側に寄せ、先端を壁から離す方向へ傾ける (本家の壁松明風)
        g.position.x -= wallN.x * 0.3;
        g.position.z -= wallN.z * 0.3;
        g.rotation.z = -wallN.x * 0.42;
        g.rotation.x = wallN.z * 0.42;
        g.userData.wallN = { x: wallN.x, z: wallN.z };
      }
      g.userData.torchKey = k;
      scene.add(g);
      torches.set(k, g);
      torchClickTargets.push(g);
      if (!skipSave) saveTorches();
      return true;
    }

    function removeTorchByObject(obj) {
      let g = obj;
      while (g && !g.userData.torchKey) g = g.parent;
      if (!g) return false;
      scene.remove(g);
      torches.delete(g.userData.torchKey);
      const i = torchClickTargets.indexOf(g);
      if (i !== -1) torchClickTargets.splice(i, 1);
      materials.torch++;   // 本家同様、撤去するとアイテムとして戻る
      updateHotbar();
      saveTorches();
      return true;
    }

    function saveTorches() {
      try {
        const arr = [];
        for (const [k, g] of torches) arr.push({ k, n: g.userData.wallN || null });
        localStorage.setItem(TORCH_SAVE_KEY, JSON.stringify(arr));
      } catch (err) { /* 容量超過などは無視 */ }
    }
    (function loadTorches() {
      try {
        const raw = localStorage.getItem(TORCH_SAVE_KEY);
        if (!raw) return;
        for (const t of JSON.parse(raw)) {
          const [x, y, z] = t.k.split(',').map(Number);
          placeTorch(x, y, z, t.n ? { x: t.n.x, y: 0, z: t.n.z } : null, true);
        }
      } catch (err) { /* 壊れたデータは無視 */ }
    })();

    // 村の灯り (街灯・室内の松明) を設置。プレイヤーのセーブには残さない(skipSave)
    for (const t of villageTorches) placeTorch(t.x, t.y, t.z, null, true);

    // ===== トースト表示 (画面下部の一時メッセージ) =====
    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
    }

    // ===== ベッド — 本家準拠: 夜に右クリックで朝までスキップ + リスポーン地点を設定 =====
    function trySleepInBed(info) {
      // リスポーン地点はいつでも設定される (本家同様)
      try {
        localStorage.setItem(RESPAWN_SAVE_KEY, JSON.stringify({ x: info.x, y: info.y + 1, z: info.z }));
      } catch (err) { /* 無視 */ }
      if (daylightStrength() <= 0.05) {
        timeOfDay = 0.25;   // 朝 (日の出) までスキップ
        showToast('ぐっすり眠った。朝になった！（リスポーン地点を設定）');
      } else {
        showToast('リスポーン地点を設定した（眠れるのは夜だけ）');
      }
    }

    // ===== 農業 — 本家準拠: クワで耕す → 種をまく → 成長 → 小麦を収穫 =====
    // 作物は4段階で成長し、最終段階で収穫すると小麦+種、途中で壊すと種だけ戻る。
    const crops = new Map();            // "x,y,z" → 作物Group
    const cropClickTargets = [];        // レイキャスト対象 (収穫用)
    const CROP_STAGE_TIME = 40;         // 1段階の成長秒数 (4段階 = 約2分で成熟)
    const CROP_SAVE_KEY = 'mc_crops_v1';
    const CROP_STAGE_STYLE = [
      { h: 0.25, color: 0x86C95E },   // 芽
      { h: 0.45, color: 0x6FB349 },   // 若葉
      { h: 0.7,  color: 0x5FA13E },   // 生育
      { h: 0.9,  color: 0xD9B44A },   // 成熟 (金色 = 小麦)
    ];
    const _cropPlaneGeo = new THREE.PlaneGeometry(0.9, 1);
    _cropPlaneGeo.translate(0, 0.5, 0);   // 原点を根元に
    let cropSaveTimer = null;

    function cropMesh(stage) {
      const st = CROP_STAGE_STYLE[stage];
      const mat = new THREE.MeshLambertMaterial({ color: st.color, side: THREE.DoubleSide, transparent: true, opacity: 0.95 });
      const g = new THREE.Group();
      const p1 = new THREE.Mesh(_cropPlaneGeo, mat);
      const p2 = new THREE.Mesh(_cropPlaneGeo, mat);
      p2.rotation.y = Math.PI / 2;
      g.add(p1); g.add(p2);
      g.scale.y = st.h;
      return g;
    }

    function plantCrop(x, y, z, stage, t, skipSave) {
      const k = key(x, y, z);
      if (blocks.has(k) || crops.has(k) || torches.has(k)) return false;
      // 下が耕地でなければ植えられない
      const below = blocks.get(key(x, y - 1, z));
      if (!below || below.typeIndex !== FARMLAND_INDEX) return false;
      const g = new THREE.Group();
      g.userData.stage = stage || 0;
      g.userData.t = t || 0;
      g.userData.cropKey = k;
      g.userData.visual = cropMesh(g.userData.stage);
      g.add(g.userData.visual);
      g.position.set(x, y - 0.5, z);   // 根元を耕地の上面に
      scene.add(g);
      crops.set(k, g);
      cropClickTargets.push(g);
      if (!skipSave) scheduleCropSave();
      return true;
    }

    function removeCrop(g, harvest) {
      if (harvest) {
        const p = g.position;
        if (g.userData.stage >= 3) {
          // 成熟: 小麦1 + 種1〜2 (本家準拠)
          spawnItemDrop(p.x, p.y + 0.4, p.z, 'wheat', 1);
          spawnItemDrop(p.x, p.y + 0.4, p.z, 'seeds', 1 + Math.floor(Math.random() * 2));
        } else {
          spawnItemDrop(p.x, p.y + 0.4, p.z, 'seeds', 1);   // 未成熟: 種だけ戻る
        }
      }
      scene.remove(g);
      crops.delete(g.userData.cropKey);
      const i = cropClickTargets.indexOf(g);
      if (i !== -1) cropClickTargets.splice(i, 1);
      scheduleCropSave();
    }

    function updateCrops(dt) {
      for (const g of crops.values()) {
        const ud = g.userData;
        if (ud.stage >= 3) continue;
        ud.t += dt;
        const ns = Math.min(3, Math.floor(ud.t / CROP_STAGE_TIME));
        if (ns !== ud.stage) {
          ud.stage = ns;
          g.remove(ud.visual);
          ud.visual = cropMesh(ns);
          g.add(ud.visual);
          scheduleCropSave();
        }
      }
    }

    function scheduleCropSave() {
      if (cropSaveTimer) clearTimeout(cropSaveTimer);
      cropSaveTimer = setTimeout(() => {
        cropSaveTimer = null;
        try {
          const arr = [];
          for (const [k, g] of crops) arr.push({ k, s: g.userData.stage, t: Math.round(g.userData.t) });
          localStorage.setItem(CROP_SAVE_KEY, JSON.stringify(arr));
        } catch (err) { /* 無視 */ }
      }, 1000);
    }
    (function loadCrops() {
      try {
        const raw = localStorage.getItem(CROP_SAVE_KEY);
        if (!raw) return;
        for (const c of JSON.parse(raw)) {
          const [x, y, z] = c.k.split(',').map(Number);
          // 耕地の存在チェックは植え付け時に行うが、ロード時は地形未生成なのでスキップして直接復元
          const k = key(x, y, z);
          if (crops.has(k)) continue;
          const g = new THREE.Group();
          g.userData.stage = c.s || 0;
          g.userData.t = c.t || 0;
          g.userData.cropKey = k;
          g.userData.visual = cropMesh(g.userData.stage);
          g.add(g.userData.visual);
          g.position.set(x, y - 0.5, z);
          scene.add(g);
          crops.set(k, g);
          cropClickTargets.push(g);
        }
      } catch (err) { /* 無視 */ }
    })();

    // ===== 植林 — 本家準拠: 葉からまれに苗木、草/土に植えると時間経過で木に育つ =====
    const saplings = new Map();          // "x,y,z" → 苗木Group
    const saplingClickTargets = [];
    const SAPLING_GROW_TIME = 90;        // 木になるまでの秒数 (骨粉で即成長)
    const SAPLING_SAVE_KEY = 'mc_saplings_v1';
    const _saplingMat = new THREE.MeshLambertMaterial({ color: 0x4E8A3C, side: THREE.DoubleSide, transparent: true, opacity: 0.95 });
    let saplingSaveTimer = null;

    function saplingMesh() {
      const g = new THREE.Group();
      const p1 = new THREE.Mesh(_cropPlaneGeo, _saplingMat);
      const p2 = new THREE.Mesh(_cropPlaneGeo, _saplingMat);
      p2.rotation.y = Math.PI / 2;
      g.add(p1); g.add(p2);
      g.scale.set(0.7, 0.5, 0.7);
      return g;
    }

    function plantSapling(x, y, z, t, skipSave) {
      const k = key(x, y, z);
      if (blocks.has(k) || saplings.has(k) || crops.has(k) || torches.has(k)) return false;
      const g = new THREE.Group();
      g.userData.t = t || 0;
      g.userData.saplingKey = k;
      g.add(saplingMesh());
      g.position.set(x, y - 0.5, z);   // 根元を地面の上面に
      scene.add(g);
      saplings.set(k, g);
      saplingClickTargets.push(g);
      if (!skipSave) scheduleSaplingSave();
      return true;
    }

    function removeSapling(g, refund) {
      if (refund) spawnItemDrop(g.position.x, g.position.y + 0.4, g.position.z, 'sapling', 1);
      scene.remove(g);
      saplings.delete(g.userData.saplingKey);
      const i = saplingClickTargets.indexOf(g);
      if (i !== -1) saplingClickTargets.splice(i, 1);
      scheduleSaplingSave();
    }

    // 苗木の位置に木を生やす (プレイヤー改変として記録 → セーブ/ストリーミングでも保持)
    function growTreeFromSapling(g) {
      const [x, y, z] = g.userData.saplingKey.split(',').map(Number);
      removeSapling(g, false);
      const trunkH = 4 + Math.floor(Math.random() * 2);
      const top = y + trunkH - 1;
      const put = (bx, by, bz, type) => {
        if (addBlock(bx, by, bz, type)) recordEdit(bx, by, bz, type);
      };
      for (let i = 0; i < trunkH; i++) put(x, y + i, z, 4);          // 幹 (木材)
      for (let dy = -1; dy <= 0; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          for (let dz = -2; dz <= 2; dz++) {
            if (dx === 0 && dz === 0) continue;
            if (Math.abs(dx) === 2 && Math.abs(dz) === 2 && Math.random() < 0.5) continue;
            put(x + dx, top + dy, z + dz, 5);                        // 葉 (下層)
          }
        }
      }
      for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) put(x + dx, top + 1, z + dz, 5);
      put(x, top + 2, z, 5);
    }

    function updateSaplings(dt) {
      for (const g of [...saplings.values()]) {
        g.userData.t += dt;
        if (g.userData.t >= SAPLING_GROW_TIME) growTreeFromSapling(g);
      }
    }

    function scheduleSaplingSave() {
      if (saplingSaveTimer) clearTimeout(saplingSaveTimer);
      saplingSaveTimer = setTimeout(() => {
        saplingSaveTimer = null;
        try {
          const arr = [];
          for (const [k, g] of saplings) arr.push({ k, t: Math.round(g.userData.t) });
          localStorage.setItem(SAPLING_SAVE_KEY, JSON.stringify(arr));
        } catch (err) { /* 無視 */ }
      }, 1000);
    }
    (function loadSaplings() {
      try {
        const raw = localStorage.getItem(SAPLING_SAVE_KEY);
        if (!raw) return;
        for (const sp of JSON.parse(raw)) {
          const [x, y, z] = sp.k.split(',').map(Number);
          plantSapling(x, y, z, sp.t || 0, true);
        }
      } catch (err) { /* 無視 */ }
    })();

    // ===== クリーパー (敵Mob) =====
    const creepers = [];
    let creeperModelTemplate = null;  // GLBがロードされたらここに格納
    const CREEPER_FACING_OFFSET = 0;  // モデルの向きが逆なら Math.PI に
    const creeperBodyGeo = new THREE.BoxGeometry(0.8, 1.0, 0.8);
    const creeperHeadGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const creeperFaceMat = new THREE.MeshLambertMaterial({ color: 0x4DA64D });
    const creeperBodyMat = new THREE.MeshLambertMaterial({ color: 0x4DA64D });
    [
      ['textures/creeper_face.png', creeperFaceMat],
      ['textures/creeper_body.png', creeperBodyMat],
    ].forEach(([url, mat]) => {
      textureLoader.load(url, (tex) => {
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        mat.map = tex;
        mat.color.set(0xffffff);
        mat.needsUpdate = true;
      }, undefined, () => {});
    });

    function creeperGroundY(x, z) {
      const px = Math.round(x);
      const pz = Math.round(z);
      for (let y = 20; y >= BEDROCK_Y; y--) {
        if (isSolidAt(px, y, pz)) return y + 0.5;
      }
      return null;
    }

    // ===== Mob 共通: 環境ダメージ/危険地形の判定 =====
    // 足元 footY・高さ height の胴体セルに溶岩が重なっているか? (全Mob共通の溶岩判定)
    function posTouchingLava(x, footY, z, height) {
      const px = Math.round(x), pz = Math.round(z);
      const loY = Math.round(footY);
      const hiY = Math.round(footY + (height || 1));
      for (let yy = loY; yy <= hiY; yy++) {
        const e = blocks.get(key(px, yy, pz));
        if (e && e.typeIndex === LAVA_INDEX) return true;
      }
      return false;
    }

    // (x,z) の地面の上に水が何ブロック積もっているか — Mob が深い水を避けて溺れないために使う
    function waterDepthAt(x, z) {
      const px = Math.round(x), pz = Math.round(z);
      const gy = creeperGroundY(px, pz);  // 固体の上面 (= solidY + 0.5)
      if (gy === null) return 0;
      let depth = 0;
      let yy = Math.round(gy + 0.5);       // 固体の1つ上のセルから上へ
      while (depth < 8) {
        const e = blocks.get(key(px, yy, pz));
        if (e && e.typeIndex === WATER_INDEX) { depth++; yy++; } else break;
      }
      return depth;
    }
    const MOB_DEEP_WATER = 2;  // この深さ以上の水は Mob が避ける (浅瀬の歩行は許容)

    // (x,y,z) のセルが水ブロックか? — 魚が水中に留まる/陸で窒息する判定に使う
    function isWaterAt(x, y, z) {
      const e = blocks.get(key(Math.round(x), Math.round(y), Math.round(z)));
      return e !== undefined && e.typeIndex === WATER_INDEX;
    }

    // (x,y,z) の真上が空 (固体ブロックに覆われていない) か? — ゾンビが日光で焼ける判定に使う
    function isSkyExposed(x, y, z) {
      const px = Math.round(x), pz = Math.round(z);
      const top = Math.round(y) + 1;
      for (let yy = top; yy <= 40; yy++) {
        if (isSolidAt(px, yy, pz)) return false;
      }
      return true;
    }

    // ===== Mob 共通: 段差の上り下りを瞬間移動でなく、なめらかに(+小さくジャンプして)見せる =====
    const MOB_VERT_SMOOTH = 14;        // 実Yを論理接地高さへ寄せる速さ (大=速い)
    const MOB_VERT_MAX_SPEED = 16;     // 1フレームの縦移動上限(マス/秒)。高い崖でも飛ばさない
    const MOB_STEP_HOP = 0.18;         // 段差を越える瞬間に追加で跳ねる高さ (歩行Mob)
    const MOB_STEP_HOP_DUR = 0.3;      // その跳ねの滞空時間(秒)
    const MOB_STEP_HOP_TRIGGER = 0.4;  // 接地高さがこれ以上変化したら「段差を越えた」とみなしジャンプ

    // 移動先の接地高さをセットし、段差を越えるならジャンプ(stepHopT)を発火させる (全Mob共通)
    function setMobGroundTarget(ud, newY, hopDur) {
      if (ud.groundY !== undefined && Math.abs(newY - ud.groundY) > MOB_STEP_HOP_TRIGGER) {
        ud.stepHopT = hopDur;
      }
      ud.groundY = newY;
    }
    // 実Y(footing)を論理接地高さ ud.groundY へなめらかに寄せ、今回の footing Y を返す。
    // maxDown を渡すと下りの最大速度を別指定できる (滑空Mob = ニワトリ用にゆっくり落とす)。
    function easeMobFootY(ud, curY, dt, maxDown) {
      if (ud.groundY === undefined) ud.groundY = curY;
      const dyG = ud.groundY - curY;
      if (Math.abs(dyG) <= 0.02) return ud.groundY;
      let step = dyG * (1 - Math.exp(-MOB_VERT_SMOOTH * dt));
      const up = MOB_VERT_MAX_SPEED * dt;
      const down = (maxDown !== undefined ? maxDown : MOB_VERT_MAX_SPEED) * dt;
      if (step > up) step = up; else if (step < -down) step = -down;
      return curY + step;
    }
    // 段差ジャンプの弧の高さ (stepHopT を進めて、現在のホップ量を返す)。0→ピーク→0 の滑らかな弧。
    function mobStepHop(ud, dt, hopHeight, hopDur) {
      if (!(ud.stepHopT > 0)) return 0;
      ud.stepHopT = Math.max(0, ud.stepHopT - dt);
      return Math.sin(Math.PI * (1 - ud.stepHopT / hopDur)) * hopHeight;
    }
    // クリーパー/ウォーデン用: グループ全体を groundY へイージング + 段差ジャンプ弧を加える。
    // (受動Mob はモデル本体childだけを跳ねさせるので別処理)
    function stepMobGroupY(group, dt, hopHeight) {
      const ud = group.userData;
      if (ud.footY === undefined) ud.footY = group.position.y;
      ud.footY = easeMobFootY(ud, ud.footY, dt);
      group.position.y = ud.footY + mobStepHop(ud, dt, hopHeight, MOB_STEP_HOP_DUR);
    }

    const CREEPER_RADIUS = 0.4;  // クリーパーの当たり判定半径

    // プレイヤー位置がいずれかのクリーパーと重なるか? (AABB簡易判定)
    function isOverlappingCreeper(x, z, y) {
      const combined = PLAYER_RADIUS + CREEPER_RADIUS;
      for (const c of creepers) {
        const dy = y - c.position.y;
        if (dy < -0.2 || dy > 3.3) continue;  // 上下に離れている
        if (Math.abs(x - c.position.x) < combined &&
            Math.abs(z - c.position.z) < combined) {
          return true;
        }
      }
      return false;
    }

    // プレイヤー位置がいずれかの受動Mob(ブタ・村人・チキン)と重なるか? (すり抜け防止)
    function isOverlappingPassiveMob(x, z, y) {
      for (const m of passiveMobs) {
        const def = m.userData.def;
        const combined = PLAYER_RADIUS + (m.userData.radius || 0.35);
        const dy = y - m.position.y;  // プレイヤー目線Y - Mob足元Y
        if (dy < -0.5 || dy > def.height + 1.6) continue;  // 上下に離れている
        if (Math.abs(x - m.position.x) < combined &&
            Math.abs(z - m.position.z) < combined) {
          return true;
        }
      }
      return false;
    }

    function spawnCreeper(x, z) {
      let group;
      if (creeperModelTemplate) {
        group = creeperModelTemplate.clone(true);
      } else {
        // GLB ロード前 or 失敗時の箱型フォールバック
        group = new THREE.Group();
        const body = new THREE.Mesh(creeperBodyGeo, creeperBodyMat);
        body.position.y = 0.5;
        group.add(body);
        const head = new THREE.Mesh(creeperHeadGeo, creeperFaceMat);
        head.position.y = 1.4;
        group.add(head);
      }
      // 個別フラッシュのため、各メッシュのマテリアルをこの個体専用にクローン
      group.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.userData.creeperGroup = group;
        if (Array.isArray(obj.material)) {
          obj.material = obj.material.map(m => m.clone());
          obj.userData.origColors = obj.material.map(m => m.color.clone());
        } else if (obj.material) {
          obj.material = obj.material.clone();
          obj.userData.origColors = [obj.material.color.clone()];
        }
      });
      const y = creeperGroundY(x, z);
      group.position.set(x, y !== null ? y : 5, z);
      group.userData.hp = CREEPER_HP;        // 環境ダメージ(溶岩)用のHP。プレイヤーの攻撃は即死のまま
      group.userData.hitFlash = 0;
      group.userData.lavaTimer = LAVA_DAMAGE_INTERVAL;
      group.userData.groundY = (y !== null ? y : 5);  // 論理接地高さ (段差をなめらかに上り下り)
      group.userData.footY = group.position.y;          // イージング中の実フッティングY
      group.userData.stepHopT = 0;                      // 段差ジャンプの残り時間
      scene.add(group);
      creepers.push(group);
    }

    // 白フラッシュ: intensity 0=元の色, 1=完全白
    function setCreeperFlash(group, intensity) {
      group.traverse((obj) => {
        if (!obj.isMesh || !obj.userData.origColors) return;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        const origs = obj.userData.origColors;
        for (let i = 0; i < mats.length; i++) {
          const orig = origs[i];
          mats[i].color.setRGB(
            orig.r + (1 - orig.r) * intensity,
            orig.g + (1 - orig.g) * intensity,
            orig.b + (1 - orig.b) * intensity,
          );
        }
      });
    }

    // シュー音 (起爆中) - Web Audio API のホワイトノイズ + ハイパス
    function startCreeperHiss(c) {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * (FUSE_DURATION + 0.2)), ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 3500;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.04, now);
      gain.gain.linearRampToValueAtTime(0.25, now + FUSE_DURATION);
      src.connect(filter).connect(gain).connect(ctx.destination);
      src.start(now);
      c.userData.hissSrc = src;
      c.userData.hissGain = gain;
    }

    function stopCreeperHiss(c) {
      if (!c.userData.hissSrc) return;
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      try {
        c.userData.hissGain.gain.cancelScheduledValues(now);
        c.userData.hissGain.gain.setValueAtTime(c.userData.hissGain.gain.value, now);
        c.userData.hissGain.gain.linearRampToValueAtTime(0, now + 0.05);
        c.userData.hissSrc.stop(now + 0.08);
      } catch (e) {/* 既に停止 */}
      c.userData.hissSrc = null;
      c.userData.hissGain = null;
    }

    function killCreeper(group, drop) {
      if (drop) {
        dropMobLoot('creeper', group.position.x, group.position.y, group.position.z);
        spawnXPOrbs(group.position.x, group.position.y + 0.5, group.position.z, 5);
      }
      stopCreeperHiss(group);  // 撃破時もシュー音停止
      scene.remove(group);
      const idx = creepers.indexOf(group);
      if (idx !== -1) creepers.splice(idx, 1);
    }

    // GLB モデルを非同期ロード → 完了後にプレイヤー周囲へ初期スポーン
    function spawnInitialCreepers() {
      creepersReady = true;
      let guard = 0;
      while (creepers.length < CREEPER_TARGET && guard++ < 40) trySpawnCreeperNearPlayer();
    }
    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      '3D/Creeper.glb',
      (gltf) => {
        const model = gltf.scene;
        // 自動スケール (高さ1.8マスに正規化)
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        if (size.y > 0) {
          const scale = 1.8 / size.y;
          model.scale.setScalar(scale);
        }
        // モデルローカルで「足元 = y=0」になるようシフト
        model.updateMatrixWorld();
        const box2 = new THREE.Box3().setFromObject(model);
        model.position.y -= box2.min.y;
        model.rotation.y = CREEPER_FACING_OFFSET;
        // ラッパーGroupで包む: spawnCreeperでwrapper.position.set()しても
        // 内側モデルの足元オフセットが上書きされない
        const wrapper = new THREE.Group();
        wrapper.add(model);
        creeperModelTemplate = wrapper;
        spawnInitialCreepers();
      },
      undefined,
      (err) => {
        console.warn('Creeper.glb ロード失敗、箱型でフォールバック:', err);
        spawnInitialCreepers();
      }
    );

    const CREEPER_SPEED = 1.5;
    const CREEPER_SIGHT = 25;         // この距離以内なら追ってくる
    const CREEPER_STEP_HEIGHT = 1.1;  // この高さまで登れる
    const CREEPER_BODY_HEIGHT = 1.8;  // 溶岩判定に使う胴体の高さ (GLB正規化値)
    const CREEPER_HP = 6;             // 溶岩など環境ダメージ用 (約1.5秒で焼死)
    const FUSE_RANGE = 3.0;           // この距離内で導火線開始
    const FUSE_DURATION = 1.5;        // 起爆までの秒数
    const FUSE_CANCEL_RANGE = 5.0;    // この距離以上離れると起爆キャンセル
    const EXPLOSION_RADIUS = 3.0;     // 爆発でブロック破壊する半径
    const EXPLOSION_MAX_DAMAGE = 18;  // ゼロ距離での最大ダメージ

    // ===== クリーパーの個体数管理 (無限ワールド: 周囲に湧かせ、遠ざかると消す) =====
    const CREEPER_TARGET = 10;        // プレイヤー周囲に保つ個体数
    const CREEPER_SPAWN_MIN = 28;     // この距離より近くには湧かない (視界25の外側)
    const CREEPER_SPAWN_MAX = 55;     // この距離より遠くには湧かない (LOAD_RADIUS=66 以内)
    const CREEPER_DESPAWN_DIST = 72;  // この距離以上離れたら消す (地形がアンロードされる前に)
    const CREEPER_SPAWN_INTERVAL = 3; // 補充判定の間隔 (秒)
    let creepersReady = false;        // GLBロード後に true
    let creeperSpawnTimer = 0;

    // プレイヤーの周囲(リング状)の地面にクリーパーを1体湧かせる
    function trySpawnCreeperNearPlayer() {
      for (let attempt = 0; attempt < 8; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = CREEPER_SPAWN_MIN + Math.random() * (CREEPER_SPAWN_MAX - CREEPER_SPAWN_MIN);
        const x = Math.round(camera.position.x + Math.cos(ang) * dist);
        const z = Math.round(camera.position.z + Math.sin(ang) * dist);
        if (creeperGroundY(x, z) !== null && waterDepthAt(x, z) < MOB_DEEP_WATER && !isLitByTorch(x, z)) { spawnCreeper(x, z); return true; }
      }
      return false;
    }

    // 遠い個体を消し、不足ぶんを定期補充する
    function manageCreepers(dt) {
      if (!creepersReady) return;
      const D2 = CREEPER_DESPAWN_DIST * CREEPER_DESPAWN_DIST;
      for (let i = creepers.length - 1; i >= 0; i--) {
        const c = creepers[i];
        if (c.userData.fuseTime > 0) continue;  // 起爆中は消さない
        const dx = camera.position.x - c.position.x;
        const dz = camera.position.z - c.position.z;
        if (dx * dx + dz * dz > D2) killCreeper(c);
      }
      creeperSpawnTimer += dt;
      if (creeperSpawnTimer >= CREEPER_SPAWN_INTERVAL) {
        creeperSpawnTimer = 0;
        if (creepers.length < CREEPER_TARGET) trySpawnCreeperNearPlayer();
      }
    }

    // ===== ウォーデン (最凶の敵Mob) =====
    // 本家準拠: 巨大な当たり判定(幅0.9×高さ2.9)、超高HP、即死級の近接攻撃、
    // 防具/壁を貫通する遠距離ソニックブーム。視界に頼らず執拗にプレイヤーを追う。
    const wardens = [];
    const wardenColliders = [];   // 不可視ボックス (クリック判定の単一ソース = 正確な当たり判定)
    const _wardenColliderMat = new THREE.MeshBasicMaterial({ visible: false });
    let wardenModelTemplate = null;
    let wardensReady = false;

    const WARDEN_WIDTH = 0.9;            // 当たり判定の幅 (本家: 0.9)
    const WARDEN_HEIGHT = 2.9;           // 当たり判定の高さ (本家: 2.9)
    const WARDEN_RADIUS = WARDEN_WIDTH / 2;
    const WARDEN_FACING_OFFSET = 0;      // モデルの正面が逆なら Math.PI
    const WARDEN_HP = 140;               // 非常にタフ (剣でも数十発)
    const WARDEN_SPEED = 3.5;            // 速い。歩きでは引き離せず、ダッシュでやっと逃げられる
    const WARDEN_STEP_HEIGHT = 1.2;      // 登れる段差
    const WARDEN_SIGHT = 45;             // この距離以内なら必ず気づいて追う
    const WARDEN_MELEE_RANGE = 2.8;      // 近接攻撃の届く距離 (体が大きいのでリーチ長め)
    const WARDEN_MELEE_DAMAGE = 16;      // 近接の一撃 (満タンHP20をほぼ持っていく)
    const WARDEN_MELEE_COOLDOWN = 1.1;   // 近接の間隔(秒)
    const WARDEN_RETALIATE_DURATION = 6; // モブに攻撃されたら、この秒数だけそのモブを優先標的にして反撃する
    const WARDEN_SONIC_MIN = 6;          // この距離以上でソニックブームを使う
    const WARDEN_SONIC_MAX = 30;         // この距離以内でソニックブーム
    const WARDEN_SONIC_DAMAGE = 8;       // ソニックブーム (防御無視)
    const WARDEN_SONIC_COOLDOWN = 4.5;   // ソニックブームの間隔(秒)
    const WARDEN_SONIC_CHARGE = 0.9;     // 発射前のチャージ時間(秒)
    const WARDEN_TARGET = 1;             // 周囲に保つ個体数 (1体でも十分な脅威)
    const WARDEN_SPAWN_MIN = 28;
    const WARDEN_SPAWN_MAX = 50;
    const WARDEN_DESPAWN_DIST = 72;
    const WARDEN_SPAWN_INTERVAL = 8;     // 補充判定の間隔(秒) - 出現は控えめ
    let wardenSpawnTimer = 0;

    const wardenDarknessEl = document.getElementById('warden-darkness');
    const wardenBossbarEl = document.getElementById('warden-bossbar');
    const wardenBossfillEl = document.getElementById('warden-bossfill');

    // プレイヤー位置がいずれかのウォーデンと重なるか? (体当たりすり抜け防止)
    function isOverlappingWarden(x, z, y) {
      const combined = PLAYER_RADIUS + WARDEN_RADIUS;
      for (const w of wardens) {
        const dy = y - w.position.y;
        if (dy < -0.4 || dy > WARDEN_HEIGHT + 1.0) continue;
        if (Math.abs(x - w.position.x) < combined && Math.abs(z - w.position.z) < combined) return true;
      }
      return false;
    }

    function spawnWarden(x, z) {
      if (!wardenModelTemplate) return;
      const group = wardenModelTemplate.clone(true);
      // 個別フラッシュのため各メッシュのマテリアルをこの個体専用にクローン
      group.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.userData.wardenGroup = group;
        if (Array.isArray(obj.material)) {
          obj.material = obj.material.map(m => m.clone());
          obj.userData.origColors = obj.material.map(m => m.color.clone());
        } else if (obj.material) {
          obj.material = obj.material.clone();
          obj.userData.origColors = [obj.material.color.clone()];
        }
      });
      // 不可視ボックスコライダ (クリック判定 = 本家準拠サイズ)
      const collider = new THREE.Mesh(new THREE.BoxGeometry(WARDEN_WIDTH, WARDEN_HEIGHT, WARDEN_WIDTH), _wardenColliderMat);
      collider.position.y = WARDEN_HEIGHT / 2;
      collider.visible = false;
      collider.userData.wardenGroup = group;
      group.add(collider);
      group.userData.collider = collider;
      wardenColliders.push(collider);
      const y = creeperGroundY(x, z);
      group.position.set(x, y !== null ? y : 5, z);
      group.userData.hp = WARDEN_HP;
      group.userData.maxHp = WARDEN_HP;
      group.userData.hitFlash = 0;
      group.userData.meleeCd = 0;
      group.userData.sonicCd = WARDEN_SONIC_COOLDOWN * (0.5 + Math.random());
      group.userData.sonicCharge = 0;   // >0 のときチャージ中(動けない)
      group.userData.heartTimer = 0;
      group.userData.lavaTimer = LAVA_DAMAGE_INTERVAL;
      group.userData.targetMob = null;     // 反撃対象のモブ (なければプレイヤーを狙う)
      group.userData.retaliateTimer = 0;   // 反撃の残り時間(秒)
      group.userData.groundY = (y !== null ? y : 5);  // 論理接地高さ (段差をなめらかに上り下り)
      group.userData.footY = group.position.y;          // イージング中の実フッティングY
      group.userData.stepHopT = 0;
      scene.add(group);
      wardens.push(group);
    }

    function killWarden(group, drop) {
      if (drop) {
        dropMobLoot('warden', group.position.x, group.position.y, group.position.z);
        spawnXPOrbs(group.position.x, group.position.y + 1, group.position.z, 50);  // ボス級の大量XP
      }
      scene.remove(group);
      const idx = wardens.indexOf(group);
      if (idx !== -1) wardens.splice(idx, 1);
      const ci = wardenColliders.indexOf(group.userData.collider);
      if (ci !== -1) wardenColliders.splice(ci, 1);
    }

    function _wardenDist(group) {
      const dx = camera.position.x - group.position.x;
      const dy = camera.position.y - group.position.y;
      const dz = camera.position.z - group.position.z;
      return Math.sqrt(dx * dx + dy * dy + dz * dz);
    }

    // クリック攻撃: ダメージ → フラッシュ → 0で死亡
    function hitWarden(group, damage, attacker) {
      group.userData.hp -= (damage || 4);
      group.userData.hitFlash = 0.5;
      // モブに殴られたら、そのモブを標的にして一定時間 反撃する
      if (attacker && attacker.parent) {
        group.userData.targetMob = attacker;
        group.userData.retaliateTimer = WARDEN_RETALIATE_DURATION;
      }
      const d = _wardenDist(group);
      if (group.userData.hp <= 0) { playWardenSound('death', d); killWarden(group, true); }
      else playWardenSound('hurt', d);
    }

    function trySpawnWardenNearPlayer() {
      for (let attempt = 0; attempt < 8; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = WARDEN_SPAWN_MIN + Math.random() * (WARDEN_SPAWN_MAX - WARDEN_SPAWN_MIN);
        const x = Math.round(camera.position.x + Math.cos(ang) * dist);
        const z = Math.round(camera.position.z + Math.sin(ang) * dist);
        if (creeperGroundY(x, z) !== null && waterDepthAt(x, z) < MOB_DEEP_WATER) { spawnWarden(x, z); return true; }
      }
      return false;
    }

    function spawnInitialWardens() {
      wardensReady = true;
      let guard = 0;
      while (wardens.length < WARDEN_TARGET && guard++ < 40) trySpawnWardenNearPlayer();
    }

    function manageWardens(dt) {
      if (!wardensReady) return;
      const D2 = WARDEN_DESPAWN_DIST * WARDEN_DESPAWN_DIST;
      for (let i = wardens.length - 1; i >= 0; i--) {
        const w = wardens[i];
        if (w.userData.sonicCharge > 0) continue;  // チャージ中は消さない
        const dx = camera.position.x - w.position.x;
        const dz = camera.position.z - w.position.z;
        if (dx * dx + dz * dz > D2) killWarden(w);
      }
      wardenSpawnTimer += dt;
      if (wardenSpawnTimer >= WARDEN_SPAWN_INTERVAL) {
        wardenSpawnTimer = 0;
        if (wardens.length < WARDEN_TARGET) trySpawnWardenNearPlayer();
      }
    }

    // ソニックブームの視覚エフェクト (ウォーデン→プレイヤーへ伸びて広がる衝撃波)
    const sonicBeams = [];
    function spawnSonicBeam(w, to) {
      const from = new THREE.Vector3(w.position.x, w.position.y + WARDEN_HEIGHT * 0.6, w.position.z);
      const dir = to.clone().sub(from);
      const len = Math.max(0.5, dir.length());
      const geo = new THREE.BoxGeometry(0.5, 0.5, len);
      const mat = new THREE.MeshBasicMaterial({ color: 0x6fe3ff, transparent: true, opacity: 0.75, depthWrite: false });
      const beam = new THREE.Mesh(geo, mat);
      beam.position.copy(from).add(dir.clone().multiplyScalar(0.5));
      beam.lookAt(to);
      beam.raycast = () => {};
      scene.add(beam);
      sonicBeams.push({ mesh: beam, life: 0.35, maxLife: 0.35 });
    }
    function updateSonicBeams(dt) {
      for (let i = sonicBeams.length - 1; i >= 0; i--) {
        const b = sonicBeams[i];
        b.life -= dt;
        const t = Math.max(0, b.life / b.maxLife);
        b.mesh.material.opacity = 0.75 * t;
        const grow = 1 + (1 - t) * 4;
        b.mesh.scale.set(grow, grow, 1);
        if (b.life <= 0) {
          scene.remove(b.mesh);
          b.mesh.geometry.dispose();
          b.mesh.material.dispose();
          sonicBeams.splice(i, 1);
        }
      }
    }

    // ウォーデンの口元→プレイヤー目線の間に固体ブロック(壁など)があるか調べる。
    // 障害物に遮られていれば、ソニックブームは透過してダメージを与えない。
    // 戻り値: { blocked, point } point は遮蔽点(壁の手前) or プレイヤー位置 (=ビームの終点)
    function sonicLineOfSight(w) {
      const fromX = w.position.x, fromY = w.position.y + WARDEN_HEIGHT * 0.6, fromZ = w.position.z;
      const toX = camera.position.x, toY = camera.position.y, toZ = camera.position.z;
      const dx = toX - fromX, dy = toY - fromY, dz = toZ - fromZ;
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 0.0001;
      const steps = Math.ceil(dist / 0.25);  // 0.25マス間隔で走査 (1マスの壁を取りこぼさない細かさ)
      const ix = dx / steps, iy = dy / steps, iz = dz / steps;
      let px = fromX, py = fromY, pz = fromZ;
      // 端点(ウォーデン自身・プレイヤー自身のマス)は除外して途中だけ調べる
      for (let s = 1; s < steps; s++) {
        px += ix; py += iy; pz += iz;
        if (isSolidAt(Math.round(px), Math.round(py), Math.round(pz))) {
          // 壁の手前で止める (ビームは壁にぶつかって消える見た目に)
          return { blocked: true, point: new THREE.Vector3(px - ix, py - iy, pz - iz) };
        }
      }
      return { blocked: false, point: new THREE.Vector3(toX, toY, toZ) };
    }

    function fireSonicBoom(w, dist) {
      playWardenSound('sonic-fire', dist);
      const los = sonicLineOfSight(w);
      spawnSonicBeam(w, los.point);  // 遮られた時は壁の手前までしか伸ばさない
      // 壁などの障害物に遮られていなければダメージ (透過して当てることはない)
      if (!los.blocked && dist < WARDEN_SONIC_MAX + 5) damagePlayer(WARDEN_SONIC_DAMAGE, true);
    }

    function updateWardenHUD(nearest, dist) {
      if (nearest && dist < WARDEN_SIGHT) {
        const frac = Math.max(0, nearest.userData.hp / nearest.userData.maxHp);
        wardenBossbarEl.style.display = 'block';
        wardenBossfillEl.style.width = `${frac * 100}%`;
        // 近いほど画面を暗く (本家の暗闇エフェクト風)
        const dark = Math.max(0, 1 - dist / WARDEN_SIGHT) * 0.55;
        wardenDarknessEl.style.opacity = dark.toFixed(2);
      } else {
        wardenBossbarEl.style.display = 'none';
        wardenDarknessEl.style.opacity = '0';
      }
    }

    function updateWardens(dt) {
      let nearest = null, nearestDist = Infinity;
      for (let i = wardens.length - 1; i >= 0; i--) {
        const w = wardens[i];
        const ud = w.userData;
        // 溶岩ダメージ (全Mob共通)
        if (posTouchingLava(w.position.x, w.position.y, w.position.z, WARDEN_HEIGHT)) {
          ud.lavaTimer += dt;
          if (ud.lavaTimer >= LAVA_DAMAGE_INTERVAL) {
            ud.lavaTimer = 0;
            ud.hp -= LAVA_DAMAGE;
            ud.hitFlash = 0.6;
            if (ud.hp <= 0) { killWarden(w); continue; }
          }
        } else {
          ud.lavaTimer = LAVA_DAMAGE_INTERVAL;
        }
        // 被弾フラッシュの減衰
        if (ud.hitFlash > 0) { ud.hitFlash = Math.max(0, ud.hitFlash - dt * 2); setCreeperFlash(w, ud.hitFlash); }

        // 段差の上り下りをなめらかに (巨体なので跳ねずに滑らかに昇降のみ: hop=0)
        stepMobGroupY(w, dt, 0);

        const dx = camera.position.x - w.position.x;
        const dz = camera.position.z - w.position.z;
        const dy = camera.position.y - w.position.y;
        const horiz = Math.sqrt(dx * dx + dz * dz) || 0.0001;
        const dist = Math.sqrt(horiz * horiz + dy * dy);
        if (dist < nearestDist) { nearestDist = dist; nearest = w; }

        // クールダウン進行
        ud.meleeCd = Math.max(0, ud.meleeCd - dt);
        ud.sonicCd = Math.max(0, ud.sonicCd - dt);

        // --- モブへの反撃: 自分を攻撃してきたモブを一定時間 優先的に狙う ---
        if (ud.retaliateTimer > 0) ud.retaliateTimer -= dt;
        let tm = ud.targetMob;
        // 対象が消滅 / 撃破 / 時間切れ なら標的解除してプレイヤーへ戻る
        if (tm && (!tm.parent || tm.userData.hp <= 0 || ud.retaliateTimer <= 0)) {
          tm = ud.targetMob = null;
        }
        if (tm) {
          const mdx = tm.position.x - w.position.x;
          const mdz = tm.position.z - w.position.z;
          const mdy = tm.position.y - w.position.y;
          const mhoriz = Math.sqrt(mdx * mdx + mdz * mdz) || 0.0001;
          const mdist = Math.sqrt(mhoriz * mhoriz + mdy * mdy);
          w.rotation.y = Math.atan2(mdx, mdz) + WARDEN_FACING_OFFSET;  // モブの方を向く
          if (mdist < WARDEN_MELEE_RANGE && Math.abs(mdy) < 3) {
            // 近接圏: モブを殴る (一撃が重いので大抵は即撃破 = 本家準拠)
            if (ud.meleeCd <= 0) {
              hitPassiveMob(tm, WARDEN_MELEE_DAMAGE);
              ud.meleeCd = WARDEN_MELEE_COOLDOWN;
              playWardenSound('roar', _wardenDist(w));
              w.scale.setScalar(1.1);
              setTimeout(() => { if (w.parent) w.scale.setScalar(1); }, 120);
            }
          } else {
            // 接近: モブへ直進 (崖・深い水は避ける)
            const mnx = mdx / mhoriz, mnz = mdz / mhoriz;
            const newX = w.position.x + mnx * WARDEN_SPEED * dt;
            const newZ = w.position.z + mnz * WARDEN_SPEED * dt;
            const newY = creeperGroundY(newX, newZ);
            if (newY !== null && newY - ud.groundY <= WARDEN_STEP_HEIGHT && waterDepthAt(newX, newZ) < MOB_DEEP_WATER) {
              w.position.x = newX; w.position.z = newZ; setMobGroundTarget(ud, newY, MOB_STEP_HOP_DUR);
            }
          }
          continue;  // 反撃中はプレイヤーを無視
        }

        // 常にプレイヤーの方を向く (視界に頼らず追跡)
        w.rotation.y = Math.atan2(dx, dz) + WARDEN_FACING_OFFSET;

        if (dist > WARDEN_SIGHT) continue;

        // 心音 (近いほど速く打つ) - ウォーデン最大の恐怖演出
        ud.heartTimer -= dt;
        if (ud.heartTimer <= 0) {
          ud.heartTimer = 0.45 + (Math.min(dist, WARDEN_SIGHT) / WARDEN_SIGHT) * 1.1;
          if (controls.isLocked) playWardenSound('heartbeat', dist);
        }

        // ソニックブームのチャージ中は動かず、終わったら発射
        if (ud.sonicCharge > 0) {
          ud.sonicCharge -= dt;
          const wob = 1 + Math.sin(performance.now() * 0.05) * 0.04;
          w.scale.setScalar(wob);
          if (ud.sonicCharge <= 0) {
            w.scale.setScalar(1);
            fireSonicBoom(w, dist);
            ud.sonicCd = WARDEN_SONIC_COOLDOWN;
          }
          continue;
        }

        // 近接攻撃 (張り付いて殴る)
        if (dist < WARDEN_MELEE_RANGE && Math.abs(dy) < 3) {
          if (ud.meleeCd <= 0) {
            damagePlayer(WARDEN_MELEE_DAMAGE);
            ud.meleeCd = WARDEN_MELEE_COOLDOWN;
            playWardenSound('roar', dist);
            w.scale.setScalar(1.1);
            setTimeout(() => { if (w.parent) w.scale.setScalar(1); }, 120);
          }
          continue;  // 近接圏では追わず張り付く
        }

        // 中距離ならソニックブームをチャージ開始
        if (horiz > WARDEN_SONIC_MIN && dist < WARDEN_SONIC_MAX && ud.sonicCd <= 0) {
          ud.sonicCharge = WARDEN_SONIC_CHARGE;
          playWardenSound('sonic-charge', dist);
          continue;
        }

        // 通常移動: プレイヤーへ直進
        const nx = dx / horiz, nz = dz / horiz;
        const newX = w.position.x + nx * WARDEN_SPEED * dt;
        const newZ = w.position.z + nz * WARDEN_SPEED * dt;
        const newY = creeperGroundY(newX, newZ);
        if (newY === null) continue;
        if (newY - ud.groundY > WARDEN_STEP_HEIGHT) continue;  // 論理接地高さで段差判定
        if (waterDepthAt(newX, newZ) >= MOB_DEEP_WATER) continue;  // 深い水は避ける (溺れ防止)
        w.position.x = newX;
        w.position.z = newZ;
        setMobGroundTarget(ud, newY, MOB_STEP_HOP_DUR);  // 実Yは stepMobGroupY が追従
      }
      updateWardenHUD(nearest, nearestDist);
    }

    // ウォーデンの効果音 (Web Audio 合成): 心音・咆哮・被弾・死亡・ソニックブーム
    function playWardenSound(kind, dist) {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const RANGE = 42;
      let att = 1 - (dist || 0) / RANGE;
      if (att <= 0.02) return;
      att = Math.min(1, att);

      if (kind === 'heartbeat') {
        for (const off of [0, 0.17]) {   // "ドッ・ドッ" の2連
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(72, now + off);
          o.frequency.exponentialRampToValueAtTime(36, now + off + 0.14);
          g.gain.setValueAtTime(0.0001, now + off);
          g.gain.exponentialRampToValueAtTime(0.5 * att, now + off + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, now + off + 0.19);
          o.connect(g).connect(ctx.destination);
          o.start(now + off); o.stop(now + off + 0.22);
        }
        return;
      }

      if (kind === 'roar' || kind === 'hurt' || kind === 'death') {
        const dur = kind === 'death' ? 1.1 : (kind === 'roar' ? 0.6 : 0.4);
        const endF = kind === 'death' ? 50 : 80;
        const base = kind === 'death' ? 150 : 210;
        const o = ctx.createOscillator();
        const o2 = ctx.createOscillator();
        const g = ctx.createGain();
        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 620; lp.Q.value = 4;
        o.type = 'sawtooth'; o2.type = 'square';
        o.frequency.setValueAtTime(base, now);
        o.frequency.exponentialRampToValueAtTime(endF, now + dur);
        o2.frequency.setValueAtTime(base * 0.5, now);
        o2.frequency.exponentialRampToValueAtTime(endF * 0.5, now + dur);
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(0.5 * att, now + 0.05);
        g.gain.setValueAtTime(0.5 * att, now + dur * 0.5);
        g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        o.connect(lp); o2.connect(lp); lp.connect(g).connect(ctx.destination);
        o.start(now); o.stop(now + dur + 0.02);
        o2.start(now); o2.stop(now + dur + 0.02);
        return;
      }

      if (kind === 'sonic-charge') {   // 上昇する不気味なチャージ音
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(180, now);
        o.frequency.exponentialRampToValueAtTime(720, now + WARDEN_SONIC_CHARGE);
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(0.22 * att, now + 0.1);
        g.gain.setValueAtTime(0.22 * att, now + WARDEN_SONIC_CHARGE * 0.8);
        g.gain.exponentialRampToValueAtTime(0.0001, now + WARDEN_SONIC_CHARGE);
        o.connect(g).connect(ctx.destination);
        o.start(now); o.stop(now + WARDEN_SONIC_CHARGE + 0.02);
        return;
      }

      if (kind === 'sonic-fire') {   // 下降スイープ + ノイズ衝撃
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(950, now);
