    // ===== 爆発パーティクル =====
    const explosionParticles = [];
    const _particleGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);

    function spawnExplosionParticles(x, y, z) {
      const COUNT = 24;
      for (let i = 0; i < COUNT; i++) {
        const mat = new THREE.MeshBasicMaterial({
          color: i % 2 === 0 ? 0xff7733 : 0xffcc44,
          transparent: true,
          opacity: 1,
        });
        const p = new THREE.Mesh(_particleGeo, mat);
        p.position.set(x, y, z);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const speed = 4 + Math.random() * 5;
        p.userData.velocity = {
          x: Math.cos(theta) * Math.sin(phi) * speed,
          y: Math.cos(phi) * speed + 3,
          z: Math.sin(theta) * Math.sin(phi) * speed,
        };
        const life = 0.7 + Math.random() * 0.4;
        p.userData.life = life;
        p.userData.maxLife = life;
        scene.add(p);
        explosionParticles.push(p);
      }
    }

    function updateExplosionParticles(dt) {
      for (let i = explosionParticles.length - 1; i >= 0; i--) {
        const p = explosionParticles[i];
        p.position.x += p.userData.velocity.x * dt;
        p.position.y += p.userData.velocity.y * dt;
        p.position.z += p.userData.velocity.z * dt;
        p.userData.velocity.y -= 18 * dt;
        p.userData.life -= dt;
        p.material.opacity = Math.max(0, p.userData.life / p.userData.maxLife);
        if (p.userData.life <= 0) {
          scene.remove(p);
          p.material.dispose();
          explosionParticles.splice(i, 1);
        }
      }
    }

    function playExplosionSound() {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      // 低周波の爆発トーン
      const osc = ctx.createOscillator();
      const og = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(90, now);
      osc.frequency.exponentialRampToValueAtTime(25, now + 0.5);
      og.gain.setValueAtTime(0.35, now);
      og.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      osc.connect(og).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.65);
      // ホワイトノイズの破裂音
      const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.5), ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / data.length * 3.5);
      }
      const ns = ctx.createBufferSource();
      ns.buffer = buf;
      const ng = ctx.createGain();
      ng.gain.value = 0.22;
      ns.connect(ng).connect(ctx.destination);
      ns.start(now);
    }

    // 村人の声 (本家の鼻にかかった "ンー/フムッ" グラントを合成)
    // kind: 'ambient' | 'hurt' | 'death' / dist: プレイヤーからの距離 (音量減衰)
    function playVillagerSound(kind, dist) {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const RANGE = 18;                              // この距離でほぼ無音
      const att = (dist == null) ? 1 : Math.max(0, 1 - dist / RANGE);
      if (att <= 0.02) return;

      // 種類ごとの基音・長さ・音量・コンター
      let base, dur, peak;
      if (kind === 'hurt')      { base = 200 + Math.random() * 40; dur = 0.26; peak = 0.5; }
      else if (kind === 'death'){ base = 175;                      dur = 0.7;  peak = 0.5; }
      else                      { base = 130 + Math.random() * 55; dur = 0.34 + Math.random() * 0.12; peak = 0.4; }

      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';                         // 母音のような倍音の豊かさ
      // 鼻音フォルマント (共鳴ローパス)
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 850;
      lp.Q.value = 7;
      const g = ctx.createGain();

      // 音高コンター
      osc.frequency.setValueAtTime(base, now);
      if (kind === 'hurt') {
        osc.frequency.exponentialRampToValueAtTime(base * 1.25, now + 0.04);
        osc.frequency.exponentialRampToValueAtTime(base * 0.7,  now + dur);
      } else if (kind === 'death') {
        osc.frequency.exponentialRampToValueAtTime(base * 0.45, now + dur);
      } else { // ambient: 軽く上がって下がる "ンー↗↘"
        osc.frequency.exponentialRampToValueAtTime(base * 1.18, now + dur * 0.35);
        osc.frequency.exponentialRampToValueAtTime(base * 0.85, now + dur);
      }

      // ごく軽いビブラート (声の揺れ)
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.frequency.value = 13;
      lfoG.gain.value = base * 0.03;
      lfo.connect(lfoG).connect(osc.frequency);

      // 振幅エンベロープ
      const vol = peak * att;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(vol, now + 0.03);
      g.gain.setValueAtTime(vol, now + dur * 0.55);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dur);

      osc.connect(lp).connect(g).connect(ctx.destination);
      osc.start(now);  osc.stop(now + dur + 0.02);
      lfo.start(now);  lfo.stop(now + dur + 0.02);
    }

    // 汎用爆発 (クリーパー・TNT 共用): 指定座標で爆発し周囲に被害を与える
    function explodeAt(cx, cy, cz) {
      // プレイヤーダメージ (距離減衰)
      const dPX = camera.position.x - cx;
      const dPY = camera.position.y - cy;
      const dPZ = camera.position.z - cz;
      const distToPlayer = Math.sqrt(dPX * dPX + dPY * dPY + dPZ * dPZ);
      if (distToPlayer < EXPLOSION_RADIUS + 1.5) {
        const dmg = Math.floor(EXPLOSION_MAX_DAMAGE * (1 - distToPlayer / (EXPLOSION_RADIUS + 1.5)));
        if (dmg > 0) damagePlayer(dmg, true);
      }
      // 受動Mob (ブタ・村人・チキン) を巻き込み撃破
      for (let i = passiveMobs.length - 1; i >= 0; i--) {
        const m = passiveMobs[i];
        const mh = (m.userData.def.height || 1) / 2;
        const d = Math.hypot(m.position.x - cx, (m.position.y + mh) - cy, m.position.z - cz);
        if (d < EXPLOSION_RADIUS + 1) killPassiveMob(m);
      }
      // 圏内のクリーパーを除去 (連鎖の暴発を避けるため即時除去)
      for (let i = creepers.length - 1; i >= 0; i--) {
        const c = creepers[i];
        const d = Math.hypot(c.position.x - cx, (c.position.y + 0.9) - cy, c.position.z - cz);
        if (d < EXPLOSION_RADIUS + 1) { stopCreeperHiss(c); scene.remove(c); creepers.splice(i, 1); }
      }
      // 圏内のウォーデンにダメージ (TNTで挑むための手段。逆順ループでkill時のspliceも安全)
      for (let i = wardens.length - 1; i >= 0; i--) {
        const w = wardens[i];
        const d = Math.hypot(w.position.x - cx, (w.position.y + WARDEN_HEIGHT * 0.5) - cy, w.position.z - cz);
        if (d < EXPLOSION_RADIUS + 1.5) {
          const dmg = Math.floor(EXPLOSION_MAX_DAMAGE * (1 - d / (EXPLOSION_RADIUS + 1.5)));
          if (dmg > 0) hitWarden(w, dmg);
        }
      }
      // 圏内のゾンビにダメージ (本家同様、爆発は全Mobを巻き込む)
      for (let i = zombies.length - 1; i >= 0; i--) {
        const zm = zombies[i];
        const d = Math.hypot(zm.position.x - cx, (zm.position.y + ZOMBIE_HEIGHT * 0.5) - cy, zm.position.z - cz);
        if (d < EXPLOSION_RADIUS + 1) {
          const dmg = Math.floor(EXPLOSION_MAX_DAMAGE * (1 - d / (EXPLOSION_RADIUS + 1)));
          if (dmg > 0) hitZombie(zm, dmg);
        }
      }
      // 圏内のスケルトンにダメージ
      for (let i = skeletons.length - 1; i >= 0; i--) {
        const sk = skeletons[i];
        const d = Math.hypot(sk.position.x - cx, (sk.position.y + SKELETON_HEIGHT * 0.5) - cy, sk.position.z - cz);
        if (d < EXPLOSION_RADIUS + 1) {
          const dmg = Math.floor(EXPLOSION_MAX_DAMAGE * (1 - d / (EXPLOSION_RADIUS + 1)));
          if (dmg > 0) hitSkeleton(sk, dmg);
        }
      }
      // 圏内のスライムナイトにダメージ
      for (let i = slimeKnights.length - 1; i >= 0; i--) {
        const skk = slimeKnights[i];
        const d = Math.hypot(skk.position.x - cx, (skk.position.y + SK_HEIGHT * 0.5) - cy, skk.position.z - cz);
        if (d < EXPLOSION_RADIUS + 1) {
          const dmg = Math.floor(EXPLOSION_MAX_DAMAGE * (1 - d / (EXPLOSION_RADIUS + 1)));
          if (dmg > 0) hitSlimeKnight(skk, dmg);
        }
      }
      // 圏内のアイアンゴーレムにダメージ (HPが高いので耐えることが多い)
      for (let i = golems.length - 1; i >= 0; i--) {
        const g = golems[i];
        const d = Math.hypot(g.position.x - cx, (g.position.y + GOLEM_HEIGHT * 0.5) - cy, g.position.z - cz);
        if (d < EXPLOSION_RADIUS + 1.5) {
          const dmg = Math.floor(EXPLOSION_MAX_DAMAGE * (1 - d / (EXPLOSION_RADIUS + 1.5)));
          if (dmg > 0) hitGolem(g, dmg);
        }
      }
      // 圏内の魚を巻き込み撃破
      for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        const d = Math.hypot(f.position.x - cx, f.position.y - cy, f.position.z - cz);
        if (d < EXPLOSION_RADIUS + 1) killFish(f, true);
      }
      // 圏内の起爆済みTNTを誘爆 (本家同様の連鎖。再帰回避のため短い導火線に再設定)
      if (typeof primedTNT !== 'undefined') {
        for (const t of primedTNT) {
          const d = Math.hypot(t.position.x - cx, (t.position.y + 0.5) - cy, t.position.z - cz);
          if (d < EXPLOSION_RADIUS + 1.5 && t.userData.fuse > 0.15) t.userData.fuse = 0.05 + Math.random() * 0.12;
        }
      }
      // ブロック破壊 (半径内、中心ほど確率高)
      const r = Math.ceil(EXPLOSION_RADIUS);
      for (let dx = -r; dx <= r; dx++) {
        for (let dy = -r; dy <= r; dy++) {
          for (let dz = -r; dz <= r; dz++) {
            const d = Math.sqrt(dx * dx + dy * dy + dz * dz);
            if (d > EXPLOSION_RADIUS) continue;
            if (Math.random() < 1 - d / EXPLOSION_RADIUS) {
              const bx = Math.round(cx + dx), by = Math.round(cy + dy), bz = Math.round(cz + dz);
              const wasFluid = isFluidKey(key(bx, by, bz));
              removeBlock(bx, by, bz);
              fluidMeta.delete(key(bx, by, bz));
              recordEdit(bx, by, bz, -1);  // クレーターを記録 (戻っても残る)
              if (wasFluid) recedeFluidAround(bx, by, bz);
            }
          }
        }
      }
      // クレーター周囲の流体を流れ込ませる (本家: 水際で爆発すると水が穴へ流れる)
      const cr = r + 1;
      const seeds = [];
      for (let dx = -cr; dx <= cr; dx++)
        for (let dy = -cr; dy <= cr; dy++)
          for (let dz = -cr; dz <= cr; dz++) {
            const sk = key(Math.round(cx + dx), Math.round(cy + dy), Math.round(cz + dz));
            if (isFluidKey(sk)) seeds.push(sk);
          }
      if (seeds.length) flowFrom(seeds);
      // エフェクト
      spawnExplosionParticles(cx, cy, cz);
      playExplosionSound();
    }

    function explodeCreeper(c, index) {
      stopCreeperHiss(c);  // シュー音停止
      const cx = c.position.x;
      const cy = c.position.y + 0.9;  // 体の中心
      const cz = c.position.z;
      // クリーパーを先に除去 (explodeAt 内の巻き込み処理で二重カウントしないため)
      scene.remove(c);
      creepers.splice(index, 1);
      explodeAt(cx, cy, cz);
    }

    function updateCreepers(dt) {
      // 爆発で splice するので逆順ループ
      for (let i = creepers.length - 1; i >= 0; i--) {
        const c = creepers[i];

        // 溶岩ダメージ (全Mob共通): 溶岩に触れている間、一定間隔でHPを削り焼死させる
        if (posTouchingLava(c.position.x, c.position.y, c.position.z, CREEPER_BODY_HEIGHT)) {
          c.userData.lavaTimer += dt;
          if (c.userData.lavaTimer >= LAVA_DAMAGE_INTERVAL) {
            c.userData.lavaTimer = 0;
            c.userData.hp -= LAVA_DAMAGE;
            c.userData.hitFlash = 0.6;
            if (c.userData.hp <= 0) { killCreeper(c); continue; }
          }
        } else {
          c.userData.lavaTimer = LAVA_DAMAGE_INTERVAL;
        }
        // 被弾/焼けフラッシュの減衰 (起爆中は下のフューズ処理が上書きする)
        if (c.userData.hitFlash > 0) {
          c.userData.hitFlash = Math.max(0, c.userData.hitFlash - dt * 2);
          setCreeperFlash(c, c.userData.hitFlash);
        }

        // 段差の上り下りをなめらかに + 小さくジャンプ (毎フレーム: 移動が無くても追従)
        stepMobGroupY(c, dt, MOB_STEP_HOP);

        const dx = camera.position.x - c.position.x;
        const dz = camera.position.z - c.position.z;
        const dy = camera.position.y - c.position.y;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > CREEPER_SIGHT) continue;
        c.rotation.y = Math.atan2(dx, dz);

        // 起爆中?
        const fuseTime = c.userData.fuseTime || 0;
        if (fuseTime > 0) {
          const nt = fuseTime + dt;
          const progressNorm = Math.min(1, nt / FUSE_DURATION);
          // 加速するパルス (6Hz → 30Hz)
          const pulseFreq = 6 + progressNorm * 24;
          const pulse = Math.abs(Math.sin(nt * pulseFreq));
          // スケール: ベース成長 + パルス揺れ
          const baseScale = 1 + progressNorm * 0.3;
          c.scale.setScalar(baseScale + pulse * 0.12);
          // 白フラッシュ: 後半ほど明るく
          setCreeperFlash(c, pulse * (0.25 + progressNorm * 0.7));
          // タイマー完了 → 爆発 (キャンセル不可、必ず爆発)
          if (nt >= FUSE_DURATION) {
            explodeCreeper(c, i);
            continue;
          }
          c.userData.fuseTime = nt;
          continue;  // 起爆中は移動しない
        }

        // 近距離に入ったら起爆開始 (Y方向に大きく離れていなければ)
        if (dist < FUSE_RANGE && Math.abs(dy) < 3) {
          c.userData.fuseTime = 0.001;
          startCreeperHiss(c);
          continue;
        }

        // 通常移動 (プレイヤーを追う)
        const nx = dx / dist;
        const nz = dz / dist;
        const newX = c.position.x + nx * CREEPER_SPEED * dt;
        const newZ = c.position.z + nz * CREEPER_SPEED * dt;
        const newY = creeperGroundY(newX, newZ);
        if (newY === null) continue;
        if (newY - c.userData.groundY > CREEPER_STEP_HEIGHT) continue;  // 論理接地高さで段差判定
        if (waterDepthAt(newX, newZ) >= MOB_DEEP_WATER) continue;  // 深い水は避ける (溺れ防止)
        c.position.x = newX;
        c.position.z = newZ;
        setMobGroundTarget(c.userData, newY, MOB_STEP_HOP_DUR);  // 実Yは stepMobGroupY が追従
      }
    }

    // ===== 受動Mob (ブタ・村人) - 本家同様に平和的に徘徊、攻撃すると逃げる =====
    const passiveMobs = [];
    const passiveColliders = [];  // 各Mobの不可視ボックス (クリック判定用、レイキャスト対象)
    const _pmobColliderMat = new THREE.MeshBasicMaterial({ visible: false });
    const PMOB_DEFS = [
      // dimX/dimZ/radius は本家準拠の当たり判定サイズ (GLB実寸では上書きしない)
      { key: 'pig',      file: '3D/Pig.glb',      height: 0.9, target: 6, speed: 1.2, hp: 10, facing: 0, template: null, dimX: 0.9, dimZ: 0.9, radius: 0.45 },
      { key: 'cow',      file: '3D/Meshy_AI_Voxel_Cow_0531110506_texture.glb',          height: 1.4, target: 5, speed: 1.0, hp: 10, facing: 0, template: null, dimX: 0.9,  dimZ: 0.9,  radius: 0.45 },
      { key: 'villager', file: '3D/villager.glb', height: 1.9, target: 4, speed: 1.0, hp: 20, facing: 0, template: null, dimX: 0.6, dimZ: 0.6, radius: 0.3 },
      { key: 'chicken',  file: '3D/Chicken.glb',  height: 0.7, target: 6, speed: 1.3, hp: 4,  facing: 0, template: null, dimX: 0.4, dimZ: 0.4, radius: 0.2, glide: true },
      // ウマ: 本家準拠でおとなしく徘徊 (騎乗はなし)。革をドロップ
      { key: 'horse',    file: '3D/Meshy_AI_Pinto_Minecraft_Horse_0531110521_texture.glb', height: 1.6, target: 3, speed: 1.4, hp: 22, facing: 0, template: null, dimX: 1.2,  dimZ: 1.2,  radius: 0.6 },
      // スティーブ / ヴァーダントマイナー: 友好的な人型NPC。村人のように徘徊し、殴ると逃げる
      { key: 'steve',    file: '3D/Meshy_AI_Steve_with_a_Pickaxe_0531110417_texture.glb',  height: 1.9, target: 2, speed: 1.1, hp: 20, facing: 0, template: null, dimX: 0.6,  dimZ: 0.6,  radius: 0.3 },
      { key: 'miner',    file: '3D/Meshy_AI_Verdant_Miner_0531110423_texture.glb',         height: 1.9, target: 2, speed: 1.1, hp: 20, facing: 0, template: null, dimX: 0.6,  dimZ: 0.6,  radius: 0.3 },
      // ウサギ: 本家準拠で常にぴょんぴょん跳ねる。プレイヤーが近づくと逃げる (臆病)
      { key: 'rabbit',   file: '3D/Meshy_AI_Voxel_Bunny_0531110514_texture.glb',           height: 0.5, target: 5, speed: 1.5, hp: 3,  facing: 0, template: null, dimX: 0.4,  dimZ: 0.4,  radius: 0.2,  hop: true },
      // スライム: ドラクエ風にぴょんぴょん跳ね、プレイヤーが近づくと逃げる (臆病)
      { key: 'slime',    file: '3D/スライム.glb', height: 0.4, target: 10, speed: 1.4, hp: 8,  facing: 0, template: null, dimX: 0.34, dimZ: 0.34, radius: 0.18, hop: true },
      // バブルスライム: ドラクエの毒スライム。スライム同様ぴょんぴょん跳ねる。スライムボールをドロップ
      { key: 'bubbleslime', file: '3D/バブルスライム.glb', height: 0.5, target: 8, speed: 1.4, hp: 8, facing: 0, template: null, dimX: 0.4, dimZ: 0.4, radius: 0.2, hop: true },
      // トト: ボストンテリアの犬。友好的に歩き回る (ペット枠)。walk=歩行時に小走りアニメ
      { key: 'toto',     file: '3D/ボストンテリア_トト.glb', height: 0.6, target: 4, speed: 1.5, hp: 8, facing: 0, template: null, dimX: 0.5, dimZ: 0.5, radius: 0.28, walk: true },
    ];
    const PMOB_SPAWN_MIN = 14;        // この距離より近くには湧かない
    const PMOB_SPAWN_MAX = 48;        // この距離より遠くには湧かない (LOAD_RADIUS=66 以内)
    const PMOB_DESPAWN_DIST = 70;     // この距離以上離れたら消す
    const PMOB_SPAWN_INTERVAL = 4;    // 補充判定の間隔 (秒)
    const PMOB_STEP_HEIGHT = 1.1;     // この高さまで登れる
    const PMOB_GLIDE_SPEED = 2.5;     // 滑空Mob (ニワトリ) の落下速度 (ゆっくり降りる)
    const PMOB_ATTACK_DAMAGE = 4;     // 1クリックの与ダメージ
    const PMOB_FLEE_DURATION = 4;     // 被弾後に逃げる秒数
    const PMOB_FLEE_SPEED_MULT = 2.2; // 逃走中の速度倍率
    const PMOB_AGGRO_RANGE = 18;      // この距離以内のウォーデンを見つけたら群れで攻撃しに行く
    const PMOB_AGGRO_SPEED_MULT = 1.5;       // ウォーデンへ突進するときの速度倍率
    const PMOB_WARDEN_ATTACK_REACH = 0.7;    // ウォーデンに与ダメージできる追加リーチ (mob半径+ウォーデン半径 に加算)
    const PMOB_WARDEN_ATTACK_DAMAGE = 3;     // モブ1発の対ウォーデン与ダメージ
    const PMOB_WARDEN_ATTACK_COOLDOWN = 1.2; // モブの攻撃間隔(秒)
    const SLIME_HOP_SPEED = 6;        // ぴょんぴょん跳ねる周期の速さ
    const SLIME_HOP_HEIGHT = 0.34;    // 普段のホップの高さ
    const SLIME_STEP_HOP = 0.24;      // 段差を上り下りした瞬間に追加で跳ねる高さ
    const SLIME_STEP_HOP_DUR = 0.32;  // 段差ジャンプの滞空時間(秒)
    // 縦移動のなめらか化は共通の MOB_VERT_* / easeMobFootY を使用 (上方で定義)
    let pmobSpawnTimer = 0;

    function countPassiveMobs(def) {
      let n = 0;
      for (const m of passiveMobs) if (m.userData.def === def) n++;
      return n;
    }

    function spawnPassiveMob(def, x, z) {
      if (!def.template) return;
      const group = def.template.clone(true);
      // ホップ用: モデル本体(children[0])を上下させる。コライダ追加前に掴んでおく
      const visual = group.children[0];
      // 個別フラッシュのため各メッシュのマテリアルをこの個体専用にクローン
      group.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.userData.mobGroup = group;
        if (Array.isArray(obj.material)) {
          obj.material = obj.material.map(m => m.clone());
          obj.userData.origColors = obj.material.map(m => m.color.clone());
        } else if (obj.material) {
          obj.material = obj.material.clone();
          obj.userData.origColors = [obj.material.color.clone()];
        }
      });
      // 不可視ボックスコライダ (クリック・体当たり判定の単一ソース)
      const dimX = def.dimX || 0.6, dimZ = def.dimZ || 0.6, dimY = def.dimY || def.height;
      const collider = new THREE.Mesh(new THREE.BoxGeometry(dimX, dimY, dimZ), _pmobColliderMat);
      collider.position.y = dimY / 2;  // 足元0 → 中心は高さの半分
      collider.visible = false;
      collider.userData.mobGroup = group;
      group.add(collider);
      group.userData.collider = collider;
      passiveColliders.push(collider);
      const y = creeperGroundY(x, z);
      group.position.set(x, y !== null ? y : 5, z);
      group.userData.def = def;
      group.userData.radius = def.radius || 0.35;
      group.userData.hp = def.hp;
      group.userData.state = 'pause';
      group.userData.stateTimer = 0.5 + Math.random() * 2;
      group.userData.heading = Math.random() * Math.PI * 2;
      group.userData.fleeTimer = 0;
      group.userData.hitFlash = 0;
      group.userData.lavaTimer = LAVA_DAMAGE_INTERVAL;  // 触れた瞬間に即ダメージ
      group.userData.visual = visual;                   // ホップ対象 (モデル本体)
      group.userData.visualBaseY = visual ? visual.position.y : 0;
      group.userData.hopPhase = Math.random() * Math.PI * 2;
      group.userData.walkPhase = Math.random() * Math.PI * 2;  // 歩行アニメ(犬の小走り等)の位相
      group.userData.stepHopT = 0;                      // 段差ジャンプの残り時間
      group.userData.groundY = (y !== null ? y : 5);    // 論理的な接地高さ (実Yはこれへなめらかに追従)
      group.userData.soundTimer = 3 + Math.random() * 8;  // 村人アンビエント声の初回まで
      group.rotation.y = group.userData.heading + def.facing;
      scene.add(group);
      passiveMobs.push(group);
    }

    function killPassiveMob(group, drop) {
      if (drop) {
        dropMobLoot(group.userData.def.key, group.position.x, group.position.y, group.position.z);
        spawnXPOrbs(group.position.x, group.position.y + 0.5, group.position.z, 2);
      }
      scene.remove(group);
      const idx = passiveMobs.indexOf(group);
      if (idx !== -1) passiveMobs.splice(idx, 1);
      const ci = passiveColliders.indexOf(group.userData.collider);
      if (ci !== -1) passiveColliders.splice(ci, 1);
    }

    // クリック攻撃: ダメージ → 死亡 or 逃走開始 (damage 省略時は素手)
    function hitPassiveMob(group, damage) {
      group.userData.hp -= (damage || PMOB_ATTACK_DAMAGE);
      group.userData.hitFlash = 0.6;
      // 村人は本家同様、被弾/死亡で声を出す
      if (group.userData.def.key === 'villager') {
        const sdx = camera.position.x - group.position.x;
        const sdy = camera.position.y - group.position.y;
        const sdz = camera.position.z - group.position.z;
        const sd = Math.sqrt(sdx * sdx + sdy * sdy + sdz * sdz);
        playVillagerSound(group.userData.hp <= 0 ? 'death' : 'hurt', sd);
      }
      if (group.userData.hp <= 0) { killPassiveMob(group, true); return; }  // 撃破: 素材をドロップ
      // プレイヤーと反対方向へ逃げる
      const dx = group.position.x - camera.position.x;
      const dz = group.position.z - camera.position.z;
      group.userData.heading = Math.atan2(dx, dz);
      group.userData.state = 'flee';
      group.userData.fleeTimer = PMOB_FLEE_DURATION;
    }

    // ===== 繁殖 — 本家準拠: 対応する食べ物を与えるとラブモード、2匹が出会うと子供が生まれる =====
    const BREED_FOOD = { cow: 'wheat', horse: 'wheat', pig: 'wheat', rabbit: 'wheat', chicken: 'seeds' };
    const LOVE_DURATION = 30;        // ラブモードの持続秒 (本家準拠)
    const BREED_COOLDOWN = 60;       // 繁殖後の再繁殖までの秒数
    const BREED_SEEK_RANGE = 8;      // 相手を探す範囲
    const BABY_GROW_TIME = 90;       // 子供が大人になるまでの秒数
    const BABY_SCALE = 0.45;

    // ハートパーティクル (ラブモード演出)
    const hearts = [];
    const _heartTex = textureLoader.load(svgDataURI(
      "<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 24 24'>" +
      "<path d='M12 21 C5 15 2 11 2 7.5 C2 4.5 4.5 3 6.8 3 C8.8 3 10.8 4.2 12 6 C13.2 4.2 15.2 3 17.2 3 C19.5 3 22 4.5 22 7.5 C22 11 19 15 12 21 Z' fill='#ff4d6d'/></svg>"));
    function spawnHearts(x, y, z) {
      for (let i = 0; i < 3; i++) {
        const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: _heartTex, transparent: true, depthTest: false }));
        sp.scale.set(0.32, 0.32, 1);
        sp.position.set(x + (Math.random() - 0.5) * 0.6, y + Math.random() * 0.3, z + (Math.random() - 0.5) * 0.6);
        sp.userData = { vy: 0.8 + Math.random() * 0.5, life: 1.2 };
        scene.add(sp);
        hearts.push(sp);
      }
    }
    function updateHearts(dt) {
      for (let i = hearts.length - 1; i >= 0; i--) {
        const h = hearts[i];
        h.userData.life -= dt;
        h.position.y += h.userData.vy * dt;
        h.material.opacity = Math.max(0, h.userData.life / 1.2);
        if (h.userData.life <= 0) { scene.remove(h); h.material.dispose(); hearts.splice(i, 1); }
      }
    }

    // 選択中の食べ物を与える (対応する動物 + 大人 + クールダウン明けのみ)。成功で true。
    function feedPassiveMob(g) {
      const ud = g.userData;
      const foodId = BREED_FOOD[ud.def.key];
      if (!foodId) return false;
      const sel = selectedItem();
      if (!sel || sel.kind !== 'material' || sel.id !== foodId || materials[foodId] <= 0) return false;
      if (ud.babyT !== undefined && ud.babyT < BABY_GROW_TIME) return false;   // 子供には与えられない
      if ((ud.breedCd || 0) > 0 || ud.loveTimer > 0) return false;
      materials[foodId]--;
      updateHotbar();
      ud.loveTimer = LOVE_DURATION;
      spawnHearts(g.position.x, g.position.y + ud.def.height + 0.3, g.position.z);
      startHandSwing();
      return true;
    }

    function spawnBabyMob(def, x, z) {
      spawnPassiveMob(def, x, z);
      const baby = passiveMobs[passiveMobs.length - 1];
      if (baby && baby.userData.def === def) {
        baby.userData.babyT = 0;
        baby.scale.setScalar(BABY_SCALE);
      }
    }

    // ===== 経験値 (XP) — 本家準拠: Mobを倒すと緑のオーブが湧き、近づくと吸い寄せられて回収 =====
    // レベルは「強化」(エンチャントの簡易版) に使う: 剣強化 (+2ダメージ) / 防具強化 (+10%軽減)
    let playerXP = 0;       // 現レベル内の経験値
    let playerLevel = 0;
    const enchants = { sword: false, armor: false };   // 強化済みフラグ
    const ENCHANT_COST_LEVELS = 5;
    function xpNeeded() { return 10 + playerLevel * 2; }
    const xpFillEl2 = document.getElementById('xpfill');
    const xpLevelEl = document.getElementById('xplevel');
    function updateXPDisplay() {
      xpFillEl2.style.width = `${Math.min(100, (playerXP / xpNeeded()) * 100)}%`;
      xpLevelEl.textContent = `Lv ${playerLevel}`;
    }
    function addXP(n) {
      playerXP += n;
      while (playerXP >= xpNeeded()) {
        playerXP -= xpNeeded();
        playerLevel++;
        showToast(`レベルアップ！ Lv ${playerLevel}`);
      }
      updateXPDisplay();
    }

    const xpOrbs = [];
    const XP_ORB_MAGNET_RANGE = 4;     // この距離でプレイヤーに吸い寄せられる
    const XP_ORB_PICKUP_RANGE = 1.0;
    const XP_ORB_LIFETIME = 90;
    const _xpOrbGeo = new THREE.IcosahedronGeometry(0.12, 0);
    const _xpOrbMat = new THREE.MeshLambertMaterial({ color: 0x8FE06B, emissive: 0x4DBB2F, emissiveIntensity: 0.8 });
    function spawnXPOrbs(x, y, z, amount) {
      // 1オーブ = 約3XP ぶんに分割して撒く
      const n = Math.max(1, Math.round(amount / 3));
      for (let i = 0; i < n; i++) {
        const orb = new THREE.Mesh(_xpOrbGeo, _xpOrbMat);
        orb.position.set(x + (Math.random() - 0.5) * 0.6, y + 0.3, z + (Math.random() - 0.5) * 0.6);
        orb.userData = { xp: amount / n, vy: 1.5 + Math.random(), age: 0 };
        scene.add(orb);
        xpOrbs.push(orb);
      }
    }
    function updateXPOrbs(dt) {
      for (let i = xpOrbs.length - 1; i >= 0; i--) {
        const orb = xpOrbs[i], ud = orb.userData;
        ud.age += dt;
        if (ud.age > XP_ORB_LIFETIME) { scene.remove(orb); xpOrbs.splice(i, 1); continue; }
        const dx = camera.position.x - orb.position.x;
        const dy = (camera.position.y - 0.8) - orb.position.y;
        const dz = camera.position.z - orb.position.z;
        const d2 = dx * dx + dy * dy + dz * dz;
        if (d2 < XP_ORB_PICKUP_RANGE * XP_ORB_PICKUP_RANGE) {
          addXP(ud.xp);
          scene.remove(orb); xpOrbs.splice(i, 1); continue;
        }
        if (d2 < XP_ORB_MAGNET_RANGE * XP_ORB_MAGNET_RANGE) {
          // プレイヤーへ吸い寄せられる
          const d = Math.sqrt(d2) || 0.001;
          const sp = 6;
          orb.position.x += (dx / d) * sp * dt;
          orb.position.y += (dy / d) * sp * dt;
          orb.position.z += (dz / d) * sp * dt;
        } else {
          // 重力で落下して床に乗る
          ud.vy -= ITEM_DROP_GRAVITY * dt;
          let ny = orb.position.y + ud.vy * dt;
          const gy = creeperGroundY(orb.position.x, orb.position.z);
          const restY = (gy !== null ? gy + 0.15 : BEDROCK_Y);
          if (ny <= restY) { ny = restY; ud.vy = 0; }
          orb.position.y = ny;
        }
        orb.rotation.y += dt * 3;
      }
    }

    // ===== ドロップアイテム (撃破したモブが落とす素材。近づくと自動で拾う) =====
    const itemDrops = [];
    const ITEM_DROP_LIFETIME = 120;   // 秒で自然消滅
    const ITEM_PICKUP_RANGE = 1.4;    // この距離まで近づくと拾う
    const ITEM_DROP_GRAVITY = 18;
    const _dropGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
    const _dropMatCache = {};
    function dropMatMesh(id) {
      if (!_dropMatCache[id]) {
        const m = materialById[id];
        _dropMatCache[id] = new THREE.MeshLambertMaterial({ color: m.color, emissive: m.color, emissiveIntensity: 0.3 });
      }
      return _dropMatCache[id];
    }
    function spawnItemDrop(x, y, z, id, qty) {
      if (qty <= 0 || !materialById[id]) return;
      const mesh = new THREE.Mesh(_dropGeo, dropMatMesh(id));
      mesh.position.set(x + (Math.random() - 0.5) * 0.4, y + 0.4, z + (Math.random() - 0.5) * 0.4);
      mesh.userData = { id, qty, vy: 2 + Math.random() * 1.5, bob: Math.random() * Math.PI * 2, age: 0 };
      scene.add(mesh);
      itemDrops.push(mesh);
    }
    // ドロップ表を振って、撃破地点にアイテムを落とす
    function dropMobLoot(mobKey, x, y, z) {
      const table = MOB_DROPS[mobKey];
      if (!table) return;
      for (const d of table) {
        const qty = d.min + Math.floor(Math.random() * (d.max - d.min + 1));
        if (qty > 0) spawnItemDrop(x, y, z, d.id, qty);
      }
    }
    function updateItemDrops(dt) {
      const px = camera.position.x, py = camera.position.y, pz = camera.position.z;
      for (let i = itemDrops.length - 1; i >= 0; i--) {
        const it = itemDrops[i], ud = it.userData;
        ud.age += dt;
        // 重力で落下し、床の上で止まる
        ud.vy -= ITEM_DROP_GRAVITY * dt;
        let ny = it.position.y + ud.vy * dt;
        const gy = creeperGroundY(it.position.x, it.position.z);
        const restY = (gy !== null ? gy : BEDROCK_Y) + 0.15;
        if (ny <= restY) { ny = restY; ud.vy = 0; }
        // 見栄え: 回転 + 接地時の上下ゆらぎ
        it.rotation.y += dt * 2.2;
        ud.bob += dt * 3;
        it.position.y = (ud.vy === 0) ? ny + Math.sin(ud.bob) * 0.07 : ny;
        // 拾う (プレイヤーの体に近づいたら)
        const dx = px - it.position.x, dy = (py - 0.75) - it.position.y, dz = pz - it.position.z;
        if (dx * dx + dy * dy + dz * dz < ITEM_PICKUP_RANGE * ITEM_PICKUP_RANGE) {
          materials[ud.id] += ud.qty;
          updateHotbar();
          showPickupToast(ud.id, ud.qty);
          scene.remove(it); itemDrops.splice(i, 1);
          continue;
        }
        if (ud.age > ITEM_DROP_LIFETIME) { scene.remove(it); itemDrops.splice(i, 1); }
      }
    }
    // 拾得トースト (画面下にスタックして数秒でフェード)
    const pickupToastEl = document.createElement('div');
    pickupToastEl.id = 'pickup-toast';
    document.body.appendChild(pickupToastEl);
    function showPickupToast(id, qty) {
      const m = materialById[id];
      const line = document.createElement('div');
      line.className = 'pickup-line';
      line.textContent = `+${qty} ${m.name}`;
      pickupToastEl.appendChild(line);
      setTimeout(() => line.classList.add('fade'), 1400);
      setTimeout(() => line.remove(), 2000);
    }

    function trySpawnPassiveMobNearPlayer(def) {
      for (let attempt = 0; attempt < 8; attempt++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = PMOB_SPAWN_MIN + Math.random() * (PMOB_SPAWN_MAX - PMOB_SPAWN_MIN);
        const x = Math.round(camera.position.x + Math.cos(ang) * dist);
        const z = Math.round(camera.position.z + Math.sin(ang) * dist);
        if (creeperGroundY(x, z) !== null && waterDepthAt(x, z) < MOB_DEEP_WATER) { spawnPassiveMob(def, x, z); return true; }
      }
      return false;
    }

    // 遠い個体を消し、不足ぶんを定期補充
    function managePassiveMobs(dt) {
      const D2 = PMOB_DESPAWN_DIST * PMOB_DESPAWN_DIST;
      for (let i = passiveMobs.length - 1; i >= 0; i--) {
        const m = passiveMobs[i];
        const dx = camera.position.x - m.position.x;
        const dz = camera.position.z - m.position.z;
        if (dx * dx + dz * dz > D2) killPassiveMob(m);
      }
      pmobSpawnTimer += dt;
      if (pmobSpawnTimer >= PMOB_SPAWN_INTERVAL) {
        pmobSpawnTimer = 0;
        for (const def of PMOB_DEFS) {
          if (!def.template) continue;
          if (countPassiveMobs(def) < def.target) trySpawnPassiveMobNearPlayer(def);
        }
      }
    }

    // 水平距離が range 以内で最も近いウォーデンを返す (居なければ null)
    function nearestWardenTo(m, range) {
      let best = null, bestD2 = range * range;
      for (const w of wardens) {
        const dx = w.position.x - m.position.x;
        const dz = w.position.z - m.position.z;
        const d2 = dx * dx + dz * dz;
        if (d2 < bestD2) { bestD2 = d2; best = w; }
      }
      return best;
    }

    function updatePassiveMobs(dt) {
      for (let i = passiveMobs.length - 1; i >= 0; i--) {
        const m = passiveMobs[i];
        const ud = m.userData;
        const def = ud.def;

        // 被弾フラッシュの減衰
        if (ud.hitFlash > 0) {
          ud.hitFlash = Math.max(0, ud.hitFlash - dt * 2);
          setCreeperFlash(m, ud.hitFlash);  // 汎用フラッシュ (任意のGroupに適用可)
        }

        // 子供の成長: 時間経過で大人サイズへ (本家準拠)
        if (ud.babyT !== undefined && ud.babyT < BABY_GROW_TIME) {
          ud.babyT += dt;
          m.scale.setScalar(BABY_SCALE + (1 - BABY_SCALE) * Math.min(1, ud.babyT / BABY_GROW_TIME));
        }
        ud.breedCd = Math.max(0, (ud.breedCd || 0) - dt);

        // 溶岩ダメージ (全Mob共通): 触れている間、一定間隔でHPを削る
        if (posTouchingLava(m.position.x, m.position.y, m.position.z, def.height)) {
          ud.lavaTimer += dt;
          if (ud.lavaTimer >= LAVA_DAMAGE_INTERVAL) {
            ud.lavaTimer = 0;
            ud.hp -= LAVA_DAMAGE;
            ud.hitFlash = 0.6;
            if (ud.hp <= 0) { killPassiveMob(m); continue; }
          }
        } else {
          ud.lavaTimer = LAVA_DAMAGE_INTERVAL;  // 離れたら次の接触で即ダメージ
        }

        // ホップ表示: モデル本体(child)だけを上下させる (足元/コライダ位置はそのまま)。
        // スライムは常時ぴょんぴょん。全Mob共通で段差を越えた瞬間に小さくジャンプする。
        if (ud.visual) {
          let h = 0;
          if (def.hop) {
            ud.hopPhase += dt * SLIME_HOP_SPEED;
            // 跳んで→着地して少し止まる、を繰り返す (max(0,sin) で休符付きの小ホップ)
            h += Math.max(0, Math.sin(ud.hopPhase)) * SLIME_HOP_HEIGHT;
            h += mobStepHop(ud, dt, SLIME_STEP_HOP, SLIME_STEP_HOP_DUR);
          } else {
            // 歩行Mob (ブタ・村人・ニワトリ): 段差越えのときだけ小さくジャンプ
            h += mobStepHop(ud, dt, MOB_STEP_HOP, MOB_STEP_HOP_DUR);
            // 歩行アニメ (def.walk=犬トト等): モデルが単一メッシュで脚を個別に動かせないため、
            // 動いている間だけ体を上下に弾ませ前後に揺らして「小走り」に見せる
            if (def.walk) {
              const moving = (ud.state === 'walk' || ud.state === 'flee' || ud.state === 'aggro');
              if (moving) {
                ud.walkPhase += dt * 11;                              // 歩幅の速さ
                h += Math.abs(Math.sin(ud.walkPhase)) * 0.09;        // 上下のバウンド (一歩ごと)
                ud.visual.rotation.x = Math.sin(ud.walkPhase * 2) * 0.14;  // 前後のピッチ揺れ
              } else if (ud.visual.rotation.x !== 0) {
                ud.visual.rotation.x += (0 - ud.visual.rotation.x) * Math.min(1, dt * 8);  // 静止で水平へ戻す
                if (Math.abs(ud.visual.rotation.x) < 0.005) ud.visual.rotation.x = 0;
              }
            }
          }
          ud.visual.position.y = ud.visualBaseY + h;
        }

        // 段差の上り下りを瞬間移動でなく、実Y(足元)を論理接地高さ groundY へなめらかに寄せる
        // (全Mob共通)。ニワトリ(滑空)は下りだけゆっくり落とし、本家のスローフォール感を残す。
        m.position.y = easeMobFootY(ud, m.position.y, dt, def.glide ? PMOB_GLIDE_SPEED : undefined);

        // 村人アンビエント: 一定間隔で本家風グラント音 (近く + プレイ中のみ)
        if (def.key === 'villager') {
          ud.soundTimer -= dt;
          if (ud.soundTimer <= 0) {
            ud.soundTimer = 6 + Math.random() * 9;
            if (controls.isLocked) {
              const adx = camera.position.x - m.position.x;
              const ady = camera.position.y - m.position.y;
              const adz = camera.position.z - m.position.z;
              playVillagerSound('ambient', Math.sqrt(adx * adx + ady * ady + adz * adz));
            }
          }
        }

        // --- ウォーデン敵対: 近くにウォーデンを見つけたら群れで攻撃しに行く ---
        ud.attackCd = Math.max(0, (ud.attackCd || 0) - dt);
        if (wardens.length) {
          const foe = nearestWardenTo(m, PMOB_AGGRO_RANGE);
          if (foe) {
            const fdx = foe.position.x - m.position.x;
            const fdz = foe.position.z - m.position.z;
            const fdist = Math.sqrt(fdx * fdx + fdz * fdz) || 0.0001;
            const reach = (def.radius || 0.35) + WARDEN_RADIUS + PMOB_WARDEN_ATTACK_REACH;
            ud.heading = Math.atan2(fdx, fdz);   // ウォーデンの方を向く
            ud.state = 'aggro';
            if (fdist <= reach) {
              // 攻撃範囲内: 立ち止まって殴る (スライムはぴょんと飛びかかる)
              m.rotation.y = ud.heading + def.facing;
              if (ud.attackCd <= 0) {
                ud.attackCd = PMOB_WARDEN_ATTACK_COOLDOWN;
                hitWarden(foe, PMOB_WARDEN_ATTACK_DAMAGE, m);
                if (def.hop) ud.stepHopT = SLIME_STEP_HOP_DUR;
              }
              continue;
            }
            // 接近: ウォーデンへ突進 (崖・深い水は避ける)
            const aspeed = def.speed * PMOB_AGGRO_SPEED_MULT;
            const adirX = Math.sin(ud.heading), adirZ = Math.cos(ud.heading);
            const anx = m.position.x + adirX * aspeed * dt;
            const anz = m.position.z + adirZ * aspeed * dt;
            const any = creeperGroundY(anx, anz);
            const aref = (ud.groundY !== undefined) ? ud.groundY : m.position.y;
            if (any === null || any - aref > PMOB_STEP_HEIGHT || waterDepthAt(anx, anz) >= MOB_DEEP_WATER) {
              // 進めない: 少し回り込む
              ud.heading += (Math.random() < 0.5 ? 1 : -1) * Math.PI * 0.4;
              continue;
            }
            m.position.x = anx;
            m.position.z = anz;
            setMobGroundTarget(ud, any, def.hop ? SLIME_STEP_HOP_DUR : MOB_STEP_HOP_DUR);
            m.rotation.y = Math.atan2(adirX, adirZ) + def.facing;
            continue;
          }
        }
        // ウォーデンが居なくなった: aggro を解除して通常徘徊へ戻す
        if (ud.state === 'aggro') { ud.state = 'walk'; ud.stateTimer = 1 + Math.random() * 2; }

        // --- ラブモード: 同種のラブモード中の相手を探して近づき、出会うと子供が生まれる ---
        if (ud.loveTimer > 0) {
          ud.loveTimer -= dt;
          ud.heartCd = (ud.heartCd || 0) - dt;
          if (ud.heartCd <= 0) {
            ud.heartCd = 1.3;
            spawnHearts(m.position.x, m.position.y + def.height + 0.3, m.position.z);
          }
          let mate = null, bestD2 = BREED_SEEK_RANGE * BREED_SEEK_RANGE;
          for (const o of passiveMobs) {
            if (o === m || o.userData.def !== def || !(o.userData.loveTimer > 0)) continue;
            const ddx = o.position.x - m.position.x, ddz = o.position.z - m.position.z;
            const dd2 = ddx * ddx + ddz * ddz;
            if (dd2 < bestD2) { bestD2 = dd2; mate = o; }
          }
          if (mate) {
            if (Math.sqrt(bestD2) <= 1.4) {
              // 出会えた: 2匹の間に子供が生まれる
              ud.loveTimer = 0; mate.userData.loveTimer = 0;
              ud.breedCd = BREED_COOLDOWN; mate.userData.breedCd = BREED_COOLDOWN;
              spawnBabyMob(def, (m.position.x + mate.position.x) / 2, (m.position.z + mate.position.z) / 2);
              spawnHearts(m.position.x, m.position.y + def.height + 0.5, m.position.z);
            } else {
              // 相手の方へ歩み寄る (崖・深い水は避ける)
              const mdx = mate.position.x - m.position.x, mdz = mate.position.z - m.position.z;
              ud.heading = Math.atan2(mdx, mdz);
              const ldirX = Math.sin(ud.heading), ldirZ = Math.cos(ud.heading);
              const lnx = m.position.x + ldirX * def.speed * dt;
              const lnz = m.position.z + ldirZ * def.speed * dt;
              const lny = creeperGroundY(lnx, lnz);
              const lref = (ud.groundY !== undefined) ? ud.groundY : m.position.y;
              if (lny !== null && lny - lref <= PMOB_STEP_HEIGHT && waterDepthAt(lnx, lnz) < MOB_DEEP_WATER) {
                m.position.x = lnx;
                m.position.z = lnz;
                setMobGroundTarget(ud, lny, def.hop ? SLIME_STEP_HOP_DUR : MOB_STEP_HOP_DUR);
                m.rotation.y = ud.heading + def.facing;
              }
            }
            continue;
          }
          // 相手が見つからない間は通常の徘徊にフォールスルー (本家同様うろうろする)
        }

        ud.stateTimer -= dt;

        // 停止中: タイマー切れで歩き出す
        if (ud.state === 'pause') {
          if (ud.stateTimer <= 0) {
            ud.state = 'walk';
            ud.heading = Math.random() * Math.PI * 2;
            ud.stateTimer = 2 + Math.random() * 4;
          }
          continue;
        }

        // 逃走 → 時間切れで通常歩行へ
        if (ud.state === 'flee') {
          ud.fleeTimer -= dt;
          if (ud.fleeTimer <= 0) { ud.state = 'walk'; ud.stateTimer = 2 + Math.random() * 3; }
        } else if (ud.state === 'walk' && ud.stateTimer <= 0) {
          ud.state = 'pause';
          ud.stateTimer = 1 + Math.random() * 3;
          continue;
        }

        const speed = def.speed * (ud.state === 'flee' ? PMOB_FLEE_SPEED_MULT : 1);
        const dirX = Math.sin(ud.heading);
        const dirZ = Math.cos(ud.heading);
        const newX = m.position.x + dirX * speed * dt;
        const newZ = m.position.z + dirZ * speed * dt;
        const newY = creeperGroundY(newX, newZ);
        // ホップMobはイージング中の実Yではなく論理接地高さ(groundY)で段差を判定する
        const groundRef = (ud.groundY !== undefined) ? ud.groundY : m.position.y;
        if (newY === null || newY - groundRef > PMOB_STEP_HEIGHT || waterDepthAt(newX, newZ) >= MOB_DEEP_WATER) {
          // 壁/崖/深い水(溺れ防止): 向きを変える
          ud.heading += Math.PI * (0.5 + Math.random() * 0.5);
          continue;
        }
        m.position.x = newX;
        m.position.z = newZ;
        // 接地高さ(groundY)だけ更新し、実Yは上のイージングで追従させる(瞬間移動を避ける)
        setMobGroundTarget(ud, newY, def.hop ? SLIME_STEP_HOP_DUR : MOB_STEP_HOP_DUR);
        m.rotation.y = Math.atan2(dirX, dirZ) + def.facing;  // 進行方向を向く
      }
    }

    // GLB テンプレートを非同期ロード → 完了後に初期スポーン (gltfLoader はクリーパー側で定義済み)
    PMOB_DEFS.forEach((def) => {
      gltfLoader.load(
        def.file,
        (gltf) => {
          const model = gltf.scene;
          // 自動スケール (def.height マスに正規化)
          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          if (size.y > 0) model.scale.setScalar(def.height / size.y);
          // 足元 = y=0 になるようシフト
          model.updateMatrixWorld();
          const box2 = new THREE.Box3().setFromObject(model);
          model.position.y -= box2.min.y;
          // コライダ寸法は PMOB_DEFS の本家準拠値を使用 (GLB実寸では上書きしない)
          const wrapper = new THREE.Group();
          wrapper.add(model);
          def.template = wrapper;
          // 村人は村の広場周辺に配置 (それ以外の通常スポーンより優先)
          if (def.key === 'villager') {
            for (const s of villagerSpawns) spawnPassiveMob(def, s.x, s.z);
          }
          // 初期スポーン (目標数まで周囲に補充)
          let guard = 0;
          while (countPassiveMobs(def) < def.target && guard++ < 30) {
            if (!trySpawnPassiveMobNearPlayer(def)) break;
          }
        },
        undefined,
        (err) => { console.warn(def.file + ' ロード失敗:', err); }
      );
    });

    // ===== TNT (起爆式の爆弾: 本家同様にデフォルト所持・設置 → 導火線 → 爆発) =====
    const TNT_FUSE = 4.0;            // 起爆までの秒数 (本家 80tick = 4秒)
    // tntCount はインベントリ節で宣言済み (ホットバー初期化より前に必要なため)
    let tntTemplate = null;          // GLBロード後に格納
    const primedTNT = [];            // 起爆中のTNTエンティティ

    function makeTNTGroup() {
      let group;
      if (tntTemplate) {
        group = tntTemplate.clone(true);
      } else {
        // GLB未ロード時のフォールバック (赤いキューブ)
        group = new THREE.Group();
        const m = new THREE.Mesh(
          new THREE.BoxGeometry(0.95, 0.95, 0.95),
          new THREE.MeshLambertMaterial({ color: 0xc0392b })
        );
        m.position.y = 0.475;
        group.add(m);
      }
      // 個別フラッシュ用にマテリアルを個体専用にクローン (setCreeperFlash 用 origColors)
      group.traverse((obj) => {
        if (!obj.isMesh) return;
        if (Array.isArray(obj.material)) {
          obj.material = obj.material.map(mm => mm.clone());
          obj.userData.origColors = obj.material.map(mm => mm.color.clone());
        } else if (obj.material) {
          obj.material = obj.material.clone();
          obj.userData.origColors = [obj.material.color.clone()];
        }
      });
      return group;
    }

    // 設置: ブロックセル(整数座標)の中心に起爆中TNTを置く
    function placePrimedTNT(x, y, z) {
      const group = makeTNTGroup();
      group.position.set(x, y - 0.5, z);  // モデル足元が y-0.5 → セル中心に収まる
      group.userData.fuse = TNT_FUSE;
      group.userData.elapsed = 0;
      scene.add(group);
      primedTNT.push(group);
      playTNTFuseSound();
    }

    function updatePrimedTNT(dt) {
      for (let i = primedTNT.length - 1; i >= 0; i--) {
        const t = primedTNT[i];
        t.userData.fuse -= dt;
        t.userData.elapsed += dt;
        const e = t.userData.elapsed;
        // 白い明滅 (終盤ほど速く・明るく) — 本家のチカチカ
        const freq = 6 + e * 4;
        const blink = Math.abs(Math.sin(e * freq));
        const prog = Math.min(1, e / TNT_FUSE);
        setCreeperFlash(t, blink * (0.35 + prog * 0.55));
        // 終盤に少し膨らむ
        t.scale.setScalar(1 + prog * 0.22);
        if (t.userData.fuse <= 0) {
          const p = t.position;
          scene.remove(t);
          primedTNT.splice(i, 1);
          explodeAt(p.x, p.y + 0.5, p.z);  // セル中心で爆発
        }
      }
    }

    // 導火線の "シュー" 音 (短いノイズ)
    function playTNTFuseSound() {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.25), ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
      const ns = ctx.createBufferSource();
      ns.buffer = buf;
      const bp = ctx.createBiquadFilter();
      bp.type = 'highpass'; bp.frequency.value = 3000;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      ns.connect(bp).connect(g).connect(ctx.destination);
      ns.start(now);
    }

    // TNTモデルを非同期ロード (auto-scale → 足元 y=0 シフト)
    gltfLoader.load(
      '3D/TNT.glb',
      (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        if (size.y > 0) model.scale.setScalar(0.95 / size.y);  // 約1ブロックに正規化
        model.updateMatrixWorld();
        const box2 = new THREE.Box3().setFromObject(model);
        model.position.y -= box2.min.y;  // 足元 = y=0
        const wrapper = new THREE.Group();
        wrapper.add(model);
        tntTemplate = wrapper;
      },
      undefined,
      (err) => { console.warn('3D/TNT.glb ロード失敗:', err); }
    );

    // ===== 時間 & 天気 =====
    const DAY_DURATION = 120;  // 秒 (2分で1日)
    let timeOfDay = 0.3;       // 朝スタート (0=深夜, 0.25=日の出, 0.5=正午, 0.75=日没)

    // 太陽の高さ (0=地平線/夜, 1=正午)。日光で焼けるゾンビ・夜の湧き判定に使う
    function daylightStrength() {
      return Math.max(0, Math.sin((timeOfDay - 0.25) * Math.PI * 2));
    }
    // 夜か? (太陽が地平線下) — ゾンビの湧き判定に使う
    function isNightTime() {
      return daylightStrength() <= 0.02;
    }

    // 時刻ごとの空の色 (lerp用キーフレーム)
    const SKY_KEYS = [
      [0.00, 0x0a0e25],  // 深夜
      [0.20, 0x152040],  // 夜明け前
      [0.25, 0xff8855],  // 日の出
      [0.32, 0x87CEEB],  // 朝
      [0.50, 0x87CEEB],  // 正午
      [0.68, 0x87CEEB],  // 午後
      [0.75, 0xff6644],  // 日の入り
      [0.82, 0x152040],  // 夕暮れ
      [1.00, 0x0a0e25],  // 深夜
    ];
    const _skyC1 = new THREE.Color();
    const _skyC2 = new THREE.Color();
    const _skyResult = new THREE.Color();
    function getSkyColor(t) {
      for (let i = 0; i < SKY_KEYS.length - 1; i++) {
        if (t >= SKY_KEYS[i][0] && t <= SKY_KEYS[i + 1][0]) {
          const f = (t - SKY_KEYS[i][0]) / (SKY_KEYS[i + 1][0] - SKY_KEYS[i][0]);
          _skyC1.setHex(SKY_KEYS[i][1]);
          _skyC2.setHex(SKY_KEYS[i + 1][1]);
          return _skyResult.copy(_skyC1).lerp(_skyC2, f);
        }
      }
      return _skyResult.setHex(SKY_KEYS[0][1]);
    }

    const WORLD_CENTER = GROUND / 2;
    const _rainSkyTint = new THREE.Color(0x5a6068);
    const timeTextEl = document.getElementById('time-text');
    const coordTextEl = document.getElementById('coord-text');

    // プレイヤーの足元ブロック座標を HUD に表示 (視点は足元 +PLAYER_EYE)
    function updateCoordHUD() {
      const cx = Math.round(camera.position.x);
      const cy = Math.round(camera.position.y - PLAYER_EYE);
      const cz = Math.round(camera.position.z);
      coordTextEl.textContent = `${cx}, ${cy}, ${cz}`;
    }

    function updateTimeOfDay(dt) {
      timeOfDay = (timeOfDay + dt / DAY_DURATION) % 1;

      // 太陽の位置 (東→上→西→地下→東)
      const angle = (timeOfDay - 0.25) * Math.PI * 2;
      const dist = 60;
      sun.position.set(
        WORLD_CENTER + Math.cos(angle) * dist,
        Math.sin(angle) * dist + 10,
        WORLD_CENTER + 5
      );

      // 太陽の強さ (地平線下では0)
      const sunHeight = Math.max(0, Math.sin(angle));
      sun.intensity = sunHeight * 1.2;
      // 日の出/日没で暖色に
      sun.color.setHex(sunHeight > 0.01 && sunHeight < 0.3 ? 0xffaa66 : 0xffffff);

      // 環境光: 控えめに (Hemisphereに面の陰影を任せる)
      ambient.intensity = 0.18 + sunHeight * 0.1;
      // 空からの光: 太陽角度に関わらず上面が明るくなる
      hemi.intensity = 0.4 + sunHeight * 0.6;

      // 空とフォグの色
      const skyC = getSkyColor(timeOfDay);
      if (weather === 'rain' || weather === 'snow') skyC.lerp(_rainSkyTint, 0.4);
      scene.background.copy(skyC);
      scene.fog.color.copy(skyC);

      // HUD
      const hh = Math.floor(timeOfDay * 24);
      const mm = Math.floor((timeOfDay * 24 - hh) * 60);
      timeTextEl.textContent = `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
    }

    // --- 天気 ---
    let weather = 'clear';
    let weatherTimer = 30;
    const weatherTextEl = document.getElementById('weather-text');

    const PRECIP_COUNT = 600;
    const PRECIP_RADIUS = 25;
    const precipGeo = new THREE.BufferGeometry();
    const precipPos = new Float32Array(PRECIP_COUNT * 3);
    for (let i = 0; i < PRECIP_COUNT; i++) {
      precipPos[i * 3] = (Math.random() - 0.5) * PRECIP_RADIUS * 2;
      precipPos[i * 3 + 1] = Math.random() * 25;
      precipPos[i * 3 + 2] = (Math.random() - 0.5) * PRECIP_RADIUS * 2;
    }
    precipGeo.setAttribute('position', new THREE.BufferAttribute(precipPos, 3));
    const precipMat = new THREE.PointsMaterial({
      color: 0x88aaff, size: 0.12, transparent: true, opacity: 0.5,
    });
    const precip = new THREE.Points(precipGeo, precipMat);
    precip.visible = false;
    scene.add(precip);

    function setWeather(w) {
      weather = w;
      weatherTextEl.textContent = w === 'clear' ? '晴' : (w === 'rain' ? '雨' : '雪');
      precip.material.color.setHex(w === 'snow' ? 0xffffff : 0x88aaff);
      precip.material.size = w === 'snow' ? 0.22 : 0.12;
      precip.material.opacity = w === 'snow' ? 0.85 : 0.5;
    }
    function pickWeather() {
      const r = Math.random();
      if (r < 0.55) return 'clear';
      if (r < 0.85) return 'rain';
      return 'snow';
    }
    setWeather('clear');

    function updateWeather(dt) {
      weatherTimer -= dt;
      if (weatherTimer <= 0) {
        setWeather(pickWeather());
        weatherTimer = 20 + Math.random() * 30;
      }
      if (weather === 'clear') {
        precip.visible = false;
        return;
      }
      precip.visible = true;
      const speed = weather === 'rain' ? 30 : 4;
      const positions = precipGeo.attributes.position.array;
      const cx = camera.position.x;
      const cz = camera.position.z;
      for (let i = 0; i < PRECIP_COUNT; i++) {
        positions[i * 3 + 1] -= speed * dt;
        if (positions[i * 3 + 1] < 0 ||
            Math.abs(positions[i * 3] - cx) > PRECIP_RADIUS ||
            Math.abs(positions[i * 3 + 2] - cz) > PRECIP_RADIUS) {
          positions[i * 3] = cx + (Math.random() - 0.5) * PRECIP_RADIUS * 2;
          positions[i * 3 + 1] = 25 + Math.random() * 5;
          positions[i * 3 + 2] = cz + (Math.random() - 0.5) * PRECIP_RADIUS * 2;
        }
      }
      precipGeo.attributes.position.needsUpdate = true;
    }

    // ===== プレイヤー HP =====
    const PLAYER_MAX_HP = 20;
    let playerHP = PLAYER_MAX_HP;
    let lastDamageTime = -Infinity;
    const INVULN_DURATION = 0.5;     // 連続ダメージ防止
    const HP_REGEN_DELAY = 5.0;      // 被弾後この秒数経過で回復開始
    const HP_REGEN_INTERVAL = 2.0;   // 回復間隔 (秒)
    let timeSinceDamage = HP_REGEN_DELAY;  // 初期は即回復可
    let regenTimer = 0;
    const LAVA_DAMAGE = 2;               // 溶岩 1ティックあたりのダメージ
    const LAVA_DAMAGE_INTERVAL = 0.5;    // 溶岩ダメージの間隔 (秒) → 約5秒で死亡
    let lavaDamageTimer = LAVA_DAMAGE_INTERVAL;  // 触れた瞬間に即ダメージ
    // 溺れ (水中で呼吸できない)
    const BREATH_CAPACITY = 10;          // 水中で息が続く秒数
    const DROWN_DAMAGE = 2;              // 溺れ 1ティックあたりのダメージ
    const DROWN_INTERVAL = 1.0;          // 溺れダメージの間隔 (秒)
    let breathHeld = 0;                  // 頭が水中にある累積秒数
    let drownTimer = 0;
    let shakeIntensity = 0;          // 被弾シェイクの強度 (0-1)
    const SHAKE_DECAY = 5;           // シェイクの減衰速度 (per second)
    const hpFillEl = document.getElementById('hpfill');
    const hpTextEl = document.getElementById('hptext');
    const breathBarEl = document.getElementById('breathbar');
    const breathFillEl = document.getElementById('breathfill');
    const damageFlashEl = document.getElementById('damage-flash');
    const gameoverEl = document.getElementById('gameover');

    function updateHPDisplay() {
      hpFillEl.style.width = `${(playerHP / PLAYER_MAX_HP) * 100}%`;
      hpTextEl.textContent = `HP ${playerHP} / ${PLAYER_MAX_HP}`;
    }
    updateHPDisplay();

    // ===== 空腹度 (本家準拠) =====
    // 食料は満腹度を回復し、満腹度が高い間だけ HP が自然回復する。
    // 行動 (ダッシュ/ジャンプ/採掘/攻撃) で消耗ゲージが溜まり、4 たまるごとに満腹度が 1 減る。
    // 満腹度 0 で飢餓ダメージ (HP 1 までは死なない = 本家ノーマル難易度)。
    const HUNGER_MAX = 20;
    let playerHunger = HUNGER_MAX;
    let exhaustion = 0;                       // 行動による消耗の蓄積
    const EXHAUSTION_PER_HUNGER = 4.0;        // この量たまると満腹度 -1
    const HUNGER_REGEN_THRESHOLD = 18;        // 満腹度がこれ以上で HP 自然回復
    const HUNGER_SPRINT_THRESHOLD = 6;        // 満腹度がこれ以下だとダッシュ不可
    const EXHAUST_SPRINT_PER_SEC = 0.5;       // ダッシュ中の毎秒消耗
    const EXHAUST_JUMP = 0.1;                 // ジャンプ1回
    const EXHAUST_ATTACK = 0.1;               // 攻撃1回
    const EXHAUST_MINE = 0.05;                // ブロック1個破壊
    const EXHAUST_REGEN = 3.0;                // HP1回復ごとの消耗
    const STARVE_INTERVAL = 4.0;              // 飢餓ダメージの間隔(秒)
    let starveTimer = 0;
    const hungerFillEl = document.getElementById('hungerfill');
    const hungerTextEl = document.getElementById('hungertext');

    function updateHungerDisplay() {
      hungerFillEl.style.width = `${(playerHunger / HUNGER_MAX) * 100}%`;
      hungerTextEl.textContent = `🍗 ${playerHunger} / ${HUNGER_MAX}`;
    }
    updateHungerDisplay();

    function addExhaustion(amount) {
      if (playerHP <= 0) return;
      exhaustion += amount;
      while (exhaustion >= EXHAUSTION_PER_HUNGER) {
        exhaustion -= EXHAUSTION_PER_HUNGER;
        if (playerHunger > 0) { playerHunger--; updateHungerDisplay(); }
      }
    }

    // 息ゲージ表示: 水中にいる間だけ表示し、残り息を割合で示す
    function updateBreathDisplay(headInWater) {
      if (!headInWater) { breathBarEl.style.display = 'none'; return; }
      breathBarEl.style.display = 'block';
      const remain = Math.max(0, 1 - breathHeld / BREATH_CAPACITY);
      breathFillEl.style.width = `${remain * 100}%`;
    }

    // 食料を食べたときの HP 回復 (上限 PLAYER_MAX_HP)
    function healPlayer(amount) {
      if (playerHP <= 0 || playerHP >= PLAYER_MAX_HP) return false;
      playerHP = Math.min(PLAYER_MAX_HP, playerHP + amount);
      updateHPDisplay();
      return true;
    }

    // 選択中アイテムが食料素材なら 1 個食べて満腹度を回復 (本家準拠)。
    // 満腹時は食べられない。HP は満腹度経由で自然回復する。
    function tryEatSelected() {
      const sel = selectedItem();
      if (!sel || sel.kind !== 'material') return false;
      const m = materialById[sel.id];
      if (!m.food || materials[sel.id] <= 0) return false;
      if (playerHP <= 0 || playerHunger >= HUNGER_MAX) return false;
      playerHunger = Math.min(HUNGER_MAX, playerHunger + m.food);
      updateHungerDisplay();
      materials[sel.id]--;
      updateHotbar();
      startHandSwing();
      return true;
    }

    function damagePlayer(amount, ignoreInvuln = false, bypassArmor = false) {
      if (playerHP <= 0) return;
      const now = clock.getElapsedTime();
      if (!ignoreInvuln && now - lastDamageTime < INVULN_DURATION) return;
      // 防具による軽減 (本家準拠: 飢餓/溺れ/落下/奈落には効かない)
      if (!bypassArmor) {
        const r = currentArmorReduce();
        if (r > 0) amount = Math.max(1, Math.round(amount * (1 - r)));
      }
      playerHP = Math.max(0, playerHP - amount);
      lastDamageTime = now;
      timeSinceDamage = 0;  // 回復クールタイムをリセット
      regenTimer = 0;
      // 被弾シェイク (ダメージ量で強度UP、上限1.0)
      shakeIntensity = Math.min(1.0, shakeIntensity + amount * 0.15);
      updateHPDisplay();
      damageFlashEl.classList.add('flash');
      setTimeout(() => damageFlashEl.classList.remove('flash'), 80);
      if (playerHP <= 0) {
        controls.unlock();
        gameoverEl.classList.add('show');
        bgm.pause();
        // 本物のmp3があれば再生、無ければメタルギア風の合成BGMにフォールバック
        try {
          gameOverBGM.currentTime = 0;
          gameOverBGM.play().catch(() => playGameOverMusic());
        } catch (e) {
          playGameOverMusic();
        }
      }
    }

    // ===== タッチ操作 (iPhone/iPad対応) =====
    if (isTouch) {
      const joystickEl = document.getElementById('touch-joystick');
      const joystickKnobEl = document.getElementById('touch-joystick-knob');
      const jumpBtn = document.getElementById('touch-jump');
      const placeBtn = document.getElementById('touch-place');
      const canvas = renderer.domElement;

      let joystickId = null;
      const joyCenter = { x: 0, y: 0 };
      let lookId = null;
      const lookLast = { x: 0, y: 0 };
      let lookMovedDist = 0;
      const ROT_SPEED = 0.004;
      const lookEuler = new THREE.Euler(0, 0, 0, 'YXZ');

      function isOnTouchUI(target) {
        return !!(target && target.closest && (
          target.closest('#touch-buttons') ||
          target.closest('#hotbar') ||
          target.closest('#startmsg') ||
          target.closest('#gameover')
        ));
      }

      canvas.addEventListener('touchstart', (e) => {
        if (!controls.isLocked) return;
        for (const t of e.changedTouches) {
          if (isOnTouchUI(t.target)) continue;
          if (t.clientX < innerWidth / 2 && joystickId === null) {
            // 左半分: ジョイスティック開始
            joystickId = t.identifier;
            joyCenter.x = t.clientX;
            joyCenter.y = t.clientY;
            joystickEl.style.left = (t.clientX) + 'px';
            joystickEl.style.top = (t.clientY) + 'px';
            joystickEl.style.transform = 'translate(-50%, -50%)';
            joystickEl.classList.add('active');
          } else if (t.clientX >= innerWidth / 2 && lookId === null) {
            // 右半分: 視点回転 + (動かなければ採掘)
            lookId = t.identifier;
            lookLast.x = t.clientX;
            lookLast.y = t.clientY;
            lookMovedDist = 0;
            // 採掘開始 (大きく動いたらキャンセル)
            mouseDown = true;
            mineStrikeCount = 0;
            startHandSwing();
          }
        }
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchmove', (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === joystickId) {
            const dx = t.clientX - joyCenter.x;
            const dy = t.clientY - joyCenter.y;
            const dist = Math.min(Math.hypot(dx, dy), 50);
            const ang = Math.atan2(dy, dx);
            const kx = Math.cos(ang) * dist;
            const ky = Math.sin(ang) * dist;
            joystickKnobEl.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
            const T = 12;
            move.l = kx < -T;
            move.r = kx > T;
            move.f = ky < -T;
            move.b = ky > T;
          } else if (t.identifier === lookId) {
            const dx = t.clientX - lookLast.x;
            const dy = t.clientY - lookLast.y;
            lookLast.x = t.clientX;
            lookLast.y = t.clientY;
            lookMovedDist += Math.hypot(dx, dy);
            // カメラ回転 (YXZ Euler でPointerLockと同等)
            lookEuler.setFromQuaternion(camera.quaternion);
            lookEuler.y -= dx * ROT_SPEED;
            lookEuler.x -= dy * ROT_SPEED;
            lookEuler.x = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, lookEuler.x));
            camera.quaternion.setFromEuler(lookEuler);
            // 大きく動いた = 視点回転のみ → 採掘キャンセル
            if (lookMovedDist > 10 && mouseDown) mouseDown = false;
          }
        }
        e.preventDefault();
      }, { passive: false });

      function endTouch(e) {
        for (const t of e.changedTouches) {
          if (t.identifier === joystickId) {
            joystickId = null;
            joystickEl.classList.remove('active');
            joystickKnobEl.style.transform = 'translate(-50%, -50%)';
            move.l = move.r = move.f = move.b = false;
          } else if (t.identifier === lookId) {
            lookId = null;
            mouseDown = false;
            breakTargetKey = null;
            breakTargetType = null;
            breakProgress = 0;
            breakBarEl.style.display = 'none';
          }
        }
      }
      canvas.addEventListener('touchend', endTouch);
      canvas.addEventListener('touchcancel', endTouch);

      // ジャンプボタン
      jumpBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (controls.isLocked && onGround) { velocityY = JUMP; addExhaustion(EXHAUST_JUMP); }
      }, { passive: false });

      // 設置ボタン (画面中央にレイ→隣接ブロック設置)
      placeBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!controls.isLocked || anyUIOpen()) return;
        if (tryEatSelected()) return;  // 食料を選択中なら食べる
        raycaster.setFromCamera(centerScreen, camera);
        const hits = raycaster.intersectObjects(instancedMeshes, false);
        if (hits.length === 0 || hits[0].distance > 8) return;
        const info = blockFromHit(hits[0]);
        if (!info) return;
        if (info.typeIndex === FURNACE_INDEX) { openFurnace(); return; }  // かまどをタップ → 精錬メニュー
        if (info.typeIndex === BED_INDEX) { trySleepInBed(info); return; }   // ベッドをタップ → 就寝
        if (info.typeIndex === CHEST_INDEX) { openChest(info); return; }     // チェストをタップ → 保管
        const it = selectedItem();
        if (!it || it.kind !== 'block' || inventory[it.i] <= 0) return;
        const bi = it.i;
        const n = hits[0].face.normal;
        const px = Math.round(info.x + n.x);
        const py = Math.round(info.y + n.y);
        const pz = Math.round(info.z + n.z);
        if (addBlock(px, py, pz, bi)) {
          recordEdit(px, py, pz, bi);  // 改変として記録 (戻っても残る)
          inventory[bi]--;
          updateHotbar();
          startHandSwing();
          if (bi === WATER_INDEX || bi === LAVA_INDEX) flowFrom([key(px, py, pz)]);  // 設置した流体が流れ出す
        }
      }, { passive: false });
    }

    // ===== ゲームループ =====
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.1);  // フレーム飛び対策

      if (controls.isLocked && !anyUIOpen()) {
        const fwd = (move.f ? 1 : 0) - (move.b ? 1 : 0);
        const side = (move.r ? 1 : 0) - (move.l ? 1 : 0);

        // 高い壁にぶつかったら戻すため、移動前のXZを保存
        const prevX = camera.position.x;
        const prevZ = camera.position.z;

        // ダッシュ中は速度2倍 (前進中のみ。満腹度が低いとダッシュ不可 = 本家準拠)。飛行中は専用速度
        const curSpeed = flying ? FLY_HSPEED
          : (isDashing && fwd > 0 && playerHunger > HUNGER_SPRINT_THRESHOLD) ? SPEED * DASH_MULTIPLIER : SPEED;
        controls.moveForward(fwd * curSpeed * dt);
        controls.moveRight(side * curSpeed * dt);

        // 壁 & クリーパー判定 (めり込む前に止める)
        const isBlocked = (x, z) =>
          isBlockedAt(x, z, camera.position.y) ||
          isOverlappingCreeper(x, z, camera.position.y) ||
          isOverlappingWarden(x, z, camera.position.y) ||
          isOverlappingPassiveMob(x, z, camera.position.y);
        if (isBlocked(camera.position.x, camera.position.z)) {
          // 直前の位置も塞がれている = Mob に重なる・地形に埋まる等で
          // 閉じ込められた状態。押し戻すと永久に動けなくなるので、
          // 脱出できるよう今回の移動はそのまま通す。
          if (!isBlocked(prevX, prevZ)) {
            // 通常の壁衝突: X だけ・Z だけで通れるなら片方は進ませる (壁ずり)
            if (!isBlocked(prevX, camera.position.z)) {
              camera.position.x = prevX;
            } else if (!isBlocked(camera.position.x, prevZ)) {
              camera.position.z = prevZ;
            } else {
              camera.position.x = prevX;
              camera.position.z = prevZ;
            }
          }
        }

        // 飛行モード: 重力なし。Space上昇 / Shift下降。ブロックには衝突する (すり抜けない)
        if (flying) {
          flightVerticalStep(dt);
        } else {
        // 重力
        velocityY += GRAVITY * dt;
        camera.position.y += velocityY * dt;

        // 天井判定: ジャンプ中に頭をぶつけたら上昇を打ち消す
        if (velocityY > 0) {
          let bonk = false;
          for (const dx of [-PLAYER_RADIUS, PLAYER_RADIUS]) {
            for (const dz of [-PLAYER_RADIUS, PLAYER_RADIUS]) {
              if (hasCeiling(camera.position.x + dx, camera.position.z + dz, camera.position.y)) {
                bonk = true; break;
              }
            }
            if (bonk) break;
          }
          if (bonk) {
            // 直前のYに戻して上昇キャンセル + 軽く跳ね返り
            camera.position.y -= velocityY * dt;
            velocityY = Math.min(velocityY, -0.5);
          }
        }

        // 段差の上り下り: ふわっと滑らかに高さを合わせる (大きな落下は自由落下のまま)
        const wasGrounded = onGround;
        const floorY = getFloorY(camera.position.x, camera.position.z);
        const stepEase = 1 - Math.exp(-STEP_SMOOTH * dt);  // フレームレート非依存のイージング
        if (camera.position.y < floorY) {
          // 上り: 目標の床高へ指数イージングで持ち上げる (到着間際はふわっと減速)
          camera.position.y += (floorY - camera.position.y) * stepEase;
          if (floorY - camera.position.y < 0.02) camera.position.y = floorY;
          if (velocityY < 0) velocityY = 0;
          onGround = (floorY - camera.position.y < 0.05);
        } else if (wasGrounded && velocityY <= 0 && floorY > -Infinity &&
                   camera.position.y - floorY <= STEP_DOWN_MAX) {
          // 下り(小さな段差): 自由落下せず同じイージングでふわっと降りる
          camera.position.y += (floorY - camera.position.y) * stepEase;
          if (camera.position.y - floorY < 0.02) camera.position.y = floorY;
          velocityY = 0;
          onGround = true;
        } else {
          // 大きな落下・空中
          onGround = false;
        }
        }  // 飛行/重力 分岐の終わり

        // 奈落落下: y < VOID_Y で即死
        if (camera.position.y < VOID_Y && playerHP > 0) {
          damagePlayer(PLAYER_MAX_HP, true, true);
        }

        // 溶岩ダメージ: 溶岩に触れている間、一定間隔で継続ダメージ
        if (playerHP > 0 && isTouchingLava()) {
          lavaDamageTimer += dt;
          if (lavaDamageTimer >= LAVA_DAMAGE_INTERVAL) {
            lavaDamageTimer = 0;
            damagePlayer(LAVA_DAMAGE, true);
          }
        } else {
          lavaDamageTimer = LAVA_DAMAGE_INTERVAL;  // 離れたらリセット (次の接触で即ダメージ)
        }

        // 溺れ: 頭が水中にある間 息を消費し、尽きたら一定間隔でダメージ
        const headInWater = isHeadInWater();
        if (playerHP > 0 && headInWater) {
          breathHeld += dt;
          if (breathHeld >= BREATH_CAPACITY) {
            drownTimer += dt;
            if (drownTimer >= DROWN_INTERVAL) {
              drownTimer = 0;
              damagePlayer(DROWN_DAMAGE, true, true);
            }
          }
        } else {
          breathHeld = 0;  // 水面に出たら息は即回復
          drownTimer = 0;
        }
        updateBreathDisplay(headInWater);

        // 落下ダメージ: 着地時に落差からダメージ計算 (水に入ると無効=本家同様)
        if (onGround) {
          if (fallStartY !== null) {
            const fallDist = fallStartY - camera.position.y;
            if (fallDist > FALL_SAFE_HEIGHT && !isBodyInWater()) {
              const dmg = Math.floor((fallDist - (FALL_SAFE_HEIGHT - 1)) * 2);
              damagePlayer(dmg, true, true);
            }
            fallStartY = null;
          }
        } else {
          // 空中: ピーク Y を記録
          if (fallStartY === null) fallStartY = camera.position.y;
          else if (camera.position.y > fallStartY) fallStartY = camera.position.y;
        }

        // 無限地形ストリーミング: 周囲を生成・遠方を破棄
        updateStreaming();

        // 生成直後にブロックへ埋まっていたら救出 (嵌り防止の安全網)
        unstickPlayer();

        // 水面メッシュの再構築 (このフレームで水/隣接ブロックが変化した時のみ)
        if (waterDirty) { rebuildWaterMesh(); waterDirty = false; }

        // 敵Mob (クリーパー) の更新 + 個体数管理 (周囲に湧かせ遠方を消す)
        updateCreepers(dt);
        manageCreepers(dt);

        // ウォーデン (最凶の敵Mob) の更新 + 個体数管理 + ソニックブームの演出
        updateWardens(dt);
        manageWardens(dt);
        updateSonicBeams(dt);

        // 受動Mob (ブタ・牛・村人・チキン・ウマ・スティーブ・ウサギ等) の徘徊 + 個体数管理
        updatePassiveMobs(dt);
        managePassiveMobs(dt);

        // 魚 (水棲Mob): 水中を泳ぎ、陸ではピチピチ跳ねて窒息
        updateFish(dt);
        manageFish(dt);

        // ゾンビ (敵Mob): 夜に湧き、追跡して殴る。日光で焼ける
        updateZombies(dt);
        manageZombies(dt);

        // スケルトン (敵Mob): 夜に湧き、距離を保って矢を射る。日光で焼ける
        updateSkeletons(dt);
        manageSkeletons(dt);

        // スライムナイト (敵Mob・DQ風): ぴょんぴょん跳ねて追跡し剣で斬る。たまにホイミで自己回復
        updateSlimeKnights(dt);
        manageSlimeKnights(dt);

        // 矢 (プレイヤーの弓 + スケルトン) と XPオーブ
        updateArrows(dt);
        updateXPOrbs(dt);

        // アイアンゴーレム (中立Mob): 徘徊しつつ敵Mobを狩る
        updateGolems(dt);
        manageGolems(dt);

        // 撃破モブが落とした素材アイテムの落下・回転・拾得
        updateItemDrops(dt);

        // 作物・苗木の成長 + 繁殖ハートの演出
        updateCrops(dt);
        updateSaplings(dt);
        updateHearts(dt);

        // 起爆中TNTの導火線進行 + 爆発
        updatePrimedTNT(dt);

        // HP の自然回復 (本家準拠: 満腹度 18 以上のときだけ。回復すると満腹度を消耗)
        if (playerHP > 0 && playerHP < PLAYER_MAX_HP && playerHunger >= HUNGER_REGEN_THRESHOLD) {
          timeSinceDamage += dt;
          if (timeSinceDamage >= HP_REGEN_DELAY) {
            regenTimer += dt;
            if (regenTimer >= HP_REGEN_INTERVAL) {
              playerHP = Math.min(PLAYER_MAX_HP, playerHP + 1);
              regenTimer = 0;
              updateHPDisplay();
              addExhaustion(EXHAUST_REGEN);
            }
          }
        } else {
          timeSinceDamage += dt;
        }

        // 飢餓: 満腹度 0 の間は一定間隔でダメージ (HP 1 までは死なない = 本家ノーマル)
        if (playerHP > 1 && playerHunger <= 0) {
          starveTimer += dt;
          if (starveTimer >= STARVE_INTERVAL) {
            starveTimer = 0;
            damagePlayer(1, true, true);
          }
        } else {
          starveTimer = 0;
        }

        // ダッシュ中は満腹度を消耗
        if (isDashing && (move.f && !move.b)) addExhaustion(EXHAUST_SPRINT_PER_SEC * dt);

        // ブロック破壊の進行 (左クリック長押し)
        if (mouseDown) {
          raycaster.setFromCamera(centerScreen, camera);
          const hits = raycaster.intersectObjects(instancedMeshes, false);
          const hit = (hits.length > 0 && hits[0].distance <= 8) ? hits[0] : null;
          const info = hit ? blockFromHit(hit) : null;
          if (info) {
            if (info.posKey !== breakTargetKey) {
              breakTargetKey = info.posKey;
              breakTargetType = info.typeIndex;
              breakProgress = 0;
            }
            const hardness = blockTypes[info.typeIndex].hardness;
            // 道具装備中: 対応ブロックなら採掘速度UP
            const tool = heldTool();
            const speedMult = (tool && tool.blocks.has(info.typeIndex)) ? tool.speed : 1;
            breakProgress += dt * speedMult;
            breakBarEl.style.display = 'block';
            breakFillEl.style.width = `${Math.min(100, (breakProgress / hardness) * 100)}%`;
            if (breakProgress >= hardness) {
              const wasFluid = (info.typeIndex === WATER_INDEX || info.typeIndex === LAVA_INDEX);
              addExhaustion(EXHAUST_MINE);  // 採掘で満腹度を消耗 (本家準拠)
              const ore = ORE_INFO[info.typeIndex];
              if (ore) {
                // 鉱石: 対応ティア以上のツルハシなら素材ドロップ、足りなければ何も出ない (本家準拠)
                const heldTier = (tool && tool.type === 'pickaxe') ? TOOL_TIER_RANK[tool.tier] : 0;
                if (heldTier >= ore.minTier) materials[ore.dropId]++;
              } else if (info.typeIndex === FARMLAND_INDEX) {
                inventory[DIRT_INDEX]++;   // 耕地を壊すと土に戻る (本家準拠)
              } else {
                inventory[info.typeIndex]++;
                // 草ブロックを壊すとまれに種 (本家の草むら相当)
                if (info.typeIndex === GRASS_INDEX && Math.random() < 0.25) {
                  spawnItemDrop(info.x, info.y + 0.6, info.z, 'seeds', 1);
                }
                // 葉を壊すとまれに苗木 (本家準拠)
                if (info.typeIndex === 5 && Math.random() < 0.12) {
                  spawnItemDrop(info.x, info.y + 0.6, info.z, 'sapling', 1);
                }
              }
              // 上に作物が乗っていたら一緒に壊れる (種が落ちる)
              const cropAbove = crops.get(key(info.x, info.y + 1, info.z));
              if (cropAbove) removeCrop(cropAbove, true);
              // チェストを壊したら中身はプレイヤーの持ち物へ戻る
              if (info.typeIndex === CHEST_INDEX && chestData[info.posKey]) {
                const c = chestData[info.posKey];
                for (const iStr in c.blocks) inventory[+iStr] += c.blocks[iStr];
                for (const id in c.mats) materials[id] += c.mats[id];
                tntCount += c.tnt || 0;
                delete chestData[info.posKey];
                saveChests();
              }
              updateHotbar();
              removeBlock(info.x, info.y, info.z);
              fluidMeta.delete(info.posKey);
              recordEdit(info.x, info.y, info.z, -1);  // 破壊を記録 (戻っても穴は残る)
              if (wasFluid) recedeFluidAround(info.x, info.y, info.z);  // 源を壊したら下流が引く
              triggerFluidFlow(info.x, info.y, info.z);                 // 空いた穴へ流れ込む
              breakTargetKey = null;
              breakTargetType = null;
              breakProgress = 0;
              breakBarEl.style.display = 'none';
            }
          } else {
            breakTargetKey = null;
            breakTargetType = null;
            breakProgress = 0;
            breakBarEl.style.display = 'none';
          }
        }

        // 手のアニメーション
        if (mouseDown) {
          // 押しっぱなし: 大きく・速く叩く
          handTime += dt * 11;
          const strike = Math.abs(Math.sin(handTime));
          hand.rotation.x = HAND_REST.rx - strike * 1.7;   // 振り幅を大きく
          hand.rotation.z = HAND_REST.rz;
          hand.position.x = HAND_REST.px;
          hand.position.y = HAND_REST.py;
          hand.position.z = HAND_REST.pz - strike * 0.07;  // 突き出しも大きく
          // 振り下ろしのピークに合わせて効果音
          const peakCount = Math.floor((handTime + Math.PI / 2) / Math.PI);
          if (peakCount > mineStrikeCount) {
            mineStrikeCount = peakCount;
            if (breakTargetType !== null) playMineSound(breakTargetType);
          }
        } else if (handSwingT > 0) {
          // 単発スイング (設置・敵撃破時)
          hand.rotation.x = HAND_REST.rx - Math.sin((1 - handSwingT) * Math.PI) * 0.9;
          hand.rotation.z = HAND_REST.rz;
          hand.position.set(HAND_REST.px, HAND_REST.py, HAND_REST.pz);
          handSwingT -= dt * 5;
          if (handSwingT <= 0) handSwingT = 0;
        } else {
          // 静止
          hand.rotation.x = HAND_REST.rx;
          hand.rotation.z = HAND_REST.rz;
          hand.position.set(HAND_REST.px, HAND_REST.py, HAND_REST.pz);
          handTime = 0;
        }
      }

      // 爆発パーティクル (ポーズ中も飛び続ける)
      updateExplosionParticles(dt);

      // 時間と天気はポーズ中も進行
      updateTimeOfDay(dt);
      updateWeather(dt);
      updateCoordHUD();
      updateTorchLights(dt);  // 近くの松明に光源プールを割り当て

      // 被弾シェイク: cameraPivot を揺らして "殴られた" 感を演出
      if (shakeIntensity > 0) {
        const t = clock.getElapsedTime();
        cameraPivot.rotation.x = Math.sin(t * 60) * shakeIntensity * 0.08;
        cameraPivot.rotation.z = Math.cos(t * 55) * shakeIntensity * 0.05;
        shakeIntensity = Math.max(0, shakeIntensity - SHAKE_DECAY * dt);
      } else {
        cameraPivot.rotation.x = 0;
        cameraPivot.rotation.z = 0;
      }

      renderer.render(scene, camera);
    }

    animate();


    // ===== リサイズ対応 =====
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    updateBlockInfo();
  </script>
</body>
</html>
